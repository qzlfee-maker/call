<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craheapp Messenger — Premium</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --tg-blue: #248bcf;
            --tg-bg: #0f1721;
            --tg-sidebar: #17212b;
            --tg-chat-bg: #0e1621;
            --tg-hover: #202b36;
            --tg-text: #ffffff;
            --tg-text-muted: #708499;
            --tg-sent-msg: #2b5278;
            --tg-received-msg: #182533;
            --tg-border: #111923;
            --tg-green: #4cd964;
            --safe-top: env(safe-area-inset-top);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--tg-bg);
            color: var(--tg-text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ========== AUTH SCREEN (ROBLOX STYLE) ========== */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1c2c3e 0%, #0f1721 100%);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--tg-sidebar);
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .auth-logo {
            font-size: 48px;
            font-weight: 800;
            color: var(--tg-blue);
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .auth-card h2 { font-size: 24px; margin-bottom: 8px; }
        .auth-card p { color: var(--tg-text-muted); margin-bottom: 30px; font-size: 15px; }

        .auth-tabs {
            display: flex;
            background: var(--tg-bg);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .auth-tab.active { background: var(--tg-blue); color: white; }

        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; color: var(--tg-text-muted); margin-bottom: 6px; margin-left: 4px; }
        
        .tg-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid var(--tg-border);
            background: var(--tg-bg);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .tg-input:focus { border-color: var(--tg-blue); }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--tg-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, filter 0.2s;
        }

        .btn-primary:active { transform: scale(0.98); }

        /* ========== MAIN MESSENGER UI ========== */
        .app-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar */
        .sidebar {
            width: 400px;
            background: var(--tg-sidebar);
            border-right: 1px solid var(--tg-border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .my-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--tg-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
        }

        .search-bar {
            padding: 0 16px 16px;
        }

        .search-input-wrap {
            background: var(--tg-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 10px 14px;
            gap: 10px;
        }

        .search-input-wrap input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-size: 15px;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .contact-item:hover { background: var(--tg-hover); }
        .contact-item.active { background: var(--tg-blue); }

        .avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .avatar-main {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: linear-gradient(135deg, #50a7ea, #248bcf);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
        }

        .online-status {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--tg-green);
            border: 2px solid var(--tg-sidebar);
            border-radius: 50%;
        }

        .contact-info { flex: 1; min-width: 0; }
        .contact-name-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .contact-name-row h4 { font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-time { font-size: 12px; color: var(--tg-text-muted); }
        .contact-last-msg { font-size: 14px; color: var(--tg-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Chat Window */
        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--tg-chat-bg);
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: 400px;
            position: relative;
        }

        .chat-header {
            height: 60px;
            background: var(--tg-sidebar);
            border-bottom: 1px solid var(--tg-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            z-index: 10;
        }

        .chat-peer-info { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .chat-peer-name { font-weight: 600; font-size: 16px; }
        .chat-peer-status { font-size: 13px; color: var(--tg-blue); }

        .chat-actions { display: flex; gap: 15px; }
        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--tg-text-muted);
            padding: 8px;
            border-radius: 50%;
            transition: 0.2s;
        }
        .icon-btn:hover { background: var(--tg-hover); color: white; }
        .icon-btn svg { width: 24px; height: 24px; fill: currentColor; }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Message Bubbles */
        .message {
            max-width: 70%;
            padding: 8px 12px 6px;
            border-radius: 15px;
            font-size: 15px;
            position: relative;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-sent {
            align-self: flex-end;
            background: var(--tg-sent-msg);
            border-bottom-right-radius: 4px;
            color: white;
        }

        .msg-received {
            align-self: flex-start;
            background: var(--tg-received-msg);
            border-bottom-left-radius: 4px;
        }

        .msg-time {
            font-size: 11px;
            opacity: 0.6;
            margin-left: 8px;
            float: right;
            margin-top: 4px;
        }

        /* Input Area */
        .input-area {
            background: var(--tg-sidebar);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            max-height: 150px;
            padding: 5px 0;
        }

        /* Mobile Adjustments */
        @media (max-width: 850px) {
            .sidebar { width: 100%; position: absolute; z-index: 100; }
            .sidebar.hidden { transform: translateX(-100%); }
            .chat-window { width: 100%; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="auth-logo">CRAHEAPP</div>
            <h2>Добро пожаловать</h2>
            <p>Войдите, чтобы начать общение</p>
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="setAuthMode('login')">Вход</div>
                <div class="auth-tab" id="tab-reg" onclick="setAuthMode('reg')">Регистрация</div>
            </div>

            <div class="input-group">
                <label>Имя пользователя</label>
                <input type="text" id="auth-username" class="tg-input" placeholder="Напр: crahe_dev">
            </div>

            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="auth-password" class="tg-input" placeholder="••••••••">
            </div>

            <button class="btn-primary" onclick="processAuth()" id="auth-submit-btn">Войти</button>
        </div>
    </div>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="my-avatar" id="my-avatar-display">?</div>
                <h3 id="my-name-display">Загрузка...</h3>
            </div>
            <div class="search-bar">
                <div class="search-input-wrap">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--tg-text-muted)"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="text" placeholder="Поиск">
                </div>
            </div>
            <div class="contact-list" id="contact-list">
                </div>
        </aside>

        <main class="chat-window" id="chat-window">
            <div id="no-chat-selected" style="flex:1; display:flex; align-items:center; justify-content:center; color: var(--tg-text-muted);">
                Выберите чат, чтобы начать общение
            </div>

            <div id="chat-active-ui" class="hidden" style="height:100%; display:flex; flex-direction:column;">
                <header class="chat-header">
                    <div class="chat-peer-info">
                        <div class="avatar-main" id="chat-header-avatar" style="width:40px; height:40px; font-size:16px;">?</div>
                        <div>
                            <div class="chat-peer-name" id="chat-header-name">Имя</div>
                            <div class="chat-peer-status" id="chat-header-status">в сети</div>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="icon-btn" onclick="initiateCall()">
                            <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                        </button>
                    </div>
                </header>

                <div class="messages-container" id="messages-container">
                    </div>

                <div class="input-area">
                    <button class="icon-btn">
                        <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/></svg>
                    </button>
                    <input type="text" id="msg-input" class="message-input" placeholder="Напишите сообщение...">
                    <button class="icon-btn" style="color: var(--tg-blue)" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>
