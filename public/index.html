<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>CraneCall — Видеозвонки как в Telegram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #080c14;
      font-family: 'Manrope', system-ui, sans-serif;
      color: #e8eaf6;
      height: 100vh;
      overflow: hidden;
    }

    /* Auth screen */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 40%, #0f1624, #080c14);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(2px);
    }
    .auth-card {
      background: rgba(15, 22, 36, 0.95);
      border: 1px solid rgba(62, 130, 255, 0.3);
      border-radius: 32px;
      padding: 40px 32px;
      width: min(420px, 90%);
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
    }
    .auth-logo {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #3e82ff, #00c4ff);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin: 0 auto 20px;
      box-shadow: 0 10px 20px rgba(62,130,255,0.3);
    }
    .auth-card h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #00c4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    .auth-sub {
      color: #8b9dc3;
      margin-bottom: 28px;
      font-size: 14px;
    }
    .auth-input {
      width: 100%;
      padding: 14px 16px;
      background: #1a2538;
      border: 1px solid #2a3a55;
      border-radius: 16px;
      color: white;
      font-size: 15px;
      margin-bottom: 12px;
      outline: none;
      transition: border 0.2s;
    }
    .auth-input:focus {
      border-color: #3e82ff;
    }
    .auth-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3e82ff, #00c4ff);
      border: none;
      border-radius: 16px;
      font-weight: 700;
      font-size: 16px;
      color: white;
      cursor: pointer;
      margin-top: 16px;
      transition: transform 0.1s;
    }
    .auth-btn:active { transform: scale(0.97); }
    .test-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(62,130,255,0.15);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #00c4ff;
      cursor: pointer;
      margin-top: 16px;
    }

    /* Main app */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .header {
      height: 60px;
      background: #0f1624;
      border-bottom: 1px solid rgba(62,130,255,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 18px;
    }
    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #3e82ff, #00c4ff);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .user-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .username {
      font-size: 14px;
      font-weight: 500;
      color: #8b9dc3;
    }
    .avatar-header {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #3e82ff, #00c4ff);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    /* Main layout */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: 300px;
      background: #0f1624;
      border-right: 1px solid rgba(62,130,255,0.2);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s;
    }
    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid rgba(62,130,255,0.2);
    }
    .tab-btn {
      flex: 1;
      padding: 14px 8px;
      background: none;
      border: none;
      color: #8b9dc3;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
    }
    .tab-btn.active {
      color: #00c4ff;
      border-bottom-color: #00c4ff;
    }
    .sidebar-body {
      flex: 1;
      overflow-y: auto;
    }

    /* User card */
    .user-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.15s;
    }
    .user-card:hover { background: #1a2538; }
    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3e82ff, #00c4ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      position: relative;
    }
    .status-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2ed573;
      border: 2px solid #0f1624;
    }
    .user-info {
      flex: 1;
    }
    .user-name {
      font-weight: 600;
      font-size: 14px;
    }
    .user-status {
      font-size: 11px;
      color: #8b9dc3;
      margin-top: 2px;
    }
    .call-actions {
      display: flex;
      gap: 8px;
    }
    .call-action-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(62,130,255,0.15);
      border: none;
      color: #3e82ff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Groups */
    .group-create-btn {
      margin: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(62,130,255,0.1);
      border: 1px dashed rgba(62,130,255,0.4);
      border-radius: 14px;
      padding: 12px;
      color: #00c4ff;
      font-weight: 600;
      cursor: pointer;
    }
    .group-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
    }
    .group-avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #3e82ff, #00c4ff);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .group-name {
      font-weight: 600;
    }

    /* Main call area */
    .call-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      color: #8b9dc3;
    }
    .call-placeholder .big-icon {
      font-size: 72px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal {
      background: #1a2538;
      border-radius: 28px;
      padding: 28px;
      width: min(380px, 90%);
    }
    .modal input {
      width: 100%;
      padding: 12px;
      background: #0f1624;
      border: 1px solid #2a3a55;
      border-radius: 14px;
      color: white;
      margin: 16px 0;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
    }
    .modal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 14px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }
    .primary-btn {
      background: linear-gradient(135deg, #3e82ff, #00c4ff);
      color: white;
    }
    .secondary-btn {
      background: #2a3a55;
      color: #8b9dc3;
    }

    /* Incoming call popup */
    .incoming-popup {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a2538;
      border: 1px solid #3e82ff;
      border-radius: 24px;
      padding: 20px;
      width: min(340px, 90vw);
      z-index: 300;
      animation: slideInRight 0.3s;
    }
    @keyframes slideInRight {
      from { transform: translateX(110%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .incoming-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .incoming-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3e82ff, #00c4ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      animation: ring 1s infinite;
    }
    @keyframes ring {
      0% { box-shadow: 0 0 0 0 rgba(62,130,255,0.4); }
      70% { box-shadow: 0 0 0 12px rgba(62,130,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(62,130,255,0); }
    }
    .incoming-actions {
      display: flex;
      gap: 12px;
    }
    .incoming-btn {
      flex: 1;
      padding: 10px;
      border-radius: 40px;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
    .accept { background: #2ed573; color: white; }
    .reject { background: #ff4757; color: white; }

    .toast {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a2538;
      border: 1px solid #3e82ff;
      border-radius: 40px;
      padding: 8px 20px;
      font-size: 13px;
      z-index: 200;
      animation: fadeIn 0.2s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .hidden { display: none; }

    /* Mobile */
    @media (max-width: 680px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 60px;
        bottom: 0;
        width: 260px;
        transform: translateX(-100%);
        z-index: 100;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .burger-btn {
        display: flex;
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
      }
    }
  </style>
</head>
<body>

<!-- Auth -->
<div id="authOverlay" class="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">📞</div>
    <h1>CraneCall</h1>
    <div class="auth-sub">Видеозвонки как в Telegram</div>
    <input type="text" id="regUsername" class="auth-input" placeholder="Ваше имя">
    <input type="text" id="regUserId" class="auth-input" placeholder="Ваш ID (например: mama)">
    <button class="auth-btn" id="registerBtn">Войти</button>
    <div class="test-badge" onclick="quickLogin('Тест1','test1')">⚡ Быстрый тест: Test1</div>
    <div class="test-badge" onclick="quickLogin('Тест2','test2')">⚡ Быстрый тест: Test2</div>
  </div>
</div>

<!-- Main App -->
<div id="app" class="app hidden">
  <div class="header">
    <div style="display: flex; align-items: center; gap: 10px;">
      <button class="burger-btn" id="burgerBtn" onclick="toggleSidebar()">☰</button>
      <div class="logo"><div class="logo-icon">📞</div><span>CraneCall</span></div>
    </div>
    <div class="user-area">
      <span class="username" id="headerUsername"></span>
      <div class="avatar-header" id="headerAvatar"></div>
    </div>
  </div>

  <div class="main">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-tabs">
        <button class="tab-btn active" id="tabUsersBtn" onclick="switchTab('users')">Контакты</button>
        <button class="tab-btn" id="tabGroupsBtn" onclick="switchTab('groups')">Группы</button>
      </div>
      <div class="sidebar-body" id="sidebarBody">
        <div id="usersPanel">
          <div id="usersList"></div>
          <div id="emptyUsers" class="empty-state" style="padding: 40px; text-align: center; color: #8b9dc3;">Нет пользователей онлайн</div>
        </div>
        <div id="groupsPanel" class="hidden">
          <div class="group-create-btn" onclick="openGroupModal()">➕ Создать групповой звонок</div>
          <div id="groupsList"></div>
        </div>
      </div>
    </aside>

    <main class="call-placeholder" id="callArea">
      <div class="big-icon">📞</div>
      <h2>Готов к звонкам</h2>
      <p>Выберите контакт слева и нажмите на видеозвонок. <br>Все звонки P2P и бесплатны.</p>
    </main>
  </div>
</div>

<!-- Modal create group -->
<div id="groupModal" class="modal-overlay hidden">
  <div class="modal">
    <h3>🎙️ Новый групповой звонок</h3>
    <input type="text" id="groupNameInput" placeholder="Название группы">
    <div class="modal-actions">
      <button class="modal-btn secondary-btn" onclick="closeGroupModal()">Отмена</button>
      <button class="modal-btn primary-btn" onclick="createGroup()">Создать</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ========== GLOBALS ==========
  let socket = null;
  let currentUser = null;
  let callState = 'idle';
  let iceServers = [{ urls: 'stun:stun.l.google.com:19302' }];

  // DOM elements
  const authOverlay = document.getElementById('authOverlay');
  const app = document.getElementById('app');
  const registerBtn = document.getElementById('registerBtn');
  const usersList = document.getElementById('usersList');
  const groupsList = document.getElementById('groupsList');
  const emptyUsers = document.getElementById('emptyUsers');
  const sidebar = document.getElementById('sidebar');
  const headerUsername = document.getElementById('headerUsername');
  const headerAvatar = document.getElementById('headerAvatar');

  // ========== HELPERS ==========
  function showToast(msg, isError = false) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.borderLeftColor = isError ? '#ff4757' : '#3e82ff';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function toggleSidebar() {
    sidebar.classList.toggle('open');
  }

  function switchTab(tab) {
    const usersPanel = document.getElementById('usersPanel');
    const groupsPanel = document.getElementById('groupsPanel');
    const tabUsers = document.getElementById('tabUsersBtn');
    const tabGroups = document.getElementById('tabGroupsBtn');
    if (tab === 'users') {
      usersPanel.classList.remove('hidden');
      groupsPanel.classList.add('hidden');
      tabUsers.classList.add('active');
      tabGroups.classList.remove('active');
    } else {
      usersPanel.classList.add('hidden');
      groupsPanel.classList.remove('hidden');
      tabUsers.classList.remove('active');
      tabGroups.classList.add('active');
    }
    if (window.innerWidth <= 680) sidebar.classList.remove('open');
  }

  function quickLogin(name, id) {
    document.getElementById('regUsername').value = name;
    document.getElementById('regUserId').value = id;
    registerBtn.click();
  }

  // ========== REGISTRATION ==========
  registerBtn.addEventListener('click', async () => {
    const username = document.getElementById('regUsername').value.trim();
    const userId = document.getElementById('regUserId').value.trim().toLowerCase();
    if (!username || !userId) { showToast('Заполните все поля', true); return; }
    currentUser = { username, userId };
    const res = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,userId}) });
    if (!res.ok) { showToast('Ошибка регистрации', true); return; }
    // Получить ICE конфигурацию
    try {
      const iceRes = await fetch('/api/ice-config');
      const iceData = await iceRes.json();
      iceServers = iceData.iceServers;
    } catch(e) {}

    socket = io({ transports: ['websocket', 'polling'] });
    socket.on('connect', () => {
      socket.emit('register', { username, userId });
    });
    setupSocketListeners();
    authOverlay.classList.add('hidden');
    app.classList.remove('hidden');
    headerUsername.textContent = username;
    headerAvatar.textContent = username[0].toUpperCase();
    showToast(`Добро пожаловать, ${username}`);
  });

  // ========== SOCKET LISTENERS ==========
  function setupSocketListeners() {
    socket.on('user-list', (users) => {
      const others = users.filter(u => u.userId !== currentUser.userId);
      if (others.length === 0) {
        emptyUsers.style.display = 'block';
        usersList.innerHTML = '';
      } else {
        emptyUsers.style.display = 'none';
        usersList.innerHTML = others.map(u => `
          <div class="user-card">
            <div class="user-avatar">${u.username[0].toUpperCase()}<span class="status-dot"></span></div>
            <div class="user-info">
              <div class="user-name">${escapeHtml(u.username)}</div>
              <div class="user-status">${u.status === 'busy' ? '🔴 В звонке' : '🟢 Онлайн'}</div>
            </div>
            <div class="call-actions">
              <button class="call-action-btn" onclick="startCall('${u.userId}','${escapeHtml(u.username)}')">📹</button>
            </div>
          </div>
        `).join('');
      }
    });

    socket.on('group-list', (groups) => {
      if (!groups.length) {
        groupsList.innerHTML = '<div style="padding:40px;text-align:center;color:#8b9dc3;">Нет активных групп</div>';
        return;
      }
      groupsList.innerHTML = groups.map(g => `
        <div class="group-item" onclick="joinGroup('${g.groupId}','${escapeHtml(g.name)}')">
          <div class="group-avatar">👥</div>
          <div class="group-name">${escapeHtml(g.name)}</div>
          <div style="margin-left:auto; font-size:12px; color:#8b9dc3;">${g.participants} участ.</div>
        </div>
      `).join('');
    });

    socket.on('incoming-call', (data) => {
      if (callState !== 'idle') {
        socket.emit('reject-call', { fromId: data.from });
        return;
      }
      showIncomingCall(data);
    });

    socket.on('call-error', ({ message }) => showToast(message, true));
    socket.on('call-rejected', () => showToast('Звонок отклонён', true));
    socket.on('call-ended', () => showToast('Звонок завершён'));
  }

  // ========== INCOMING CALL UI ==========
  function showIncomingCall({ from, fromName, callType }) {
    const popup = document.createElement('div');
    popup.className = 'incoming-popup';
    popup.innerHTML = `
      <div class="incoming-header">
        <div class="incoming-avatar">${fromName[0].toUpperCase()}</div>
        <div><strong>${escapeHtml(fromName)}</strong><br><span style="font-size:12px;">${callType === 'video' ? '📹 Видеозвонок' : '🎙️ Аудиозвонок'}</span></div>
      </div>
      <div class="incoming-actions">
        <button class="incoming-btn accept" id="acceptCallBtn">Ответить</button>
        <button class="incoming-btn reject" id="rejectCallBtn">Отклонить</button>
      </div>
    `;
    document.body.appendChild(popup);
    // Звук
    playRingSound();
    const accept = () => {
      popup.remove();
      stopRingSound();
      localStorage.setItem('callData', JSON.stringify({
        type: 'personal',
        myUserId: currentUser.userId,
        myUsername: currentUser.username,
        targetId: from,
        targetName: fromName,
        callType: callType || 'video',
        isIncoming: true,
        iceServers
      }));
      socket.emit('accept-call', { fromId: from });
      window.open('/call', '_blank', 'width=1000,height=700');
    };
    const reject = () => {
      popup.remove();
      stopRingSound();
      socket.emit('reject-call', { fromId: from });
    };
    popup.querySelector('#acceptCallBtn').onclick = accept;
    popup.querySelector('#rejectCallBtn').onclick = reject;
    setTimeout(() => {
      if (document.body.contains(popup)) reject();
    }, 30000);
  }

  let ringInterval = null;
  function playRingSound() {
    try {
      ringInterval = setInterval(() => {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 440;
        gain.gain.value = 0.3;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.stop(ctx.currentTime + 0.5);
      }, 1500);
    } catch(e) {}
  }
  function stopRingSound() {
    if (ringInterval) clearInterval(ringInterval);
    ringInterval = null;
  }

  // ========== START CALL (from contacts) ==========
  window.startCall = (targetId, targetName) => {
    if (callState !== 'idle') { showToast('Уже есть активный звонок', true); return; }
    callState = 'calling';
    localStorage.setItem('callData', JSON.stringify({
      type: 'personal',
      myUserId: currentUser.userId,
      myUsername: currentUser.username,
      targetId,
      targetName,
      callType: 'video',
      isIncoming: false,
      iceServers
    }));
    socket.emit('call-user', { targetId, callType: 'video' });
    window.open('/call', '_blank', 'width=1000,height=700');
    setTimeout(() => { if (callState === 'calling') callState = 'idle'; }, 5000);
  };

  // ========== GROUP FUNCTIONS ==========
  function openGroupModal() {
    document.getElementById('groupModal').classList.remove('hidden');
  }
  function closeGroupModal() {
    document.getElementById('groupModal').classList.add('hidden');
  }
  function createGroup() {
    const groupName = document.getElementById('groupNameInput').value.trim();
    if (!groupName) { showToast('Введите название группы', true); return; }
    const groupId = `grp_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
    socket.emit('create-group', { groupName, groupId });
    localStorage.setItem('callData', JSON.stringify({
      type: 'group',
      myUserId: currentUser.userId,
      myUsername: currentUser.username,
      groupId,
      groupName,
      isHost: true,
      iceServers
    }));
    closeGroupModal();
    window.open('/call', '_blank', 'width=1000,height=700');
  }
  window.joinGroup = (groupId, groupName) => {
    localStorage.setItem('callData', JSON.stringify({
      type: 'group',
      myUserId: currentUser.userId,
      myUsername: currentUser.username,
      groupId,
      groupName,
      isHost: false,
      iceServers
    }));
    socket.emit('join-group-request', { groupId });
    window.open('/call', '_blank', 'width=1000,height=700');
  };

  // ========== LOAD GROUPS ==========
  function loadGroups() {
    socket.emit('get-groups');
  }

  // ========== ESCAPE HTML ==========
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  // ========== SAVE USER ==========
  const saved = localStorage.getItem('craheapp_user');
  if (saved) {
    try {
      const u = JSON.parse(saved);
      document.getElementById('regUsername').value = u.name;
      document.getElementById('regUserId').value = u.id;
    } catch(e) {}
  }

  window.addEventListener('resize', () => {
    if (window.innerWidth > 680) sidebar.classList.remove('open');
  });
</script>
</body>
</html>
