<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Craheapp Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f18;
            color: #e6edf3;
            height: 100vh;
            overflow: hidden;
        }

        /* ========== АВТОРИЗАЦИЯ ========== */
        .auth-container {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f0f18 0%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .auth-card {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(122, 92, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .auth-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #7a5cff, #ff5ad6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
        }
        .auth-card h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #7a5cff, #ff5ad6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .auth-sub {
            color: #8b949e;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a2e;
            border: 1px solid #7a5cff;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
            transition: 0.2s;
        }
        .auth-input:focus {
            border-color: #ff5ad6;
            box-shadow: 0 0 0 2px rgba(122, 92, 255, 0.2);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7a5cff, #ff5ad6);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .auth-btn:active { transform: scale(0.98); }

        /* ========== ОСНОВНОЙ ИНТЕРФЕЙС ========== */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: #0f0f18;
        }
        .telegram-header {
            background: #1a1a2e;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #7a5cff;
            flex-shrink: 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 18px;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #7a5cff, #ff5ad6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #7a5cff, #ff5ad6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
        }
        .mobile-menu-btn {
            display: none;
            background: #7a5cff;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            color: white;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            background: #1a1a2e;
            border-bottom: 1px solid #7a5cff;
            flex-shrink: 0;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            color: #8b949e;
        }
        .tab.active {
            color: #ff5ad6;
            border-bottom: 2px solid #ff5ad6;
        }
        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }
        .tab-content.active {
            display: flex;
        }

        /* Контакты */
        .contacts-sidebar, .groups-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .contacts-header {
            padding: 16px;
            border-bottom: 1px solid #7a5cff;
            font-weight: 600;
        }
        .contacts-list, .groups-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .contact-item, .group-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
            background: #1a1a2e;
        }
        .contact-item:hover, .group-item:hover { background: #2a2a3a; }
        .contact-avatar, .group-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #7a5cff, #ff5ad6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .contact-info, .group-info {
            flex: 1;
            min-width: 0;
        }
        .contact-name, .group-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .contact-status {
            font-size: 11px;
            color: #7a5cff;
        }
        .call-buttons {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .call-icon {
            background: #7a5cff;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
        }
        .call-icon:active { transform: scale(0.94); }

        /* Создание группы */
        .create-group {
            padding: 12px;
            border-bottom: 1px solid #7a5cff;
            display: flex;
            gap: 8px;
        }
        .create-group input {
            flex: 1;
            padding: 10px;
            background: #1a1a2e;
            border: 1px solid #7a5cff;
            border-radius: 20px;
            color: white;
            font-size: 14px;
        }
        .create-group button {
            background: #7a5cff;
            border: none;
            padding: 0 20px;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            font-weight: 500;
        }

        /* Уведомления */
        .notification {
            position: fixed;
            top: 70px;
            left: 20px;
            right: 20px;
            background: #1a1a2e;
            border-left: 4px solid #7a5cff;
            border-radius: 16px;
            padding: 12px 16px;
            text-align: center;
            font-size: 14px;
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .logo span { display: none; }
            .user-name { display: none; }
            .contacts-sidebar, .groups-list {
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                height: 100%;
                z-index: 400;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                background: #0f0f18;
                border-right: 1px solid #7a5cff;
            }
            .contacts-sidebar.open, .groups-list.open {
                transform: translateX(0);
            }
            .call-icon {
                width: 44px;
                height: 44px;
                font-size: 22px;
            }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
<div id="authContainer" class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">📞</div>
        <h1>Craheapp</h1>
        <div class="auth-sub">Видеозвонки без ограничений</div>
        <input type="text" id="regUsername" class="auth-input" placeholder="Ваше имя" autocomplete="off">
        <input type="text" id="regUserId" class="auth-input" placeholder="Ваш ID" autocomplete="off">
        <button class="auth-btn" id="registerBtn">Войти</button>
        <div class="auth-sub" style="margin-top: 16px; font-size: 11px;">Скажите свой ID собеседнику</div>
    </div>
</div>

<div id="appContainer" class="app-container hidden">
    <div class="telegram-header">
        <button class="mobile-menu-btn" id="menuBtn">☰</button>
        <div class="logo">
            <div class="logo-icon">📞</div>
            <span>Craheapp</span>
        </div>
        <div class="user-info">
            <span class="user-name" id="currentUserName"></span>
            <div class="avatar" id="userAvatar"></div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="contacts">Контакты</div>
        <div class="tab" data-tab="groups">Групповые звонки</div>
    </div>

    <div class="tab-content active" id="tab-contacts">
        <div class="contacts-sidebar">
            <div class="contacts-header">Контакты онлайн</div>
            <div class="contacts-list" id="contactsList"></div>
        </div>
    </div>
    <div class="tab-content" id="tab-groups">
        <div class="create-group">
            <input type="text" id="groupNameInput" placeholder="Название конференции">
            <button id="createGroupBtn">Создать</button>
        </div>
        <div class="groups-list" id="groupsList"></div>
    </div>
</div>

<div id="contactsOverlay" class="hidden" style="position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); z-index: 399;"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ========== Глобальные переменные ==========
    let socket = null;
    let currentUser = null;
    let activeCallWindow = null; // ссылка на окно звонка

    // DOM элементы
    const authContainer = document.getElementById('authContainer');
    const appContainer = document.getElementById('appContainer');
    const registerBtn = document.getElementById('registerBtn');
    const contactsList = document.getElementById('contactsList');
    const groupsList = document.getElementById('groupsList');
    const menuBtn = document.getElementById('menuBtn');
    const contactsOverlay = document.getElementById('contactsOverlay');
    const tabBtns = document.querySelectorAll('.tab');
    const tabContents = document.querySelectorAll('.tab-content');

    // Вспомогательные функции
    function showNotification(msg, isError = false) {
        const n = document.createElement('div');
        n.className = 'notification';
        n.style.borderLeftColor = isError ? '#ff5252' : '#7a5cff';
        n.textContent = msg;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }

    function closeMobileMenu() {
        document.querySelectorAll('.contacts-sidebar, .groups-list').forEach(el => el.classList.remove('open'));
        contactsOverlay.classList.add('hidden');
    }
    function openMobileMenu() {
        if (window.innerWidth <= 768) {
            const activeTab = document.querySelector('.tab.active').dataset.tab;
            const target = activeTab === 'contacts' ? document.querySelector('#tab-contacts .contacts-sidebar') : document.querySelector('#tab-groups .groups-list');
            if (target) target.classList.add('open');
            contactsOverlay.classList.remove('hidden');
        }
    }
    menuBtn?.addEventListener('click', openMobileMenu);
    contactsOverlay.addEventListener('click', closeMobileMenu);
    window.addEventListener('resize', () => { if (window.innerWidth > 768) closeMobileMenu(); });

    // Переключение вкладок
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.dataset.tab;
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            tabContents.forEach(tc => tc.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            closeMobileMenu();
            if (tabId === 'groups') loadGroups();
        });
    });

    // Регистрация
    registerBtn.addEventListener('click', async () => {
        const username = document.getElementById('regUsername').value.trim();
        const userId = document.getElementById('regUserId').value.trim();
        if (!username || !userId) return showNotification('Заполните все поля', true);
        currentUser = { id: userId, name: username };
        const resp = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, userId })
        });
        if (resp.ok) {
            localStorage.setItem('craheapp_user', JSON.stringify(currentUser));
            socket = io({ transports: ['websocket', 'polling'] });
            socket.on('connect', () => {
                socket.emit('register', { userId, username });
            });
            setupSocketListeners();
            authContainer.classList.add('hidden');
            appContainer.classList.remove('hidden');
            document.getElementById('currentUserName').textContent = username;
            document.getElementById('userAvatar').textContent = username[0].toUpperCase();
        } else {
            showNotification('Ошибка регистрации', true);
        }
    });

    // Настройка сокетов
    function setupSocketListeners() {
        socket.on('user-list', (users) => {
            renderContacts(users.filter(u => u.userId !== currentUser.id));
        });
        socket.on('group-list', (groups) => {
            renderGroups(groups);
        });
        socket.on('incoming-call', (data) => {
            // Проверяем, нет ли уже активного звонка (окно звонка открыто)
            if (activeCallWindow && !activeCallWindow.closed) {
                socket.emit('call:reject', { fromId: data.from });
                return;
            }
            showNotification(`Входящий видеозвонок от ${data.fromName}`, false);
            localStorage.setItem('craheapp_call', JSON.stringify({
                type: 'personal',
                targetId: data.from,
                targetName: data.fromName,
                isVideo: true,
                isIncoming: true,
                myUserId: currentUser.id,
                myUsername: currentUser.name
            }));
            activeCallWindow = window.open('/call.html', '_blank');
            // Сброс, если окно закрыто
            const checkClosed = setInterval(() => {
                if (activeCallWindow && activeCallWindow.closed) {
                    clearInterval(checkClosed);
                    activeCallWindow = null;
                }
            }, 500);
        });
        socket.on('group-created', (data) => {
            loadGroups();
            showNotification(`Группа "${data.groupName}" создана`);
        });
        socket.on('admitted-to-group', (data) => {
            showNotification(`Вас пустили в группу "${data.groupName}"`);
        });
        socket.on('rejected-from-group', () => {
            showNotification('Вас не пустили в группу', true);
        });
    }

    // Рендер контактов (только видеозвонки)
    function renderContacts(users) {
        if (!users.length) {
            contactsList.innerHTML = '<div style="padding:20px;text-align:center;color:#8b949e;">Нет пользователей онлайн</div>';
            return;
        }
        contactsList.innerHTML = users.map(u => `
            <div class="contact-item" data-user-id="${u.userId}">
                <div class="contact-avatar">${escapeHtml(u.username[0].toUpperCase())}</div>
                <div class="contact-info">
                    <div class="contact-name">${escapeHtml(u.username)}</div>
                    <div class="contact-status">● Онлайн</div>
                </div>
                <div class="call-buttons">
                    <button class="call-icon" onclick="startVideoCall('${u.userId}', '${escapeHtml(u.username)}')">📹</button>
                </div>
            </div>
        `).join('');
    }

    // Начать видеозвонок
    window.startVideoCall = (targetId, targetName) => {
        // Нельзя звонить самому себе
        if (targetId === currentUser.id) {
            showNotification('Нельзя позвонить самому себе', true);
            return;
        }
        // Проверяем, не открыто ли уже окно звонка
        if (activeCallWindow && !activeCallWindow.closed) {
            showNotification('Уже есть активный звонок', true);
            return;
        }
        localStorage.setItem('craheapp_call', JSON.stringify({
            type: 'personal',
            targetId: targetId,
            targetName: targetName,
            isVideo: true,
            isIncoming: false,
            myUserId: currentUser.id,
            myUsername: currentUser.name
        }));
        activeCallWindow = window.open('/call.html', '_blank');
        socket.emit('call:start', { targetId, callType: 'video' });
        // Следим за закрытием окна
        const checkClosed = setInterval(() => {
            if (activeCallWindow && activeCallWindow.closed) {
                clearInterval(checkClosed);
                activeCallWindow = null;
                // Если звонок не был завершён, отправляем сигнал завершения
                socket.emit('call:end', { targetId });
            }
        }, 500);
    };

    // Рендер групп
    function renderGroups(groups) {
        if (!groups.length) {
            groupsList.innerHTML = '<div style="padding:20px;text-align:center;color:#8b949e;">Нет активных конференций</div>';
            return;
        }
        groupsList.innerHTML = groups.map(g => `
            <div class="group-item">
                <div class="group-avatar">👥</div>
                <div class="group-info">
                    <div class="group-name">${escapeHtml(g.name)}</div>
                    <div class="contact-status">Участников: ${g.participants}</div>
                </div>
                <button class="call-icon" onclick="joinGroup('${g.groupId}', '${escapeHtml(g.name)}')">🔊</button>
            </div>
        `).join('');
    }

    // Присоединиться к группе
    window.joinGroup = (groupId, groupName) => {
        if (activeCallWindow && !activeCallWindow.closed) {
            showNotification('Уже есть активный звонок', true);
            return;
        }
        localStorage.setItem('craheapp_call', JSON.stringify({
            type: 'group',
            groupId: groupId,
            groupName: groupName,
            isIncoming: false,
            myUserId: currentUser.id,
            myUsername: currentUser.name
        }));
        activeCallWindow = window.open('/call.html', '_blank');
        socket.emit('join-group-request', { groupId });
        const checkClosed = setInterval(() => {
            if (activeCallWindow && activeCallWindow.closed) {
                clearInterval(checkClosed);
                activeCallWindow = null;
                socket.emit('leave-group', { groupId });
            }
        }, 500);
    };

    // Создание группы
    document.getElementById('createGroupBtn').addEventListener('click', () => {
        const name = document.getElementById('groupNameInput').value.trim();
        if (!name) return showNotification('Введите название группы', true);
        socket.emit('create-group', { groupName: name });
        document.getElementById('groupNameInput').value = '';
    });

    // Загрузить список групп
    function loadGroups() {
        socket.emit('get-groups');
    }

    // Экранирование HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // Проверка сохранённого пользователя
    const savedUser = localStorage.getItem('craheapp_user');
    if (savedUser) {
        try {
            const user = JSON.parse(savedUser);
            document.getElementById('regUsername').value = user.name;
            document.getElementById('regUserId').value = user.id;
            registerBtn.click();
        } catch(e) {}
    }
</script>
</body>
</html>
