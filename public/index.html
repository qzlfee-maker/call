<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TelegramCall MAX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f1a;
            color: #e6edf3;
            height: 100vh;
            overflow: hidden;
        }
        .auth-container {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .auth-card {
            background: rgba(30, 30, 46, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(46, 166, 255, 0.3);
        }
        .auth-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
        }
        .auth-card h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .auth-sub {
            color: #8b949e;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a2e;
            border: 1px solid #2ea6ff;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
        }
        .auth-input:focus {
            border-color: #0088cc;
            box-shadow: 0 0 0 2px rgba(46,166,255,0.2);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .telegram-header {
            background: #1a1a2e;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2ea6ff;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 18px;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .mobile-menu-btn {
            display: none;
            background: #2ea6ff;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            color: white;
        }
        .tabs {
            display: flex;
            background: #1a1a2e;
            border-bottom: 1px solid #2ea6ff;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-weight: 500;
            color: #8b949e;
        }
        .tab.active {
            color: #2ea6ff;
            border-bottom: 2px solid #2ea6ff;
        }
        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }
        .tab-content.active {
            display: flex;
        }
        .contacts-sidebar, .groups-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .contacts-header {
            padding: 16px;
            border-bottom: 1px solid #2ea6ff;
            font-weight: 600;
        }
        .contacts-list, .groups-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .contact-item, .group-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 14px;
            background: #1a1a2e;
            margin-bottom: 4px;
        }
        .contact-avatar, .group-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .contact-info, .group-info {
            flex: 1;
        }
        .contact-name, .group-name {
            font-weight: 600;
        }
        .contact-status {
            font-size: 11px;
            color: #2ea6ff;
        }
        .call-buttons {
            display: flex;
            gap: 8px;
        }
        .call-icon {
            background: #2ea6ff;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            color: white;
        }
        .create-group {
            padding: 12px;
            border-bottom: 1px solid #2ea6ff;
            display: flex;
            gap: 8px;
        }
        .create-group input {
            flex: 1;
            padding: 10px;
            background: #1a1a2e;
            border: 1px solid #2ea6ff;
            border-radius: 20px;
            color: white;
        }
        .create-group button {
            background: #2ea6ff;
            border: none;
            padding: 0 20px;
            border-radius: 20px;
            cursor: pointer;
            color: white;
        }
        .notification {
            position: fixed;
            top: 70px;
            left: 20px;
            right: 20px;
            background: #1a1a2e;
            border-left: 4px solid #2ea6ff;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            z-index: 1000;
            animation: slideDown 0.3s;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .hidden { display: none; }
        @media (max-width: 768px) {
            .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }
            .logo span { display: none; }
            .user-name { display: none; }
        }
    </style>
</head>
<body>
<div id="authContainer" class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">📞</div>
        <h1>TelegramCall MAX</h1>
        <div class="auth-sub">Все функции звонков бесплатно</div>
        <input type="text" id="regUsername" class="auth-input" placeholder="Ваше имя">
        <input type="text" id="regUserId" class="auth-input" placeholder="Ваш ID">
        <button class="auth-btn" id="registerBtn">Зарегистрироваться</button>
        <div class="auth-sub" style="margin-top: 16px; font-size: 11px;">Скажите свой ID собеседнику</div>
    </div>
</div>

<div id="appContainer" class="app-container hidden">
    <div class="telegram-header">
        <button class="mobile-menu-btn" id="menuBtn">☰</button>
        <div class="logo"><div class="logo-icon">📞</div><span>TelegramCall MAX</span></div>
        <div class="user-info"><span class="user-name" id="currentUserName"></span><div class="avatar" id="userAvatar"></div></div>
    </div>
    <div class="tabs">
        <div class="tab active" data-tab="contacts">Личные звонки</div>
        <div class="tab" data-tab="groups">Групповые конференции</div>
    </div>
    <div class="tab-content active" id="tab-contacts">
        <div class="contacts-sidebar">
            <div class="contacts-header">Контакты онлайн</div>
            <div class="contacts-list" id="contactsList"></div>
        </div>
    </div>
    <div class="tab-content" id="tab-groups">
        <div class="create-group"><input type="text" id="groupNameInput" placeholder="Название конференции"><button id="createGroupBtn">Создать</button></div>
        <div class="groups-list" id="groupsList"></div>
    </div>
</div>
<div id="contactsOverlay" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:399;"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket = null;
    let currentUser = null;

    const authContainer = document.getElementById('authContainer');
    const appContainer = document.getElementById('appContainer');
    const registerBtn = document.getElementById('registerBtn');
    const contactsList = document.getElementById('contactsList');
    const groupsList = document.getElementById('groupsList');
    const menuBtn = document.getElementById('menuBtn');
    const contactsOverlay = document.getElementById('contactsOverlay');
    const tabBtns = document.querySelectorAll('.tab');
    const tabContents = document.querySelectorAll('.tab-content');

    function showNotification(msg, isError = false) {
        const n = document.createElement('div');
        n.className = 'notification';
        n.style.borderLeftColor = isError ? '#dc2626' : '#2ea6ff';
        n.textContent = msg;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }

    function closeMobileMenu() {
        document.querySelectorAll('.contacts-sidebar, .groups-list').forEach(el => el.classList.remove('open'));
        contactsOverlay.classList.add('hidden');
    }
    function openMobileMenu() {
        if (window.innerWidth <= 768) {
            const activeTab = document.querySelector('.tab.active').dataset.tab;
            const target = activeTab === 'contacts' ? document.querySelector('#tab-contacts .contacts-sidebar') : document.querySelector('#tab-groups');
            if (target) target.classList.add('open');
            contactsOverlay.classList.remove('hidden');
        }
    }
    menuBtn?.addEventListener('click', openMobileMenu);
    contactsOverlay.addEventListener('click', closeMobileMenu);
    window.addEventListener('resize', () => { if (window.innerWidth > 768) closeMobileMenu(); });

    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.dataset.tab;
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            tabContents.forEach(tc => tc.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            closeMobileMenu();
            if (tabId === 'groups') loadGroups();
        });
    });

    registerBtn.addEventListener('click', async () => {
        const username = document.getElementById('regUsername').value.trim();
        const userId = document.getElementById('regUserId').value.trim();
        if (!username || !userId) return showNotification('Заполните все поля', true);
        currentUser = { username, userId };
        const resp = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, userId })
        });
        if (resp.ok) {
            socket = io({ transports: ['websocket', 'polling'] });
            socket.on('connect', () => {
                socket.emit('register', { username, userId });
            });
            setupSocketListeners();
            authContainer.classList.add('hidden');
            appContainer.classList.remove('hidden');
            document.getElementById('currentUserName').textContent = username;
            document.getElementById('userAvatar').textContent = username[0].toUpperCase();
        } else showNotification('Ошибка регистрации', true);
    });

    function setupSocketListeners() {
        socket.on('user-list', (users) => renderContacts(users.filter(u => u.userId !== currentUser.userId)));
        socket.on('group-list', (groups) => renderGroups(groups));
        socket.on('incoming-call', (data) => {
            showNotification(`Входящий звонок от ${data.fromName}`, false);
            localStorage.setItem('callData', JSON.stringify({
                type: 'personal',
                targetId: data.from,
                targetName: data.fromName,
                callType: data.callType,
                isIncoming: true,
                myUserId: currentUser.userId,
                myUsername: currentUser.username
            }));
            window.open('/call.html', '_blank');
        });
        // групповые события тоже могут приходить, но они будут обрабатываться на странице звонка
        socket.on('group-created', (data) => { loadGroups(); showNotification(`Группа "${data.groupName}" создана`); });
        socket.on('admitted-to-group', (data) => {
            // если страница звонка уже открыта, она получит это событие, но здесь просто уведомление
            showNotification(`Вас пустили в группу "${data.groupName}"`);
        });
    }

    function renderContacts(users) {
        if (!users.length) { contactsList.innerHTML = '<div style="padding:20px;text-align:center;color:#8b949e;">Нет пользователей онлайн</div>'; return; }
        contactsList.innerHTML = users.map(u => `
            <div class="contact-item">
                <div class="contact-avatar">${escapeHtml(u.username[0].toUpperCase())}</div>
                <div class="contact-info"><div class="contact-name">${escapeHtml(u.username)}</div><div class="contact-status">● Онлайн</div></div>
                <div class="call-buttons">
                    <button class="call-icon" onclick="startPersonalCall('${u.userId}', '${escapeHtml(u.username)}', 'audio')">🎙️</button>
                    <button class="call-icon" onclick="startPersonalCall('${u.userId}', '${escapeHtml(u.username)}', 'video')">📹</button>
                </div>
            </div>`).join('');
    }

    window.startPersonalCall = (targetId, targetName, callType) => {
        localStorage.setItem('callData', JSON.stringify({
            type: 'personal',
            targetId: targetId,
            targetName: targetName,
            callType: callType,
            isIncoming: false,
            myUserId: currentUser.userId,
            myUsername: currentUser.username
        }));
        window.open('/call.html', '_blank');
        socket.emit('call-user', { targetId, callType });
    };

    function renderGroups(groups) {
        if (!groups.length) { groupsList.innerHTML = '<div style="padding:20px;text-align:center;color:#8b949e;">Нет активных конференций</div>'; return; }
        groupsList.innerHTML = groups.map(g => `
            <div class="group-item">
                <div class="group-avatar">👥</div>
                <div class="group-info"><div class="group-name">${escapeHtml(g.name)}</div><div class="contact-status">Участников: ${g.participants}</div></div>
                <button class="call-icon" onclick="joinGroup('${g.groupId}', '${escapeHtml(g.name)}')">🔊</button>
            </div>`).join('');
    }

    window.joinGroup = (groupId, groupName) => {
        localStorage.setItem('callData', JSON.stringify({
            type: 'group',
            groupId: groupId,
            groupName: groupName,
            myUserId: currentUser.userId,
            myUsername: currentUser.username
        }));
        window.open('/call.html', '_blank');
        socket.emit('join-group-request', { groupId });
    };

    document.getElementById('createGroupBtn').addEventListener('click', () => {
        const name = document.getElementById('groupNameInput').value.trim();
        if (!name) return showNotification('Введите название группы', true);
        socket.emit('create-group', { groupName: name });
        document.getElementById('groupNameInput').value = '';
    });

    function loadGroups() { socket.emit('get-groups'); }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
</script>
</body>
</html>
