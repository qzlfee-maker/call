<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craheapp Messenger</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --tg-blue: #248bcf;
            --tg-bg: #0f1721;
            --tg-sidebar: #17212b;
            --tg-chat-bg: #0e1621;
            --tg-hover: #202b36;
            --tg-text: #ffffff;
            --tg-text-muted: #708499;
            --tg-sent-msg: #2b5278;
            --tg-border: #111923;
            --tg-green: #4cd964;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--tg-bg);
            color: var(--tg-text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- AUTH SCREEN --- */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a2a3a, #0f1721);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--tg-sidebar);
            padding: 40px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .auth-logo {
            width: 80px;
            height: 80px;
            background: var(--tg-blue);
            border-radius: 22px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 20px rgba(36, 139, 207, 0.3);
        }

        .auth-card h2 { margin-bottom: 10px; font-size: 24px; }
        .auth-card p { color: var(--tg-text-muted); margin-bottom: 30px; font-size: 15px; }

        input.tg-input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--tg-border);
            background: var(--tg-bg);
            color: white;
            margin-bottom: 20px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input.tg-input:focus { border-color: var(--tg-blue); }

        .btn-tg {
            width: 100%;
            padding: 16px;
            background: var(--tg-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: filter 0.2s;
        }

        .btn-tg:hover { filter: brightness(1.1); }

        /* --- MAIN APP --- */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .sidebar {
            width: 380px;
            background: var(--tg-sidebar);
            border-right: 1px solid var(--tg-border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 20px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .search-container {
            padding: 0 15px 15px;
        }

        .search-box {
            background: var(--tg-bg);
            border-radius: 10px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            width: 100%;
            outline: none;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
        }

        .user-item {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .user-item:hover { background: var(--tg-hover); }
        .user-item.active { background: var(--tg-blue); }

        .avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: linear-gradient(135deg, #50a7ea, #248bcf);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 20px;
            flex-shrink: 0;
            position: relative;
        }

        .online-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--tg-green);
            border: 2px solid var(--tg-sidebar);
            border-radius: 50%;
        }

        .user-info-col {
            flex: 1;
            overflow: hidden;
        }

        .user-info-col h4 {
            font-size: 16px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .last-msg {
            font-size: 14px;
            color: var(--tg-text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- CHAT SECTION --- */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--tg-chat-bg);
            position: relative;
        }

        .chat-header {
            height: 64px;
            background: var(--tg-sidebar);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--tg-border);
            z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        
        .back-icon {
            display: none;
            cursor: pointer;
            padding: 5px;
        }

        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: 400px;
        }

        .msg {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        .msg-received {
            align-self: flex-start;
            background: var(--tg-sidebar);
            border-bottom-left-radius: 4px;
        }

        .msg-sent {
            align-self: flex-end;
            background: var(--tg-sent-msg);
            border-bottom-right-radius: 4px;
        }

        .chat-input-bar {
            padding: 10px 20px calc(10px + var(--safe-bottom));
            background: var(--tg-sidebar);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .msg-input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            padding: 10px 0;
        }

        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .action-btn:hover { background: rgba(255,255,255,0.05); }
        .action-btn svg { fill: var(--tg-text-muted); width: 24px; height: 24px; }
        .btn-send svg { fill: var(--tg-blue); }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                inset: 0;
                width: 100%;
            }
            .sidebar.shifted { transform: translateX(-100%); }
            .back-icon { display: block; }
        }

        .hidden { display: none !important; }
        .empty-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--tg-text-muted);
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="auth-logo">C</div>
            <h2>Craheapp</h2>
            <p>Ваш новый уровень общения</p>
            <input type="text" id="reg-name" class="tg-input" placeholder="Введите имя...">
            <button class="btn-tg" onclick="handleLogin()">Начать общение</button>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar" id="app-sidebar">
            <div class="sidebar-header">
                <h3>Чаты</h3>
                <div class="action-btn" onclick="logout()">
                   <svg viewBox="0 0 24 24"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
                </div>
            </div>
            <div class="search-container">
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--tg-text-muted)"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="text" placeholder="Поиск контактов...">
                </div>
            </div>
            <div class="user-list" id="users-container">
                </div>
        </aside>

        <main class="chat-area">
            <div id="chat-idle" class="empty-placeholder">
                <span>Выберите чат, чтобы начать переписку</span>
            </div>

            <div id="chat-active" class="hidden" style="height: 100%; display: none; flex-direction: column;">
                <header class="chat-header">
                    <div class="header-left">
                        <div class="back-icon" onclick="goBack()">
                            <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                        </div>
                        <div class="avatar" id="chat-title-avatar" style="width: 42px; height: 42px; font-size: 16px;"></div>
                        <div>
                            <div id="chat-title-name" style="font-weight: 600; font-size: 16px;"></div>
                            <div id="chat-title-status" class="last-msg" style="color: var(--tg-blue);">в сети</div>
                        </div>
                    </div>
                    <div class="header-right">
                        <button class="action-btn" onclick="startVoiceCall()">
                            <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                        </button>
                    </div>
                </header>

                <div class="chat-body" id="messages-list">
                    </div>

                <div class="chat-input-bar">
                    <button class="action-btn">
                        <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/></svg>
                    </button>
                    <input type="text" id="main-input" class="msg-input-field" placeholder="Сообщение...">
                    <button class="action-btn btn-send" onclick="sendTextMessage()">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        let me = JSON.parse(localStorage.getItem('craheapp_user')) || null;
        let selectedUser = null;

        // Авторизация
        function handleLogin() {
            const name = document.getElementById('reg-name').value.trim();
            if (!name) return;

            me = {
                id: 'id_' + Math.random().toString(36).substr(2, 9),
                name: name
            };

            localStorage.setItem('craheapp_user', JSON.stringify(me));
            document.getElementById('auth-overlay').classList.add('hidden');
            startApp();
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // Запуск
        if (me) {
            document.getElementById('auth-overlay').classList.add('hidden');
            startApp();
        }

        function startApp() {
            // Обязательная регистрация на сервере
            socket.emit('call:register', { userId: me.id, username: me.name });
            socket.emit('get-users');
        }

        // Получение списка пользователей
        socket.on('user-list', (users) => {
            const container = document.getElementById('users-container');
            container.innerHTML = '';

            users.forEach(u => {
                if (u.userId === me.id) return;

                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `
                    <div class="avatar">${u.username[0].toUpperCase()}<div class="online-badge"></div></div>
                    <div class="user-info-col">
                        <h4>${u.username}</h4>
                        <p class="last-msg">Нажмите, чтобы написать...</p>
                    </div>
                `;
                div.onclick = () => selectChat(u);
                container.appendChild(div);
            });
        });

        function selectChat(user) {
            selectedUser = user;
            document.getElementById('chat-idle').classList.add('hidden');
            const active = document.getElementById('chat-active');
            active.style.display = 'flex';
            active.classList.remove('hidden');

            document.getElementById('chat-title-name').innerText = user.username;
            document.getElementById('chat-title-avatar').innerText = user.username[0].toUpperCase();
            document.getElementById('messages-list').innerHTML = '';

            if (window.innerWidth <= 768) {
                document.getElementById('app-sidebar').classList.add('shifted');
            }
        }

        function goBack() {
            document.getElementById('app-sidebar').classList.remove('shifted');
        }

        // ТЕКСТОВЫЕ СООБЩЕНИЯ (ФИКС)
        function sendTextMessage() {
            const input = document.getElementById('main-input');
            const text = input.value.trim();
            if (!text || !selectedUser) return;

            // 1. Отображаем у себя
            appendMessage(text, 'sent');
            
            // 2. Шлем через сервер
            socket.emit('chat:message', {
                to: selectedUser.userId,
                text: text,
                fromName: me.name
            });

            input.value = '';
        }

        socket.on('chat:message', (data) => {
            // Если пришло сообщение от того, с кем открыт чат
            if (selectedUser && data.fromId === selectedUser.userId) {
                appendMessage(data.text, 'received');
            } else {
                // Если чат с ним не открыт - можно показать уведомление
                console.log("Новое сообщение от " + data.fromName);
            }
        });

        function appendMessage(text, type) {
            const list = document.getElementById('messages-list');
            const div = document.createElement('div');
            div.className = `msg msg-${type}`;
            div.innerText = text;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        // ЗВОНКИ (ФИКС СОЕДИНЕНИЯ)
        function startVoiceCall() {
            if (!selectedUser) return;

            // Сохраняем данные для call.html
            const callObj = {
                type: 'private',
                targetUserId: selectedUser.userId,
                targetUsername: selectedUser.username,
                isIncoming: false
            };

            localStorage.setItem('craheapp_call', JSON.stringify(callObj));
            
            // Открываем окно звонка
            window.open('/call.html', 'callWindow', 'width=400,height=700');
        }

        // Входящий звонок
        socket.on('call:request', (data) => {
            const callObj = {
                type: 'private',
                fromUserId: data.from,
                fromUsername: data.fromName,
                isIncoming: true
            };
            localStorage.setItem('craheapp_call', JSON.stringify(callObj));
            window.open('/call.html', 'callWindow', 'width=400,height=700');
        });

        // Отправка по Enter
        document.getElementById('main-input').onkeypress = (e) => {
            if (e.key === 'Enter') sendTextMessage();
        }
    </script>
</body>
</html>
