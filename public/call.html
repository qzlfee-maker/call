<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craheapp Secure Call</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* =========================================
           UI/UX ДИЗАЙН: TELEGRAM / DISCORD STYLE
           ========================================= */
        :root {
            /* Цветовая палитра */
            --bg-base: #0f0f18;
            --bg-surface: #1a1a2e;
            --bg-overlay: rgba(15, 15, 24, 0.85);
            --accent-purple: #7a5cff;
            --accent-pink: #ff5ad6;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --danger: #ff4b4b;
            --success: #33d176;
            --glass-bg: rgba(26, 26, 46, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            
            /* Тайминги */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* --- ГЛОБАЛЬНЫЕ КОНТЕЙНЕРЫ --- */
        .call-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 50%, #1e1e36 0%, #0f0f18 100%);
        }

        /* --- АНИМАЦИИ --- */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        @keyframes slide-up {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- ЭКРАНЫ ОЖИДАНИЯ (INCOMING / OUTGOING) --- */
        .overlay-screen {
            position: absolute;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-overlay);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-normal);
        }

        .overlay-screen.active {
            opacity: 1;
            pointer-events: all;
        }

        .avatar-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 30px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            position: relative;
            z-index: 2;
            box-shadow: 0 10px 30px rgba(122, 92, 255, 0.4);
            object-fit: cover;
        }

        .pulse {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: var(--accent-purple);
            z-index: 1;
            animation: pulse-ring 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        .pulse.delay { animation-delay: 0.5s; }

        .peer-name { font-size: 32px; font-weight: 600; margin-bottom: 10px; text-align: center; }
        .call-status-text { font-size: 16px; color: var(--text-secondary); letter-spacing: 0.5px; margin-bottom: 50px;}

        /* --- СЕТКА ВИДЕО (ACTIVE CALL) --- */
        .video-grid {
            flex: 1;
            display: grid;
            gap: 16px;
            padding: 16px;
            width: 100%;
            height: 100%;
            transition: var(--transition-normal);
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }

        /* Динамическая сетка для групповых звонков */
        .video-grid[data-users="2"] { grid-template-columns: 1fr 1fr; }
        .video-grid[data-users="3"], .video-grid[data-users="4"] { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .video-grid[data-users="5"], .video-grid[data-users="6"] { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }

        .video-cell {
            position: relative;
            background: var(--bg-surface);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
        }

        .video-element {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        .video-element.mirrored { transform: scaleX(-1); }

        .user-label {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        /* --- ПЛАВАЮЩЕЕ ОКНО (PIP) --- */
        .pip-container {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 160px;
            height: 240px;
            background: var(--bg-surface);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
            z-index: 50;
            cursor: grab;
            transition: border-color var(--transition-fast);
        }

        .pip-container:active { cursor: grabbing; border-color: var(--accent-purple); }
        .pip-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* --- ПАНЕЛЬ УПРАВЛЕНИЯ --- */
        .controls-wrapper {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .controls-wrapper.hidden {
            opacity: 0;
            transform: translate(-50%, 20px);
            pointer-events: none;
        }

        .controls-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 12px 24px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 16px 40px rgba(0,0,0,0.4);
        }

        .ctrl-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            position: relative;
        }

        .ctrl-btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
        .ctrl-btn:active { transform: translateY(0) scale(0.95); }
        .ctrl-btn svg { width: 24px; height: 24px; fill: currentColor; }
        
        /* Состояния кнопок */
        .ctrl-btn.danger { background: var(--danger); }
        .ctrl-btn.danger:hover { background: #ff6b6b; }
        .ctrl-btn.success { background: var(--success); }
        .ctrl-btn.success:hover { background: #45e388; }
        .ctrl-btn.active { background: white; color: black; }
        
        .ctrl-btn.disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

        .hangup-btn { width: 72px; height: 72px; border-radius: 24px; }
        .hangup-btn svg { width: 32px; height: 32px; }

        /* --- УВЕДОМЛЕНИЯ / ОШИБКИ --- */
        .toast-container {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 2000;
            pointer-events: none;
        }

        .toast {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            animation: slide-up 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.error { border-left: 4px solid var(--danger); }
        .toast.info { border-left: 4px solid var(--accent-purple); }

        /* --- ПАНЕЛЬ НАСТРОЕК --- */
        .settings-panel {
            position: absolute;
            top: 0; right: -350px;
            width: 320px;
            height: 100%;
            background: var(--bg-surface);
            border-left: 1px solid var(--glass-border);
            z-index: 500;
            padding: 24px;
            transition: var(--transition-normal);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .settings-panel.open { right: 0; }
        
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 20px;
            font-weight: 600;
        }

        .settings-group { margin-bottom: 20px; }
        .settings-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
        .settings-select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            appearance: none;
        }
        .settings-select:focus { border-color: var(--accent-purple); }

        .close-settings { cursor: pointer; color: var(--text-secondary); padding: 5px; }
        .close-settings:hover { color: white; }

        /* Иконки статуса внутри ячейки видео */
        .status-icon {
            width: 24px; height: 24px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .status-icon svg { width: 14px; height: 14px; fill: var(--danger); }
        .hidden { display: none !important; }
    </style>
</head>

    <script>
        // ----------------------------------------------------
        // 1. СОСТОЯНИЯ И КОНСТАНТЫ
        // ----------------------------------------------------
        const STATES = {
            IDLE: 'idle',
            CALLING: 'calling',
            RINGING: 'ringing',
            CONNECTING: 'connecting',
            ACTIVE: 'active',
            ENDED: 'ended',
            FAILED: 'failed'
        };

        let callState = STATES.IDLE;
        
        // Сигналинг (Socket.io)
        const socket = io({ transports: ['websocket'], upgrade: false });
        
        // WebRTC Основные переменные
        let localStream = null;
        let screenStream = null;
        let peerConnections = {}; // socketId -> RTCPeerConnection
        
        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ],
            iceCandidatePoolSize: 10
        };

        // UI Флаги
        let isMuted = false;
        let isVideoOff = false;
        let isScreenSharing = false;
        let controlsTimeout = null;

        // Данные пользователя из localStorage
        const me = JSON.parse(localStorage.getItem('craheapp_user') || '{"id":"temp","name":"Guest"}');
        const callIntent = JSON.parse(localStorage.getItem('craheapp_call') || '{}');

        // ----------------------------------------------------
        // 2. DOM ЭЛЕМЕНТЫ
        // ----------------------------------------------------
        const ui = {
            root: document.getElementById('call-root'),
            incomingScreen: document.getElementById('screen-incoming'),
            outgoingScreen: document.getElementById('screen-outgoing'),
            videoGrid: document.getElementById('video-grid'),
            localPip: document.getElementById('local-pip'),
            localVideo: document.getElementById('local-video'),
            controls: document.getElementById('main-controls'),
            settingsPanel: document.getElementById('settings-panel'),
            toastContainer: document.getElementById('toast-container'),
            
            // Кнопки
            btnAccept: document.getElementById('btn-accept'),
            btnReject: document.getElementById('btn-reject'),
            btnCancel: document.getElementById('btn-cancel'),
            btnEnd: document.getElementById('btn-end-call'),
            btnMic: document.getElementById('btn-toggle-mic'),
            btnCam: document.getElementById('btn-toggle-cam'),
            btnShare: document.getElementById('btn-share-screen'),
            btnSettings: document.getElementById('btn-settings'),
            btnCloseSettings: document.getElementById('btn-close-settings'),

            // Аудио
            audioRingtone: document.getElementById('audio-ringtone'),
            audioDialing: document.getElementById('audio-dialing'),
            audioEnded: document.getElementById('audio-ended'),
            audioError: document.getElementById('audio-error'),
            audioMute: document.getElementById('audio-mute')
        };

        // ----------------------------------------------------
        // 3. УТИЛИТЫ И UX
        // ----------------------------------------------------
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            ui.toastContainer.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slide-up 0.3s reverse forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function changeState(newState, meta = {}) {
            console.log(`[STATE] ${callState} -> ${newState}`, meta);
            callState = newState;

            // Сброс всех экранов
            ui.incomingScreen.classList.remove('active');
            ui.outgoingScreen.classList.remove('active');
            ui.controls.classList.add('hidden');
            ui.localPip.classList.add('hidden');
            
            // Остановка звуков
            ui.audioRingtone.pause();
            ui.audioRingtone.currentTime = 0;
            ui.audioDialing.pause();
            ui.audioDialing.currentTime = 0;

            switch(newState) {
                case STATES.RINGING:
                    document.getElementById('incoming-name').innerText = meta.callerName || 'Неизвестный';
                    document.getElementById('incoming-avatar').innerText = (meta.callerName || '?')[0].toUpperCase();
                    ui.incomingScreen.classList.add('active');
                    ui.audioRingtone.play().catch(e => console.log('Autoplay prevented'));
                    break;
                
                case STATES.CALLING:
                    document.getElementById('outgoing-name').innerText = meta.targetName || 'Соединение...';
                    document.getElementById('outgoing-avatar').innerText = (meta.targetName || '?')[0].toUpperCase();
                    ui.outgoingScreen.classList.add('active');
                    ui.audioDialing.play().catch(e => console.log('Autoplay prevented'));
                    break;

                case STATES.CONNECTING:
                    document.getElementById('outgoing-status').innerText = 'Защищенное соединение...';
                    ui.outgoingScreen.classList.add('active');
                    break;

                case STATES.ACTIVE:
                    ui.controls.classList.remove('hidden');
                    ui.localPip.classList.remove('hidden');
                    resetControlsHideTimer();
                    break;

                case STATES.ENDED:
                case STATES.FAILED:
                    const endAudio = newState === STATES.FAILED ? ui.audioError : ui.audioEnded;
                    endAudio.play().catch(e => {});
                    showToast(newState === STATES.FAILED ? 'Ошибка соединения' : 'Звонок завершен');
                    setTimeout(() => window.close(), 1500);
                    break;
            }
        }

        // Авто-скрытие контролов
        function resetControlsHideTimer() {
            if (callState !== STATES.ACTIVE) return;
            ui.controls.classList.remove('hidden');
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (!ui.settingsPanel.classList.contains('open')) {
                    ui.controls.classList.add('hidden');
                }
            }, 3000);
        }

        document.addEventListener('mousemove', resetControlsHideTimer);
        document.addEventListener('click', resetControlsHideTimer);

        // PIP Перетаскивание (Drag & Drop)
        let isDragging = false, startX, startY, initialX, initialY;
        
        ui.localPip.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            const rect = ui.localPip.getBoundingClientRect();
            initialX = rect.left;
            initialY = rect.top;
            ui.localPip.style.transition = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            
            // Ограничения экрана
            const maxX = window.innerWidth - ui.localPip.offsetWidth;
            const maxY = window.innerHeight - ui.localPip.offsetHeight;
            
            let newX = Math.max(0, Math.min(initialX + dx, maxX));
            let newY = Math.max(0, Math.min(initialY + dy, maxY));

            ui.localPip.style.left = `${newX}px`;
            ui.localPip.style.top = `${newY}px`;
            ui.localPip.style.right = 'auto'; // Отключаем привязку к правому краю после перетаскивания
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                ui.localPip.style.transition = 'border-color var(--transition-fast)';
            }
        });

        // Двойной клик для Fullscreen
        document.addEventListener('dblclick', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    showToast("Полноэкранный режим не поддерживается", "error");
                });
            } else {
                document.exitFullscreen();
            }
        });

        // ----------------------------------------------------
        // 4. WEBRTC И МЕДИА ЗАХВАТ
        // ----------------------------------------------------
        async function getMedia(videoDeviceId = null, audioDeviceId = null) {
            const constraints = {
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                    deviceId: audioDeviceId ? { exact: audioDeviceId } : undefined
                },
                video: {
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    frameRate: { ideal: 30 },
                    deviceId: videoDeviceId ? { exact: videoDeviceId } : undefined
                }
            };

            try {
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                ui.localVideo.srcObject = localStream;
                
                // Применяем текущие флаги к новому потоку
                localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
                localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
                
                updateDeviceList();
                return true;
            } catch (err) {
                console.error("Ошибка доступа к медиа:", err);
                showToast("Нет доступа к камере или микрофону. Разрешите в браузере.", "error");
                // Fallback на аудио
                if (err.name === 'NotFoundError' || err.name === 'NotAllowedError') {
                    try {
                        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        ui.localVideo.srcObject = localStream;
                        isVideoOff = true;
                        updateMediaUI();
                        return true;
                    } catch (e) {
                        changeState(STATES.FAILED);
                        return false;
                    }
                }
                return false;
            }
        }

        async function updateDeviceList() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const camSelect = document.getElementById('camera-select');
                const micSelect = document.getElementById('mic-select');
                const speakerSelect = document.getElementById('speaker-select');
                
                [camSelect, micSelect, speakerSelect].forEach(s => s.innerHTML = '');

                devices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `${device.kind} (Default)`;
                    
                    if (device.kind === 'videoinput') camSelect.appendChild(option);
                    else if (device.kind === 'audioinput') micSelect.appendChild(option);
                    else if (device.kind === 'audiooutput') speakerSelect.appendChild(option);
                });
            } catch (err) {
                console.warn("enumerateDevices failed", err);
            }
        }

        function updateMediaUI() {
            const micOn = document.getElementById('icon-mic-on');
            const micOff = document.getElementById('icon-mic-off');
            const camOn = document.getElementById('icon-cam-on');
            const camOff = document.getElementById('icon-cam-off');
            
            if (isMuted) {
                micOn.classList.add('hidden'); micOff.classList.remove('hidden');
                ui.btnMic.classList.add('active');
                document.getElementById('local-mute-icon').classList.remove('hidden');
            } else {
                micOn.classList.remove('hidden'); micOff.classList.add('hidden');
                ui.btnMic.classList.remove('active');
                document.getElementById('local-mute-icon').classList.add('hidden');
            }

            if (isVideoOff) {
                camOn.classList.add('hidden'); camOff.classList.remove('hidden');
                ui.btnCam.classList.add('active');
            } else {
                camOn.classList.remove('hidden'); camOff.classList.add('hidden');
                ui.btnCam.classList.remove('active');
            }
        }

        // ----------------------------------------------------
        // 5. WEBRTC СОЕДИНЕНИЕ И СИГНАЛИНГ
        // ----------------------------------------------------
        function createPeerConnection(targetId, targetName) {
            const pc = new RTCPeerConnection(rtcConfig);
            peerConnections[targetId] = pc;

            // Добавление локальных треков
            if (localStream) {
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            }

            // Обработка удаленных треков
            pc.ontrack = (event) => {
                let remoteVideo = document.getElementById(`video-${targetId}`);
                if (!remoteVideo) {
                    const cell = document.createElement('div');
                    cell.className = 'video-cell';
                    cell.id = `cell-${targetId}`;
                    
                    remoteVideo = document.createElement('video');
                    remoteVideo.id = `video-${targetId}`;
                    remoteVideo.className = 'video-element';
                    remoteVideo.autoplay = true;
                    remoteVideo.playsInline = true;
                    
                    const label = document.createElement('div');
                    label.className = 'user-label';
                    label.innerHTML = `<span>${targetName}</span>`;

                    cell.appendChild(remoteVideo);
                    cell.appendChild(label);
                    ui.videoGrid.appendChild(cell);
                    
                    // Обновляем сетку
                    const count = ui.videoGrid.children.length;
                    ui.videoGrid.setAttribute('data-users', count > 6 ? 6 : count);
                }
                
                if (remoteVideo.srcObject !== event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    if (callState !== STATES.ACTIVE) changeState(STATES.ACTIVE);
                }
            };

            // ICE Кандидаты
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('call:ice-candidate', {
                        to: targetId,
                        candidate: event.candidate
                    });
                }
            };

            // Мониторинг состояния
            pc.onconnectionstatechange = () => {
                console.log(`Connection state to ${targetId}:`, pc.connectionState);
                if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                    cleanupPeer(targetId);
                    if (Object.keys(peerConnections).length === 0) changeState(STATES.ENDED);
                }
            };

            return pc;
        }

        function cleanupPeer(targetId) {
            if (peerConnections[targetId]) {
                peerConnections[targetId].close();
                delete peerConnections[targetId];
            }
            const cell = document.getElementById(`cell-${targetId}`);
            if (cell) cell.remove();
            
            const count = ui.videoGrid.children.length;
            ui.videoGrid.setAttribute('data-users', count);
        }

        function endCallAll() {
            Object.keys(peerConnections).forEach(cleanupPeer);
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (screenStream) screenStream.getTracks().forEach(t => t.stop());
            
            socket.emit('call:end', { to: callIntent.targetUserId || callIntent.fromUserId });
            changeState(STATES.ENDED);
        }

        // ----------------------------------------------------
        // 6. ОБРАБОТЧИКИ СОБЫТИЙ СИГНАЛИНГА (SOCKET)
        // ----------------------------------------------------
        
        // Регистрация на сервере
        socket.emit('call:register', { userId: me.id, username: me.name });

        socket.on('call:accepted', async (data) => {
            if (callState !== STATES.CALLING) return;
            changeState(STATES.CONNECTING);
            
            const targetId = callIntent.targetUserId;
            const targetName = callIntent.targetUsername;
            
            const pc = createPeerConnection(targetId, targetName);
            try {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                socket.emit('call:offer', { to: targetId, offer: offer, from: me.id });
            } catch (err) {
                console.error("Offer creation failed", err);
                changeState(STATES.FAILED);
            }
        });

        socket.on('call:offer', async (data) => {
            const { offer, from } = data;
            const targetName = callIntent.isIncoming ? callIntent.fromUsername : "User";
            
            let pc = peerConnections[from];
            if (!pc) pc = createPeerConnection(from, targetName);
            
            try {
                await pc.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('call:answer', { to: from, answer: answer });
                changeState(STATES.ACTIVE);
            } catch (err) {
                console.error("Answer creation failed", err);
            }
        });

        socket.on('call:answer', async (data) => {
            const pc = peerConnections[callIntent.targetUserId];
            if (pc) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });

        socket.on('call:ice-candidate', async (data) => {
            // Для упрощения извлекаем ID из конфигурации или объекта (в реальном приложении нужно передавать from)
            const targetId = callIntent.isIncoming ? callIntent.fromUserId : callIntent.targetUserId;
            const pc = peerConnections[targetId];
            if (pc && pc.remoteDescription) {
                try {
                    await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch (e) {
                    console.error("Error adding received ice candidate", e);
                }
            }
        });

        socket.on('call:ended', () => {
            showToast("Собеседник завершил звонок", "info");
            endCallAll();
        });

        // ----------------------------------------------------
        // 7. ИНИЦИАЛИЗАЦИЯ И ОБРАБОТЧИКИ КНОПОК UI
        // ----------------------------------------------------
        async function init() {
            if (!me.id || Object.keys(callIntent).length === 0) {
                showToast("Некорректные параметры вызова", "error");
                setTimeout(() => window.close(), 2000);
                return;
            }

            const mediaSuccess = await getMedia();
            if (!mediaSuccess) return;

            if (callIntent.isIncoming) {
                changeState(STATES.RINGING, { callerName: callIntent.fromUsername });
            } else {
                changeState(STATES.CALLING, { targetName: callIntent.targetUsername });
                // Отправляем запрос на звонок
                socket.emit('call:request', {
                    to: callIntent.targetUserId,
                    from: me.id,
                    fromName: me.name
                });
            }
        }

        // Кнопки интерфейса звонка
        ui.btnAccept.onclick = () => {
            ui.audioRingtone.pause();
            changeState(STATES.CONNECTING);
            socket.emit('call:accept', { to: callIntent.fromUserId, from: me.id });
        };

        ui.btnReject.onclick = () => {
            socket.emit('call:end', { to: callIntent.fromUserId });
            changeState(STATES.ENDED);
        };

        ui.btnCancel.onclick = endCallAll;
        ui.btnEnd.onclick = endCallAll;

        // Кнопки управления медиа
        ui.btnMic.onclick = () => {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            updateMediaUI();
            ui.audioMute.play().catch(e=>{});
        };

        ui.btnCam.onclick = () => {
            if (!localStream) return;
            isVideoOff = !isVideoOff;
            localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
            updateMediaUI();
            ui.audioMute.play().catch(e=>{});
        };

        // Демонстрация экрана
        ui.btnShare.onclick = async () => {
            if (isScreenSharing) {
                // Возврат к камере
                const videoTrack = localStream.getVideoTracks()[0];
                Object.values(peerConnections).forEach(pc => {
                    const sender = pc.getSenders().find(s => s.track.kind === 'video');
                    if (sender) sender.replaceTrack(videoTrack);
                });
                ui.localVideo.srcObject = localStream;
                isScreenSharing = false;
                ui.btnShare.classList.remove('active');
                if (screenStream) screenStream.getTracks().forEach(t => t.stop());
                return;
            }

            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const screenTrack = screenStream.getVideoTracks()[0];
                
                Object.values(peerConnections).forEach(pc => {
                    const sender = pc.getSenders().find(s => s.track.kind === 'video');
                    if (sender) sender.replaceTrack(screenTrack);
                });

                ui.localVideo.srcObject = screenStream;
                isScreenSharing = true;
                ui.btnShare.classList.add('active');

                // Остановка шаринга кнопкой браузера
                screenTrack.onended = () => {
                    ui.btnShare.click();
                };
            } catch (err) {
                console.error("Screen share failed", err);
                showToast("Доступ к экрану отклонен", "error");
            }
        };

        // Настройки
        ui.btnSettings.onclick = () => ui.settingsPanel.classList.add('open');
        ui.btnCloseSettings.onclick = () => ui.settingsPanel.classList.remove('open');

        // Смена устройств "на лету" (если браузер поддерживает)
        document.getElementById('camera-select').onchange = async (e) => {
            if(isScreenSharing) return;
            await getMedia(e.target.value, document.getElementById('mic-select').value);
            const newTrack = localStream.getVideoTracks()[0];
            Object.values(peerConnections).forEach(pc => {
                const sender = pc.getSenders().find(s => s.track.kind === 'video');
                if (sender) sender.replaceTrack(newTrack);
            });
        };

        // Запуск
        window.addEventListener('load', init);

    </script>
