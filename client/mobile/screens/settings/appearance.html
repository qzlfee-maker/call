<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craneapp - Оформление</title>
    <link rel="stylesheet" href="../../../public/styles.css">
    <style>
        body {
            background-color: #0f0f1a;
            margin: 0;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .appearance-content {
            flex: 1;
            overflow-y: auto;
            padding: 80px 16px 40px;
            -webkit-overflow-scrolling: touch;
        }

        /* Окно превью чата */
        .theme-preview-card {
            background: var(--chat-bg, #0f0f1a);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .preview-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .preview-bubble.incoming {
            background: #2b2b3d;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .preview-bubble.outgoing {
            background: #7a5cff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* Секции настроек */
        .setting-block {
            margin-bottom: 32px;
        }

        .block-title {
            font-size: 13px;
            color: #7a5cff;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 16px;
            margin-left: 8px;
        }

        /* Выбор акцентного цвета */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            background: #1a1a2e;
            padding: 16px;
            border-radius: 20px;
        }

        .color-option {
            aspect-ratio: 1;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            border: 3px solid transparent;
        }

        .color-option.active { border-color: #fff; transform: scale(1.1); }

        /* Слайдер размера текста */
        .range-container {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: #7a5cff;
        }

        /* Темы */
        .theme-list {
            background: #1a1a2e;
            border-radius: 20px;
            overflow: hidden;
        }

        .theme-item {
            display: flex;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }

        .theme-item:last-child { border-bottom: none; }
        .theme-item.active { color: #7a5cff; font-weight: 600; }
    </style>
</head>
<body>

    <div id="header-mount"></div>

    <main class="appearance-content">
        <div class="theme-preview-card" id="chat-preview">
            <div class="preview-bubble incoming">Привет! Как тебе новая тема Craneapp? 🚀</div>
            <div class="preview-bubble outgoing" id="bubble-preview">Выглядит просто потрясающе!</div>
        </div>

        <section class="setting-block">
            <div class="block-title">Цветовая схема</div>
            <div class="color-grid" id="color-picker">
                <div class="color-option active" style="background: #7a5cff;" data-color="#7a5cff"></div>
                <div class="color-option" style="background: #007aff;" data-color="#007aff"></div>
                <div class="color-option" style="background: #34c759;" data-color="#34c759"></div>
                <div class="color-option" style="background: #ff9f0a;" data-color="#ff9f0a"></div>
                <div class="color-option" style="background: #ff3b30;" data-color="#ff3b30"></div>
            </div>
        </section>

        <section class="setting-block">
            <div class="block-title">Размер текста</div>
            <div class="range-container">
                <span style="font-size: 12px;">A</span>
                <input type="range" id="font-slider" min="12" max="20" value="14">
                <span style="font-size: 20px;">A</span>
            </div>
        </section>

        <section class="setting-block">
            <div class="block-title">Тема</div>
            <div class="theme-list">
                <div class="theme-item active" data-theme="dark">Тёмная 🌙</div>
                <div class="theme-item" data-theme="light">Светлая ☀️</div>
                <div class="theme-item" data-theme="system">Как в системе 💻</div>
            </div>
        </section>
    </main>

    <script type="module">
        import { Header } from '../../components/navigation/header.js';

        const header = new Header({
            title: 'Оформление',
            showBack: true,
            onBack: () => window.history.back()
        });
        document.getElementById('header-mount').appendChild(header.render());

        // Логика изменения цвета
        const colors = document.querySelectorAll('.color-option');
        const bubblePreview = document.getElementById('bubble-preview');
        const fontSlider = document.getElementById('font-slider');
        const themes = document.querySelectorAll('.theme-item');

        colors.forEach(c => {
            c.onclick = () => {
                colors.forEach(opt => opt.classList.remove('active'));
                c.classList.add('active');
                const selectedColor = c.dataset.color;
                bubblePreview.style.background = selectedColor;
                // Сохранение в настройки
                localStorage.setItem('crane_accent_color', selectedColor);
            };
        });

        // Изменение размера шрифта
        fontSlider.oninput = (e) => {
            const size = e.target.value + 'px';
            document.querySelectorAll('.preview-bubble').forEach(b => {
                b.style.fontSize = size;
            });
            localStorage.setItem('crane_font_size', size);
        };

        // Переключение тем
        themes.forEach(t => {
            t.onclick = () => {
                themes.forEach(item => item.classList.remove('active'));
                t.classList.add('active');
                const theme = t.dataset.theme;
                localStorage.setItem('crane_theme', theme);
                
                // Для демо: меняем фон превью
                const preview = document.getElementById('chat-preview');
                preview.style.background = theme === 'light' ? '#f0f0f5' : '#0f0f1a';
                preview.style.color = theme === 'light' ? '#000' : '#fff';
            };
        });
    </script>
</body>
</html>
