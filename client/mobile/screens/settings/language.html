<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Язык - CraneApp</title>
    <script src="../../scripts/theme.js"></script>
    
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #121212;
            --bg-tertiary: #1E1E1E;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --text-muted: #666666;
            --border-color: #1E1E1E;
            --accent-color: #FF007F;
            --accent-gradient: linear-gradient(135deg, #FF007F, #9D00FF);
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        [data-theme="light"] {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F5F5;
            --bg-tertiary: #EEEEEE;
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #DDDDDD;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow-x: hidden; }
        
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding-top: var(--safe-area-top);
        }
        
        .header {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn:active { background: rgba(255,255,255,0.1); }
        .header-title { font-size: 17px; font-weight: 700; }
        
        .content { padding: 16px 0; }
        
        .section-header {
            padding: 12px 16px 8px;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        .section {
            background: var(--bg-secondary);
            margin: 0;
        }
        
        @media (min-width: 768px) {
            .section { border-radius: 12px; margin: 0 8px; }
        }
        
        .lang-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.15s;
        }
        
        .lang-item:last-child { border-bottom: none; }
        .lang-item:active { background: var(--bg-tertiary); }
        .lang-item.selected { background: rgba(255,0,127,0.1); }
        
        .lang-left { display: flex; align-items: center; gap: 12px; }
        
        .lang-flag {
            width: 32px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .lang-info { }
        .lang-name { font-size: 15px; font-weight: 500; }
        .lang-native { font-size: 12px; color: var(--text-secondary); }
        
        .lang-check { color: var(--accent-color); font-size: 18px; }
        
        .toast-container {
            position: fixed;
            bottom: calc(70px + var(--safe-area-bottom));
            left: 12px;
            right: 12px;
            z-index: 10002;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        
        .toast {
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid #00FF88;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            font-size: 13px;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    
    <div class="header">
        <button class="back-btn" onclick="history.back()">←</button>
        <span class="header-title">Язык</span>
    </div>
    
    <div class="content">
        <div class="section-header">Доступные языки</div>
        <div class="section" id="langList"></div>
    </div>

    <script>
        const token = localStorage.getItem('craneapp_auth_token');
        
        const languages = [
            { code: 'ru', name: 'Русский', native: 'Russian', flag: '🇷🇺' },
            { code: 'en', name: 'Английский', native: 'English', flag: '🇬🇧' },
            { code: 'de', name: 'Немецкий', native: 'Deutsch', flag: '🇩🇪' },
            { code: 'fr', name: 'Французский', native: 'Français', flag: '🇫🇷' },
            { code: 'es', name: 'Испанский', native: 'Español', flag: '🇪🇸' },
            { code: 'it', name: 'Итальянский', native: 'Italiano', flag: '🇮🇹' },
            { code: 'pt', name: 'Португальский', native: 'Português', flag: '🇵🇹' },
            { code: 'pl', name: 'Польский', native: 'Polski', flag: '🇵🇱' },
            { code: 'uk', name: 'Украинский', native: 'Українська', flag: '🇺🇦' },
            { code: 'zh', name: 'Китайский', native: '中文', flag: '🇨🇳' },
            { code: 'ja', name: 'Японский', native: '日本語', flag: '🇯🇵' },
            { code: 'ko', name: 'Корейский', native: '한국어', flag: '🇰🇷' },
            { code: 'ar', name: 'Арабский', native: 'العربية', flag: '🇸🇦' },
            { code: 'tr', name: 'Турецкий', native: 'Türkçe', flag: '🇹🇷' },
            { code: 'hi', name: 'Хинди', native: 'हिन्दी', flag: '🇮🇳' }
        ];
        
        let currentLang = 'ru';
        
        async function loadLanguage() {
            try {
                const res = await fetch('/api/v1/users/settings', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    currentLang = data.settings?.language || 'ru';
                }
            } catch (e) {
                const local = JSON.parse(localStorage.getItem('craneapp_settings') || '{}');
                currentLang = local.language || 'ru';
            }
            
            renderLanguages();
        }
        
        function renderLanguages() {
            const list = document.getElementById('langList');
            
            list.innerHTML = languages.map(lang => `
                <div class="lang-item ${lang.code === currentLang ? 'selected' : ''}" onclick="selectLanguage('${lang.code}')">
                    <div class="lang-left">
                        <div class="lang-flag">${lang.flag}</div>
                        <div class="lang-info">
                            <div class="lang-name">${lang.name}</div>
                            <div class="lang-native">${lang.native}</div>
                        </div>
                    </div>
                    ${lang.code === currentLang ? '<span class="lang-check">✓</span>' : ''}
                </div>
            `).join('');
        }
        
        async function selectLanguage(code) {
            if (code === currentLang) return;
            
            currentLang = code;
            
            // Сохраняем локально
            const settings = JSON.parse(localStorage.getItem('craneapp_settings') || '{}');
            settings.language = code;
            localStorage.setItem('craneapp_settings', JSON.stringify(settings));
            
            // Отправляем на сервер
            try {
                await fetch('/api/v1/users/settings', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ language: code })
                });
            } catch (e) {
                console.warn('Save language failed:', e);
            }
            
            renderLanguages();
            showToast('Язык изменён', '✓');
        }
        
        function showToast(message, icon) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = '<span>' + icon + '</span><span>' + message + '</span>';
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }
        
        loadLanguage();
    </script>
</body>
</html>
