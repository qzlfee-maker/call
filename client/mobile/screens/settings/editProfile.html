<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать профиль - CraneApp</title>
    
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #121212;
            --bg-tertiary: #1E1E1E;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --text-muted: #666666;
            --border-color: #1E1E1E;
            --accent-color: #FF007F;
            --accent-gradient: linear-gradient(135deg, #FF007F, #9D00FF);
        }
        [data-theme="light"] {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F5F5;
            --bg-tertiary: #EEEEEE;
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #DDDDDD;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            font-family: system-ui; 
            min-height: 100vh; 
        }
        .header { 
            padding: 16px; 
            background: var(--bg-secondary); 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            align-items: center; 
            gap: 16px; 
        }
        .back { 
            background: none; 
            border: none; 
            color: var(--text-primary); 
            font-size: 24px; 
            cursor: pointer; 
        }
        .avatar-section { 
            padding: 32px 16px; 
            text-align: center; 
        }
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 16px;
        }
        .avatar { 
            width: 120px; 
            height: 120px; 
            border-radius: 60px; 
            background: var(--accent-gradient); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 48px; 
            cursor: pointer;
            transition: transform 0.2s;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        .avatar:hover { transform: scale(1.05); }
        
        /* Картинка аватарки */
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .avatar-img.visible { display: block !important; }
        
        /* Эмодзи/буква */
        .avatar-placeholder {
            font-size: 48px;
        }
        .avatar-placeholder.hidden { display: none !important; }
        
        .change-photo { 
            color: var(--accent-color); 
            font-size: 14px; 
            cursor: pointer;
            text-decoration: underline;
        }
        .section { 
            margin: 16px; 
            background: var(--bg-secondary); 
            border-radius: 16px; 
            overflow: hidden; 
        }
        .item { 
            padding: 16px; 
            border-bottom: 1px solid var(--border-color); 
        }
        .item:last-child { border-bottom: none; }
        label { 
            display: block; 
            color: var(--text-muted); 
            font-size: 13px; 
            margin-bottom: 8px; 
        }
        input, textarea { 
            width: 100%; 
            background: var(--bg-tertiary); 
            border: 1px solid var(--border-color); 
            color: var(--text-primary); 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 16px; 
            outline: none; 
        }
        input:focus, textarea:focus { 
            border-color: var(--accent-color); 
        }
        textarea { 
            resize: none; 
            height: 100px; 
        }
        .save-btn { 
            margin: 16px; 
            padding: 16px; 
            background: var(--accent-gradient); 
            border: none; 
            border-radius: 16px; 
            color: #fff; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            width: calc(100% - 32px);
            transition: transform 0.2s;
        }
        .save-btn:hover { transform: scale(1.02); }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        /* Скрытый input для файла */
        #fileInput { display: none; }
        
        /* Toast уведомления */
        .toast-container {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 10002;
        }
        .toast {
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid var(--accent-color);
        }
        .toast.success { border-left-color: #00FF88; }
        .toast.error { border-left-color: #FF4B4B; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    
    <div class="header">
        <button class="back" onclick="history.back()">←</button>
        <h2>Редактировать профиль</h2>
    </div>
    
    <div class="avatar-section">
        <div class="avatar-container">
            <div class="avatar" id="avatar" onclick="document.getElementById('fileInput').click()">
                <!-- Картинка -->
                <img class="avatar-img" id="avatarImg" alt="Avatar">
                <!-- Эмодзи/буква -->
                <span class="avatar-placeholder" id="avatarPlaceholder">👤</span>
            </div>
        </div>
        <div class="change-photo" onclick="document.getElementById('fileInput').click()">Загрузить фото</div>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
    </div>
    
    <div class="section">
        <div class="item">
            <label>Имя</label>
            <input type="text" id="firstName" placeholder="Ваше имя">
        </div>
        <div class="item">
            <label>О себе</label>
            <textarea id="bio" placeholder="Расскажите о себе..."></textarea>
        </div>
    </div>
    
    <button class="save-btn" id="saveBtn" onclick="saveProfile()">Сохранить</button>

    <script>
        const token = localStorage.getItem('craneapp_auth_token');
        let user = JSON.parse(localStorage.getItem('craneapp_user_data') || '{}');
        
        if (!token) {
            window.location.href = '../auth/login.html';
        }

        // Загружаем текущие данные
        document.getElementById('firstName').value = user.firstName || '';
        document.getElementById('bio').value = user.bio || '';
        
        // === ПРАВИЛЬНОЕ ОТОБРАЖЕНИЕ АВАТАРКИ ===
        function displayAvatar(avatarUrl) {
            const imgEl = document.getElementById('avatarImg');
            const placeholderEl = document.getElementById('avatarPlaceholder');
            
            console.log('️ Avatar URL:', avatarUrl?.substring(0, 50) + '...');
            
            // Проверяем это base64 картинка (начинается с data:image)
            if (avatarUrl && avatarUrl.startsWith('data:image')) {
                console.log('✅ Это картинка (base64)');
                imgEl.src = avatarUrl;
                imgEl.classList.add('visible');
                imgEl.style.display = 'block';
                placeholderEl.classList.add('hidden');
                placeholderEl.style.display = 'none';
            } 
            // Проверяем это эмодзи (короткая строка)
            else if (avatarUrl && avatarUrl.length <= 10) {
                console.log('✅ Это эмодзи');
                imgEl.classList.remove('visible');
                imgEl.style.display = 'none';
                placeholderEl.classList.remove('hidden');
                placeholderEl.style.display = 'block';
                placeholderEl.textContent = avatarUrl;
            }
            // Нет аватарки → показываем первую букву имени
            else {
                console.log('✅ Показываем букву имени');
                imgEl.classList.remove('visible');
                imgEl.style.display = 'none';
                placeholderEl.classList.remove('hidden');
                placeholderEl.style.display = 'block';
                placeholderEl.textContent = (user.firstName || '👤')[0].toUpperCase();
            }
        }

        // Отображаем текущую аватарку
        displayAvatar(user.avatarUrl);

        let selectedAvatarBase64 = null;

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            console.log('📁 Выбран файл:', file.name, file.type, file.size);
            
            // Проверка размера (макс 5MB)
            if (file.size > 5 * 1024 * 1024) {
                showToast('error', 'Файл слишком большой (макс 5MB)', '⚠️');
                return;
            }
            
            // Проверка типа
            if (!file.type.startsWith('image/')) {
                showToast('error', 'Выберите изображение', '⚠️');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedAvatarBase64 = e.target.result;
                
                console.log('✅ Base64 загружен, длина:', selectedAvatarBase64.length);
                console.log('Начало:', selectedAvatarBase64.substring(0, 50));
                
                // Показываем превью
                const imgEl = document.getElementById('avatarImg');
                const placeholderEl = document.getElementById('avatarPlaceholder');
                
                imgEl.src = selectedAvatarBase64;
                imgEl.classList.add('visible');
                imgEl.style.display = 'block';
                placeholderEl.classList.add('hidden');
                placeholderEl.style.display = 'none';
                
                showToast('success', 'Фото выбрано', '✓');
            };
            reader.onerror = function() {
                console.error('❌ Ошибка FileReader');
                showToast('error', 'Ошибка загрузки файла', '❌');
            };
            reader.readAsDataURL(file);
        }

        async function saveProfile() {
            const firstName = document.getElementById('firstName').value.trim();
            const bio = document.getElementById('bio').value.trim();
            const btn = document.getElementById('saveBtn');
            
            if (!firstName) {
                showToast('error', 'Введите имя', '⚠️');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Сохранение...';
            
            try {
                // Обновляем локальный объект
                user.firstName = firstName;
                user.bio = bio;
                if (selectedAvatarBase64) {
                    user.avatarUrl = selectedAvatarBase64;
                    console.log('💾 Сохраняем аватарку, длина:', selectedAvatarBase64.length);
                }
                
                // Отправляем на сервер
                const profileData = { firstName, bio };
                if (selectedAvatarBase64) {
                    profileData.avatar = selectedAvatarBase64;
                }
                
                console.log('📤 Отправляем на сервер:', profileData);
                
                // Сохраняем профиль
                const profileRes = await fetch('/api/v1/users/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(profileData)
                });
                
                console.log('📥 Ответ сервера (профиль):', profileRes.status);
                
                // Сохраняем аватарку отдельно если есть
                if (selectedAvatarBase64) {
                    const avatarRes = await fetch('/api/v1/users/avatar', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({ avatar: selectedAvatarBase64 })
                    });
                    console.log('📥 Ответ сервера (аватарка):', avatarRes.status);
                }
                
                // Обновляем localStorage
                localStorage.setItem('craneapp_user_data', JSON.stringify(user));
                console.log('💾 Сохранено в localStorage');
                
                showToast('success', 'Профиль сохранён!', '✓');
                
                setTimeout(() => {
                    history.back();
                }, 1000);
            } catch (error) {
                console.error('❌ Save error:', error);
                // Всё равно сохраняем локально
                localStorage.setItem('craneapp_user_data', JSON.stringify(user));
                showToast('success', 'Профиль сохранён локально', '✓');
                setTimeout(() => {
                    history.back();
                }, 1000);
            }
        }

        function showToast(type, message, icon) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${icon}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
