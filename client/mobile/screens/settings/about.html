<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>О приложении - CraneApp</title>
    <script src="../../scripts/theme.js"></script>
    
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #121212;
            --bg-tertiary: #1E1E1E;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --text-muted: #666666;
            --border-color: #1E1E1E;
            --accent-color: #FF007F;
            --accent-gradient: linear-gradient(135deg, #FF007F, #9D00FF);
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        [data-theme="light"] {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F5F5;
            --bg-tertiary: #EEEEEE;
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #DDDDDD;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow-x: hidden; }
        
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding-top: var(--safe-area-top);
        }
        
        .header {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn:active { background: rgba(255,255,255,0.1); }
        .header-title { font-size: 17px; font-weight: 700; }
        
        .content { padding: 16px 0; }
        
        .app-card {
            background: var(--bg-secondary);
            margin: 0 8px 16px;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }
        
        .app-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin: 0 auto 16px;
            overflow: hidden;
        }
        
        .app-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .app-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .app-version { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; }
        
        .app-tagline { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
        
        .section-header {
            padding: 12px 16px 8px;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        .section {
            background: var(--bg-secondary);
            margin: 0 0 12px 0;
        }
        
        @media (min-width: 768px) {
            .section { border-radius: 12px; margin: 0 8px 12px 8px; }
        }
        
        .item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.15s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        
        .item:last-child { border-bottom: none; }
        .item:active { background: var(--bg-tertiary); }
        
        .item-left { display: flex; align-items: center; gap: 12px; flex: 1; }
        
        .item-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .item-text { flex: 1; }
        .item-title { font-size: 15px; }
        .item-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        
        .item-value { color: var(--text-secondary); font-size: 14px; margin-right: 8px; }
        .item-arrow { color: var(--text-muted); font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="history.back()">←</button>
        <span class="header-title">О приложении</span>
    </div>
    
    <div class="content">
        <div class="app-card">
            <div class="app-logo">
                <img src="https://i.ibb.co/QjTkyWfG/85-20260306202001.png" alt="CraneApp Logo">
            </div>
            <div class="app-name">CraneApp</div>
            <div class="app-version">Версия 1.0.0 (Build 1)</div>
            <div class="app-tagline">Быстрый и безопасный мессенджер для общения с друзьями, семьёй и коллегами.</div>
        </div>
        
        <div class="section-header">Информация</div>
        <div class="section">
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(0,255,0,0.2);">🌐</div>
                    <div class="item-text">
                        <div class="item-title">Версия сайта</div>
                    </div>
                </div>
                <span class="item-value">1.0.0</span>
            </div>
            <div class="item" onclick="checkUpdate()">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(42,171,238,0.2);">🔄</div>
                    <div class="item-text">
                        <div class="item-title">Проверить обновления</div>
                    </div>
                </div>
                <span class="item-arrow">›</span>
            </div>
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(255,165,0,0.2);">📅</div>
                    <div class="item-text">
                        <div class="item-title">Дата сборки</div>
                    </div>
                </div>
                <span class="item-value" id="buildDate">—</span>
            </div>
        </div>
        
        <div class="section-header">Юридическая информация</div>
        <div class="section">
            <a href="#" class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(0,255,0,0.2);">📋</div>
                    <div class="item-text">
                        <div class="item-title">Лицензия</div>
                    </div>
                </div>
                <span class="item-arrow">›</span>
            </a>
            <a href="#" class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(42,171,238,0.2);">🔒</div>
                    <div class="item-text">
                        <div class="item-title">Политика конфиденциальности</div>
                    </div>
                </div>
                <span class="item-arrow">›</span>
            </a>
            <a href="#" class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(255,165,0,0.2);">📜</div>
                    <div class="item-text">
                        <div class="item-title">Условия использования</div>
                    </div>
                </div>
                <span class="item-arrow">›</span>
            </a>
        </div>
    </div>

    <script>
        document.getElementById('buildDate').textContent = new Date().toLocaleDateString('ru');
        
        function checkUpdate() {
            alert('У вас установлена последняя версия!');
        }
    </script>
</body>
</html>
