<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craneapp - Настройки</title>
    <link rel="stylesheet" href="../../../public/styles.css">
    <style>
        body {
            background-color: #0f0f1a;
            margin: 0;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .settings-content {
            flex: 1;
            overflow-y: auto;
            padding: 80px 16px 100px; /* Отступы под Header и TabBar */
            -webkit-overflow-scrolling: touch;
        }

        .section-title {
            font-size: 13px;
            color: #7a5cff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 10px 12px;
            font-weight: 700;
        }

        .settings-group {
            background: #1a1a2e;
            border-radius: 20px;
            margin-bottom: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .settings-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 14px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .settings-item:last-child { border-bottom: none; }
        .settings-item:active { background: rgba(122, 92, 255, 0.1); }

        .item-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        /* Цветовое кодирование иконок для быстрого сканирования */
        .icon-blue { background: rgba(0, 122, 255, 0.15); color: #007aff; }
        .icon-red { background: rgba(255, 59, 48, 0.15); color: #ff3b30; }
        .icon-green { background: rgba(52, 199, 89, 0.15); color: #34c759; }
        .icon-orange { background: rgba(255, 159, 10, 0.15); color: #ff9f0a; }
        .icon-purple { background: rgba(122, 92, 255, 0.15); color: #7a5cff; }

        .item-label { flex: 1; font-size: 16px; font-weight: 400; }
        .item-arrow { color: #444; font-size: 18px; }

        .app-version {
            text-align: center;
            color: #444;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="header-mount"></div>

    <main class="settings-content">
        
        <div class="section-title">Основные</div>
        <div class="settings-group">
            <div class="settings-item" onclick="window.location.href='notifications.html'">
                <div class="item-icon icon-red">🔔</div>
                <div class="item-label">Уведомления и звуки</div>
                <div class="item-arrow">›</div>
            </div>
            <div class="settings-item" onclick="window.location.href='privacy.html'">
                <div class="item-icon icon-blue">🔒</div>
                <div class="item-label">Конфиденциальность</div>
                <div class="item-arrow">›</div>
            </div>
            <div class="settings-item" onclick="window.location.href='data.html'">
                <div class="item-icon icon-green">📊</div>
                <div class="item-label">Данные и память</div>
                <div class="item-arrow">›</div>
            </div>
        </div>

        <div class="section-title">Интерфейс</div>
        <div class="settings-group">
            <div class="settings-item" onclick="window.location.href='appearance.html'">
                <div class="item-icon icon-purple">✨</div>
                <div class="item-label">Оформление</div>
                <div class="item-arrow">›</div>
            </div>
            <div class="settings-item">
                <div class="item-icon icon-orange">🌐</div>
                <div class="item-label">Язык</div>
                <div class="item-arrow">›</div>
            </div>
        </div>

        <div class="section-title">Поддержка</div>
        <div class="settings-group">
            <div class="settings-item">
                <div class="item-icon icon-blue" style="background: rgba(255,255,255,0.05); color: #fff;">❓</div>
                <div class="item-label">Помощь</div>
                <div class="item-arrow">›</div>
            </div>
            <div class="settings-item">
                <div class="item-icon icon-purple" style="background: rgba(255,255,255,0.05); color: #fff;">💡</div>
                <div class="item-label">Возможности Craneapp</div>
                <div class="item-arrow">›</div>
            </div>
        </div>

        <div class="app-version">Craneapp Mobile v1.0.4 (Railway Build)</div>
    </main>

    <div id="tabbar-mount"></div>

    <script type="module">
        import { Header } from '../../components/navigation/header.js';
        import { TabBar } from '../../components/navigation/tabBar.js';

        // 1. Инициализация Хедера (без кнопки назад, так как это главный раздел настроек)
        const header = new Header({
            title: 'Настройки',
            showBack: true,
            onBack: () => window.history.back()
        });
        document.getElementById('header-mount').appendChild(header.render());

        // 2. Инициализация Таб-бара
        const tabBar = new TabBar({
            initialTab: 'profile', // Настройки технически часть профиля
            onTabChange: (id) => {
                if(id !== 'profile') window.location.href = `../${id}/${id}.html`;
            }
        });
        document.getElementById('tabbar-mount').appendChild(tabBar.render());
    </script>
</body>
</html>
