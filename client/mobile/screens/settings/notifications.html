<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Уведомления - CraneApp</title>
    <script src="../../scripts/theme.js"></script>
    
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #121212;
            --bg-tertiary: #1E1E1E;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --text-muted: #666666;
            --border-color: #1E1E1E;
            --accent-color: #FF007F;
            --accent-gradient: linear-gradient(135deg, #FF007F, #9D00FF);
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        [data-theme="light"] {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F5F5;
            --bg-tertiary: #EEEEEE;
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #DDDDDD;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow-x: hidden; }
        
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding-top: var(--safe-area-top);
        }
        
        .header {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn:active { background: rgba(255,255,255,0.1); }
        .header-title { font-size: 17px; font-weight: 700; }
        
        .content { padding: 16px 0; }
        
        .section-header {
            padding: 12px 16px 8px;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        .section {
            background: var(--bg-secondary);
            margin: 0 0 12px 0;
        }
        
        @media (min-width: 768px) {
            .section { border-radius: 12px; margin: 0 8px 12px 8px; }
        }
        
        .item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.15s;
        }
        
        .item:last-child { border-bottom: none; }
        .item:active { background: var(--bg-tertiary); }
        
        .item-left { display: flex; align-items: center; gap: 12px; flex: 1; }
        
        .item-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .item-text { flex: 1; }
        .item-title { font-size: 15px; }
        .item-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        
        .toggle-switch {
            width: 42px;
            height: 26px;
            border-radius: 13px;
            background: #333333;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .toggle-switch.active { background: var(--accent-gradient); }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #FFFFFF;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }
        
        .toggle-switch.active::after { transform: translateX(16px); }
        
        .item-value { color: var(--text-secondary); font-size: 14px; margin-right: 8px; }
        .item-arrow { color: var(--text-muted); font-size: 16px; }
        
        .toast-container {
            position: fixed;
            bottom: calc(70px + var(--safe-area-bottom));
            left: 12px;
            right: 12px;
            z-index: 10002;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        
        .toast {
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid #00FF88;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            font-size: 13px;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    
    <div class="header">
        <button class="back-btn" onclick="history.back()">←</button>
        <span class="header-title">Уведомления</span>
    </div>
    
    <div class="content">
        <div class="section-header">Сообщения</div>
        <div class="section">
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(255,75,75,0.2);">🔔</div>
                    <div class="item-text">
                        <div class="item-title">Личные чаты</div>
                    </div>
                </div>
                <div class="toggle-switch active" id="togglePrivate" onclick="toggleSetting(this, 'privateChats')"></div>
            </div>
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(42,171,238,0.2);">👥</div>
                    <div class="item-text">
                        <div class="item-title">Группы</div>
                    </div>
                </div>
                <div class="toggle-switch active" id="toggleGroups" onclick="toggleSetting(this, 'groups')"></div>
            </div>
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(157,0,255,0.2);">📢</div>
                    <div class="item-text">
                        <div class="item-title">Каналы</div>
                    </div>
                </div>
                <div class="toggle-switch active" id="toggleChannels" onclick="toggleSetting(this, 'channels')"></div>
            </div>
        </div>
        
        <div class="section-header">Звонки</div>
        <div class="section">
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(0,255,0,0.2);">📞</div>
                    <div class="item-text">
                        <div class="item-title">Звонки</div>
                    </div>
                </div>
                <div class="toggle-switch active" id="toggleCalls" onclick="toggleSetting(this, 'calls')"></div>
            </div>
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(255,165,0,0.2);">📹</div>
                    <div class="item-text">
                        <div class="item-title">Видеозвонки</div>
                    </div>
                </div>
                <div class="toggle-switch active" id="toggleVideoCalls" onclick="toggleSetting(this, 'videoCalls')"></div>
            </div>
        </div>
        
        <div class="section-header">Внутри приложения</div>
        <div class="section">
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(255,0,127,0.2);">💬</div>
                    <div class="item-text">
                        <div class="item-title">Всплывающие уведомления</div>
                        <div class="item-subtitle">Показывать внутри приложения</div>
                    </div>
                </div>
                <div class="toggle-switch active" id="toggleInApp" onclick="toggleSetting(this, 'inAppNotifications')"></div>
            </div>
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(0,136,255,0.2);">👁</div>
                    <div class="item-text">
                        <div class="item-title">Превью сообщения</div>
                        <div class="item-subtitle">Показывать текст в уведомлении</div>
                    </div>
                </div>
                <div class="toggle-switch active" id="togglePreview" onclick="toggleSetting(this, 'messagePreview')"></div>
            </div>
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(255,215,0,0.2);">✓✓</div>
                    <div class="item-text">
                        <div class="item-title">Уведомления о прочтении</div>
                    </div>
                </div>
                <div class="toggle-switch" id="toggleReadReceipts" onclick="toggleSetting(this, 'readReceipts')"></div>
            </div>
        </div>
        
        <div class="section-header">Реакции</div>
        <div class="section">
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(255,75,75,0.2);">❤</div>
                    <div class="item-text">
                        <div class="item-title">Реакции на сообщения</div>
                    </div>
                </div>
                <div class="toggle-switch active" id="toggleReactions" onclick="toggleSetting(this, 'reactions')"></div>
            </div>
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(157,0,255,0.2);">👤</div>
                    <div class="item-text">
                        <div class="item-title">Новые контакты</div>
                    </div>
                </div>
                <div class="toggle-switch active" id="toggleNewContacts" onclick="toggleSetting(this, 'newContacts')"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('craneapp_auth_token');
        
        let settings = {
            privateChats: true,
            groups: true,
            channels: true,
            calls: true,
            videoCalls: true,
            inAppNotifications: true,
            messagePreview: true,
            readReceipts: false,
            reactions: true,
            newContacts: true
        };
        
        async function loadSettings() {
            try {
                const res = await fetch('/api/v1/users/notifications', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    settings = { ...settings, ...data.settings };
                }
            } catch (e) {
                const local = JSON.parse(localStorage.getItem('craneapp_notification_settings') || '{}');
                settings = { ...settings, ...local };
            }
            
            updateUI();
        }
        
        function updateUI() {
            Object.keys(settings).forEach(key => {
                const el = document.getElementById('toggle' + key.charAt(0).toUpperCase() + key.slice(1).replace(/([A-Z])/g, '$1'));
                if (el) {
                    if (settings[key]) el.classList.add('active');
                    else el.classList.remove('active');
                }
            });
            
            // Маппинг для особых случаев
            updateToggle('togglePrivate', settings.privateChats);
            updateToggle('toggleGroups', settings.groups);
            updateToggle('toggleChannels', settings.channels);
            updateToggle('toggleCalls', settings.calls);
            updateToggle('toggleVideoCalls', settings.videoCalls);
            updateToggle('toggleInApp', settings.inAppNotifications);
            updateToggle('togglePreview', settings.messagePreview);
            updateToggle('toggleReadReceipts', settings.readReceipts);
            updateToggle('toggleReactions', settings.reactions);
            updateToggle('toggleNewContacts', settings.newContacts);
        }
        
        function updateToggle(id, value) {
            const el = document.getElementById(id);
            if (!el) return;
            if (value) el.classList.add('active');
            else el.classList.remove('active');
        }
        
        async function toggleSetting(el, key) {
            el.classList.toggle('active');
            settings[key] = el.classList.contains('active');
            
            localStorage.setItem('craneapp_notification_settings', JSON.stringify(settings));
            
            try {
                await fetch('/api/v1/users/notifications', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(settings)
                });
            } catch (e) {}
            
            showToast(settings[key] ? 'Включено' : 'Выключено', '✓');
        }
        
        function showToast(message, icon) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = '<span>' + icon + '</span><span>' + message + '</span>';
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }
        
        loadSettings();
    </script>
</body>
</html>
