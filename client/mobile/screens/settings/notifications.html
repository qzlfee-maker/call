<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craneapp - Уведомления</title>
    <link rel="stylesheet" href="../../../public/styles.css">
    <style>
        body {
            background-color: #0f0f1a;
            margin: 0;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .notifications-content {
            flex: 1;
            overflow-y: auto;
            padding: 80px 16px 40px;
            -webkit-overflow-scrolling: touch;
        }

        .section-header {
            font-size: 13px;
            color: #7a5cff;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin: 24px 0 10px 12px;
        }

        .section-header:first-child { margin-top: 0; }

        .settings-card {
            background: #1a1a2e;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 8px;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .settings-row:last-child { border-bottom: none; }

        .row-info { display: flex; flex-direction: column; gap: 2px; }
        .row-title { font-size: 16px; font-weight: 500; }
        .row-desc { font-size: 12px; color: #888; }

        /* Toggle Switch (тот же стиль, что в dataStorage) */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2b2b3d;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #7a5cff; }
        input:checked + .slider:before { transform: translateX(20px); }

        .reset-btn {
            display: block;
            width: 100%;
            padding: 16px;
            text-align: center;
            color: #ff453a;
            font-weight: 600;
            background: #1a1a2e;
            border-radius: 20px;
            margin-top: 30px;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>

    <div id="header-mount"></div>

    <main class="notifications-content">
        
        <div class="section-header">Уведомления из чатов</div>
        <div class="settings-card">
            <div class="settings-row">
                <div class="row-info">
                    <span class="row-title">Личные чаты</span>
                    <span class="row-desc">Включено, звук «Crane Default»</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="settings-row">
                <div class="row-info">
                    <span class="row-title">Группы</span>
                    <span class="row-desc">Только упоминания</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="settings-row">
                <div class="row-info">
                    <span class="row-title">Каналы</span>
                    <span class="row-desc">Выключено</span>
                </div>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="section-header">В приложении</div>
        <div class="settings-card">
            <div class="settings-row">
                <div class="row-info">
                    <span class="row-title">Звук в приложении</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="settings-row">
                <div class="row-info">
                    <span class="row-title">Вибрация</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="settings-row">
                <div class="row-info">
                    <span class="row-title">Превью сообщений</span>
                    <span class="row-desc">Показывать текст в уведомлении</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <button class="reset-btn" id="reset-notifications">Сбросить все настройки уведомлений</button>

    </main>

    <script type="module">
        import { Header } from '../../components/navigation/header.js';

        // 1. Монтируем хедер
        const header = new Header({
            title: 'Уведомления',
            showBack: true,
            onBack: () => window.history.back()
        });
        document.getElementById('header-mount').appendChild(header.render());

        // 2. Логика сброса
        document.getElementById('reset-notifications').onclick = () => {
            if(confirm('Вы уверены, что хотите вернуть настройки по умолчанию?')) {
                const toggles = document.querySelectorAll('input[type="checkbox"]');
                toggles.forEach((t, index) => {
                    // Имитация: включаем первые два, выключаем остальные
                    t.checked = index !== 2; 
                });
                alert('Настройки сброшены');
            }
        };
    </script>
</body>
</html>
