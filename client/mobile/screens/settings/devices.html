<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Устройства - CraneApp</title>
    <script src="../../scripts/theme.js"></script>
    
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #121212;
            --bg-tertiary: #1E1E1E;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --text-muted: #666666;
            --border-color: #1E1E1E;
            --accent-color: #FF007F;
            --accent-gradient: linear-gradient(135deg, #FF007F, #9D00FF);
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        [data-theme="light"] {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F5F5;
            --bg-tertiary: #EEEEEE;
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #DDDDDD;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow-x: hidden; }
        
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding-top: var(--safe-area-top);
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .header {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn:active { background: rgba(255,255,255,0.1); }
        .header-title { font-size: 17px; font-weight: 700; }
        
        .content { padding: 16px 0; }
        
        .section-header {
            padding: 12px 16px 8px;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        .device-card {
            background: var(--bg-secondary);
            margin: 0 8px 12px 8px;
            border-radius: 12px;
            padding: 16px;
        }
        
        .device-card.current {
            border: 1px solid var(--accent-color);
            background: linear-gradient(135deg, rgba(255,0,127,0.08), rgba(157,0,255,0.08));
        }
        
        .device-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .device-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        
        .device-info { flex: 1; }
        .device-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
        .device-status { font-size: 12px; color: #00FF88; }
        .device-status.offline { color: var(--text-muted); }
        
        .device-badge {
            padding: 4px 8px;
            border-radius: 6px;
            background: var(--accent-gradient);
            color: #FFF;
            font-size: 10px;
            font-weight: 600;
        }
        
        .device-details {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .device-detail {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        
        .device-detail-label { color: var(--text-secondary); }
        
        .device-actions {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }
        
        .terminate-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #FF4B4B;
            background: transparent;
            color: #FF4B4B;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .terminate-btn:active { background: rgba(255,75,75,0.1); }
        
        .terminate-all-btn {
            width: calc(100% - 16px);
            margin: 8px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #FF4B4B, #FF007F);
            color: #FFF;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .terminate-all-btn:active { opacity: 0.85; }
        
        .loading-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
        }
        
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast-container {
            position: fixed;
            bottom: calc(70px + var(--safe-area-bottom));
            left: 12px;
            right: 12px;
            z-index: 10002;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        
        @media (min-width: 768px) {
            .toast-container { left: auto; right: 20px; bottom: 20px; }
        }
        
        .toast {
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid var(--accent-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            font-size: 13px;
        }
        
        .toast.success { border-left-color: #00FF88; }
        .toast.error { border-left-color: #FF4B4B; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    
    <div class="header">
        <button class="back-btn" onclick="history.back()">←</button>
        <span class="header-title">Устройства</span>
    </div>
    
    <div class="content">
        <div class="section-header">Это устройство</div>
        <div class="device-card current" id="currentDevice">
            <div class="device-header">
                <div class="device-icon" id="currentIcon">📱</div>
                <div class="device-info">
                    <div class="device-name" id="currentName">Загрузка...</div>
                    <div class="device-status">Онлайн сейчас</div>
                </div>
                <span class="device-badge">ЭТО УСТРОЙСТВО</span>
            </div>
            <div class="device-details">
                <div class="device-detail">
                    <span class="device-detail-label">Приложение</span>
                    <span>CraneApp</span>
                </div>
                <div class="device-detail">
                    <span class="device-detail-label">IP-адрес</span>
                    <span id="currentIP">—</span>
                </div>
                <div class="device-detail">
                    <span class="device-detail-label">Последняя активность</span>
                    <span id="currentLastActive">—</span>
                </div>
            </div>
        </div>
        
        <div class="section-header">Другие устройства</div>
        <div id="otherDevices">
            <div class="loading-state">
                <div class="spinner"></div>
                <div>Загрузка устройств...</div>
            </div>
        </div>
        
        <button class="terminate-all-btn" id="terminateAllBtn" style="display:none;" onclick="terminateAll()">
            Завершить все остальные сеансы
        </button>
    </div>

    <script>
        const token = localStorage.getItem('craneapp_auth_token');
        let currentSessionId = null;
        
        // Определение устройства
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = { icon: '📱', name: 'Мобильное устройство', type: 'mobile' };
            
            if (/iPhone/.test(ua)) {
                device = { icon: '📱', name: 'iPhone', type: 'iphone' };
            } else if (/iPad/.test(ua)) {
                device = { icon: '📟', name: 'iPad', type: 'ipad' };
            } else if (/Android/.test(ua)) {
                device = { icon: '📱', name: 'Android', type: 'android' };
            } else if (/Windows/.test(ua)) {
                device = { icon: '💻', name: 'Windows PC', type: 'windows' };
            } else if (/Mac/.test(ua)) {
                device = { icon: '💻', name: 'Mac', type: 'mac' };
            } else if (/Linux/.test(ua)) {
                device = { icon: '💻', name: 'Linux', type: 'linux' };
            }
            
            return device;
        }
        
        // Регистрация текущей сессии
        async function registerCurrentSession() {
            const device = getDeviceInfo();
            
            try {
                const res = await fetch('/api/v1/users/devices/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        deviceName: device.name,
                        deviceType: device.type,
                        userAgent: navigator.userAgent
                    })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    currentSessionId = data.sessionId;
                    return data;
                }
            } catch (e) {
                console.warn('Session registration failed:', e);
            }
            
            return null;
        }
        
        // Загрузка списка устройств
        async function loadDevices() {
            try {
                const res = await fetch('/api/v1/users/devices', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    renderDevices(data.devices || []);
                } else {
                    renderDevices([]);
                }
            } catch (e) {
                console.error('Load devices error:', e);
                renderDevices([]);
            }
        }
        
        function renderDevices(devices) {
            const container = document.getElementById('otherDevices');
            const terminateBtn = document.getElementById('terminateAllBtn');
            const currentDevice = getDeviceInfo();
            
            // Текущее устройство
            const current = devices.find(d => d.is_current) || {
                device_name: currentDevice.name,
                device_type: currentDevice.type,
                last_active: new Date().toISOString(),
                is_current: true
            };
            
            document.getElementById('currentIcon').textContent = currentDevice.icon;
            document.getElementById('currentName').textContent = current.device_name || currentDevice.name;
            document.getElementById('currentLastActive').textContent = formatTime(current.last_active);
            
            // Другие устройства
            const others = devices.filter(d => !d.is_current);
            
            if (others.length === 0) {
                container.innerHTML = `
                    <div class="device-card">
                        <div style="padding:20px;text-align:center;color:var(--text-muted);">
                            <div style="font-size:36px;margin-bottom:8px;opacity:0.5;">🔌</div>
                            <div>Нет других активных устройств</div>
                        </div>
                    </div>
                `;
                terminateBtn.style.display = 'none';
                return;
            }
            
            terminateBtn.style.display = 'block';
            
            container.innerHTML = others.map(d => `
                <div class="device-card" data-id="${d.id}">
                    <div class="device-header">
                        <div class="device-icon">${getDeviceIcon(d.device_type)}</div>
                        <div class="device-info">
                            <div class="device-name">${d.device_name || 'Устройство'}</div>
                            <div class="device-status offline">${formatTime(d.last_active)}</div>
                        </div>
                    </div>
                    <div class="device-details">
                        <div class="device-detail">
                            <span class="device-detail-label">IP-адрес</span>
                            <span>${maskIP(d.ip_address)}</span>
                        </div>
                        ${d.location ? `
                        <div class="device-detail">
                            <span class="device-detail-label">Местоположение</span>
                            <span>${d.location}</span>
                        </div>
                        ` : ''}
                    </div>
                    <div class="device-actions">
                        <button class="terminate-btn" onclick="terminateDevice('${d.id}')">Завершить сеанс</button>
                    </div>
                </div>
            `).join('');
        }
        
        function getDeviceIcon(type) {
            const icons = {
                'iphone': '📱',
                'ipad': '📟',
                'android': '📱',
                'windows': '💻',
                'mac': '💻',
                'linux': '💻'
            };
            return icons[type] || '📱';
        }
        
        function maskIP(ip) {
            if (!ip) return '—';
            const parts = ip.split('.');
            if (parts.length === 4) {
                return parts[0] + '.' + parts[1] + '.' + parts[2] + '.***';
            }
            return '***';
        }
        
        function formatTime(dateStr) {
            if (!dateStr) return '—';
            
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return 'Только что';
            if (minutes < 60) return minutes + ' мин. назад';
            if (hours < 24) return hours + ' ч. назад';
            if (days < 7) return days + ' дн. назад';
            
            return date.toLocaleDateString('ru');
        }
        
        // Завершить одну сессию
        async function terminateDevice(sessionId) {
            if (!confirm('Завершить сеанс на этом устройстве?')) return;
            
            try {
                const res = await fetch('/api/v1/users/devices/' + sessionId, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (res.ok) {
                    const el = document.querySelector('[data-id="' + sessionId + '"]');
                    if (el) el.remove();
                    
                    // Проверяем остальные
                    const remaining = document.querySelectorAll('#otherDevices .device-card');
                    if (remaining.length === 0) {
                        document.getElementById('otherDevices').innerHTML = `
                            <div class="device-card">
                                <div style="padding:20px;text-align:center;color:var(--text-muted);">
                                    <div style="font-size:36px;margin-bottom:8px;opacity:0.5;">🔌</div>
                                    <div>Нет других активных устройств</div>
                                </div>
                            </div>
                        `;
                        document.getElementById('terminateAllBtn').style.display = 'none';
                    }
                    
                    showToast('success', 'Сеанс завершён', '✓');
                }
            } catch (e) {
                showToast('error', 'Ошибка завершения', '❌');
            }
        }
        
        // Завершить все остальные сессии
        async function terminateAll() {
            if (!confirm('Завершить все остальные сеансы?')) return;
            
            try {
                const res = await fetch('/api/v1/users/devices/terminate-all', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (res.ok) {
                    document.getElementById('otherDevices').innerHTML = `
                        <div class="device-card">
                            <div style="padding:20px;text-align:center;color:var(--text-muted);">
                                <div style="font-size:36px;margin-bottom:8px;opacity:0.5;">🔌</div>
                                <div>Нет других активных устройств</div>
                            </div>
                        </div>
                    `;
                    document.getElementById('terminateAllBtn').style.display = 'none';
                    showToast('success', 'Все сеансы завершены', '✓');
                }
            } catch (e) {
                showToast('error', 'Ошибка', '❌');
            }
        }
        
        function showToast(type, message, icon) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.innerHTML = '<span>' + icon + '</span><span>' + message + '</span>';
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }
        
        // Инициализация
        (async function init() {
            await registerCurrentSession();
            await loadDevices();
        })();
    </script>
</body>
</html>
