<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Звуки - CraneApp</title>
    <script src="../../scripts/theme.js"></script>
    
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #121212;
            --bg-tertiary: #1E1E1E;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --text-muted: #666666;
            --border-color: #1E1E1E;
            --accent-color: #FF007F;
            --accent-gradient: linear-gradient(135deg, #FF007F, #9D00FF);
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        [data-theme="light"] {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F5F5;
            --bg-tertiary: #EEEEEE;
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #DDDDDD;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow-x: hidden; }
        
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding-top: var(--safe-area-top);
        }
        
        .header {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn:active { background: rgba(255,255,255,0.1); }
        .header-title { font-size: 17px; font-weight: 700; }
        
        .content { padding: 16px 0; }
        
        .section-header {
            padding: 12px 16px 8px;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        .section {
            background: var(--bg-secondary);
            margin: 0 0 12px 0;
        }
        
        @media (min-width: 768px) {
            .section { border-radius: 12px; margin: 0 8px 12px 8px; }
        }
        
        .item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.15s;
        }
        
        .item:last-child { border-bottom: none; }
        .item:active { background: var(--bg-tertiary); }
        
        .item-left { display: flex; align-items: center; gap: 12px; flex: 1; }
        
        .item-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .item-text { flex: 1; }
        .item-title { font-size: 15px; }
        .item-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        
        .toggle-switch {
            width: 42px;
            height: 26px;
            border-radius: 13px;
            background: #333333;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .toggle-switch.active { background: var(--accent-gradient); }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #FFFFFF;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }
        
        .toggle-switch.active::after { transform: translateX(16px); }
        
        .item-value { color: var(--text-secondary); font-size: 14px; margin-right: 8px; }
        .item-arrow { color: var(--text-muted); font-size: 16px; }
        
        .volume-slider {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .volume-icon { font-size: 20px; color: var(--text-secondary); }
        
        .slider-container { flex: 1; }
        
        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: var(--bg-tertiary);
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-gradient);
            cursor: pointer;
        }
        
        .volume-value { font-size: 14px; color: var(--text-secondary); min-width: 40px; text-align: right; }
        
        .sound-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        
        .sound-item:last-child { border-bottom: none; }
        .sound-item:active { background: var(--bg-tertiary); }
        .sound-item.selected { background: rgba(255,0,127,0.1); }
        
        .sound-name { font-size: 15px; }
        .sound-check { color: var(--accent-color); font-size: 18px; }
        
        .play-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }
        
        .toast-container {
            position: fixed;
            bottom: calc(70px + var(--safe-area-bottom));
            left: 12px;
            right: 12px;
            z-index: 10002;
            pointer-events: none;
        }
        
        .toast {
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid #00FF88;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            font-size: 13px;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    
    <div class="header">
        <button class="back-btn" onclick="history.back()">←</button>
        <span class="header-title">Звуки</span>
    </div>
    
    <div class="content">
        <div class="section-header">Громкость</div>
        <div class="section">
            <div class="volume-slider">
                <span class="volume-icon">🔔</span>
                <div class="slider-container">
                    <input type="range" id="notificationsVolume" min="0" max="100" value="80" oninput="updateVolume('notifications', this.value)">
                </div>
                <span class="volume-value" id="notificationsVolumeValue">80%</span>
            </div>
            <div class="volume-slider">
                <span class="volume-icon">🎵</span>
                <div class="slider-container">
                    <input type="range" id="mediaVolume" min="0" max="100" value="100" oninput="updateVolume('media', this.value)">
                </div>
                <span class="volume-value" id="mediaVolumeValue">100%</span>
            </div>
        </div>
        
        <div class="section-header">Уведомления</div>
        <div class="section">
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(255,75,75,0.2);">🔔</div>
                    <div class="item-text">
                        <div class="item-title">Звук уведомлений</div>
                    </div>
                </div>
                <div class="toggle-switch active" id="toggleNotifications" onclick="toggleSetting(this, 'notificationsSound')"></div>
            </div>
            <div class="item" onclick="openSoundPicker('notification')">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(42,171,238,0.2);">🎵</div>
                    <div class="item-text">
                        <div class="item-title">Мелодия уведомления</div>
                    </div>
                </div>
                <span class="item-value" id="notificationSoundValue">По умолчанию</span>
                <span class="item-arrow">›</span>
            </div>
        </div>
        
        <div class="section-header">Сообщения</div>
        <div class="section">
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(0,255,0,0.2);">💬</div>
                    <div class="item-text">
                        <div class="item-title">Звук сообщений</div>
                    </div>
                </div>
                <div class="toggle-switch active" id="toggleMessages" onclick="toggleSetting(this, 'messagesSound')"></div>
            </div>
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(157,0,255,0.2);">📤</div>
                    <div class="item-text">
                        <div class="item-title">Звук отправки</div>
                    </div>
                </div>
                <div class="toggle-switch active" id="toggleSend" onclick="toggleSetting(this, 'sendSound')"></div>
            </div>
            <div class="item" onclick="openSoundPicker('message')">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(255,165,0,0.2);">🎵</div>
                    <div class="item-text">
                        <div class="item-title">Мелодия сообщения</div>
                    </div>
                </div>
                <span class="item-value" id="messageSoundValue">По умолчанию</span>
                <span class="item-arrow">›</span>
            </div>
        </div>
        
        <div class="section-header">Звонки</div>
        <div class="section">
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(255,0,127,0.2);">📞</div>
                    <div class="item-text">
                        <div class="item-title">Звук звонка</div>
                    </div>
                </div>
                <div class="toggle-switch active" id="toggleCalls" onclick="toggleSetting(this, 'callsSound')"></div>
            </div>
            <div class="item" onclick="openSoundPicker('ringtone')">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(255,215,0,0.2);">🎵</div>
                    <div class="item-text">
                        <div class="item-title">Рингтон</div>
                    </div>
                </div>
                <span class="item-value" id="ringtoneSoundValue">По умолчанию</span>
                <span class="item-arrow">›</span>
            </div>
            <div class="item">
                <div class="item-left">
                    <div class="item-icon" style="background:rgba(0,136,255,0.2);">📳</div>
                    <div class="item-text">
                        <div class="item-title">Вибрация при звонке</div>
                    </div>
                </div>
                <div class="toggle-switch active" id="toggleVibrate" onclick="toggleSetting(this, 'vibrateOnCall')"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('craneapp_auth_token');
        
        let settings = {
            notificationsVolume: 80,
            mediaVolume: 100,
            notificationsSound: true,
            messagesSound: true,
            sendSound: true,
            callsSound: true,
            vibrateOnCall: true,
            notificationSound: 'default',
            messageSound: 'default',
            ringtone: 'default'
        };
        
        const sounds = {
            notification: [
                { id: 'default', name: 'По умолчанию' },
                { id: 'note', name: 'Нота' },
                { id: 'ping', name: 'Пинг' },
                { id: 'pop', name: 'Поп' },
                { id: 'chord', name: 'Аккорд' },
                { id: 'gentle', name: 'Нежный' }
            ],
            message: [
                { id: 'default', name: 'По умолчанию' },
                { id: 'bubble', name: 'Пузырь' },
                { id: 'click', name: 'Клик' },
                { id: 'tap', name: 'Тап' }
            ],
            ringtone: [
                { id: 'default', name: 'По умолчанию' },
                { id: 'melody1', name: 'Мелодия 1' },
                { id: 'melody2', name: 'Мелодия 2' },
                { id: 'classic', name: 'Классика' }
            ]
        };
        
        async function loadSettings() {
            try {
                const res = await fetch('/api/v1/users/sounds', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    settings = { ...settings, ...data.settings };
                }
            } catch (e) {
                const local = JSON.parse(localStorage.getItem('craneapp_sound_settings') || '{}');
                settings = { ...settings, ...local };
            }
            
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('notificationsVolume').value = settings.notificationsVolume;
            document.getElementById('notificationsVolumeValue').textContent = settings.notificationsVolume + '%';
            document.getElementById('mediaVolume').value = settings.mediaVolume;
            document.getElementById('mediaVolumeValue').textContent = settings.mediaVolume + '%';
            
            updateToggle('toggleNotifications', settings.notificationsSound);
            updateToggle('toggleMessages', settings.messagesSound);
            updateToggle('toggleSend', settings.sendSound);
            updateToggle('toggleCalls', settings.callsSound);
            updateToggle('toggleVibrate', settings.vibrateOnCall);
            
            updateSoundLabel('notification', settings.notificationSound);
            updateSoundLabel('message', settings.messageSound);
            updateSoundLabel('ringtone', settings.ringtone);
        }
        
        function updateToggle(id, value) {
            const el = document.getElementById(id);
            if (!el) return;
            if (value) el.classList.add('active');
            else el.classList.remove('active');
        }
        
        function updateSoundLabel(type, soundId) {
            const soundList = sounds[type];
            const sound = soundList.find(s => s.id === soundId);
            const labelMap = {
                notification: 'notificationSoundValue',
                message: 'messageSoundValue',
                ringtone: 'ringtoneSoundValue'
            };
            const el = document.getElementById(labelMap[type]);
            if (el && sound) {
                el.textContent = sound.name;
            }
        }
        
        function updateVolume(type, value) {
            settings[type + 'Volume'] = parseInt(value);
            document.getElementById(type + 'VolumeValue').textContent = value + '%';
            saveSettings();
        }
        
        async function toggleSetting(el, key) {
            el.classList.toggle('active');
            settings[key] = el.classList.contains('active');
            await saveSettings();
            showToast(settings[key] ? 'Включено' : 'Выключено', '✓');
        }
        
        function openSoundPicker(type) {
            const soundList = sounds[type];
            const currentSound = settings[type + 'Sound'] || settings[type] || 'default';
            
            let html = soundList.map(s => `
                <div class="sound-item ${s.id === currentSound ? 'selected' : ''}" onclick="selectSound('${type}', '${s.id}')">
                    <span class="sound-name">${s.name}</span>
                    <div>
                        <button class="play-btn" onclick="event.stopPropagation(); playSound('${type}', '${s.id}')">▶</button>
                        ${s.id === currentSound ? '<span class="sound-check">✓</span>' : ''}
                    </div>
                </div>
            `).join('');
            
            showPickerModal('Выберите звук', html);
        }
        
        async function selectSound(type, soundId) {
            if (type === 'ringtone') {
                settings.ringtone = soundId;
            } else {
                settings[type + 'Sound'] = soundId;
            }
            
            await saveSettings();
            updateUI();
            closePickerModal();
            showToast('Звук изменён', '✓');
        }
        
        function playSound(type, soundId) {
            // Простая симуляция воспроизведения
            const audio = new Audio();
            audio.volume = settings.notificationsVolume / 100;
            
            // В реальном приложении здесь были бы реальные файлы звуков
            try {
                audio.play();
            } catch (e) {}
            
            showToast('Воспроизведение...', '🔊');
        }
        
        async function saveSettings() {
            localStorage.setItem('craneapp_sound_settings', JSON.stringify(settings));
            
            try {
                await fetch('/api/v1/users/sounds', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(settings)
                });
            } catch (e) {}
        }
        
        // Picker Modal
        function showPickerModal(title, content) {
            const overlay = document.createElement('div');
            overlay.className = 'picker-overlay';
            overlay.id = 'pickerOverlay';
            overlay.onclick = closePickerModal;
            overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;';
            
            const modal = document.createElement('div');
            modal.id = 'pickerModal';
            modal.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:var(--bg-secondary);border-radius:20px 20px 0 0;z-index:1001;max-height:60vh;overflow-y:auto;';
            modal.innerHTML = `
                <div style="padding:16px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;">
                    <span style="font-size:17px;font-weight:700;">${title}</span>
                    <button style="background:none;border:none;color:var(--text-secondary);font-size:24px;cursor:pointer;" onclick="closePickerModal()">×</button>
                </div>
                <div>${content}</div>
            `;
            
            document.body.appendChild(overlay);
            document.body.appendChild(modal);
        }
        
        function closePickerModal() {
            const overlay = document.getElementById('pickerOverlay');
            const modal = document.getElementById('pickerModal');
            if (overlay) overlay.remove();
            if (modal) modal.remove();
        }
        
        function showToast(message, icon) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = '<span>' + icon + '</span><span>' + message + '</span>';
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }
        
        loadSettings();
    </script>
</body>
</html>
