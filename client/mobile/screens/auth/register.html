<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Craneapp - Регистрация</title>
    <link rel="stylesheet" href="../../../public/styles.css">
    <style>
        body {
            background-color: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .reg-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.4s ease-in-out;
        }

        /* Загрузка аватара */
        .avatar-picker {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
            cursor: pointer;
        }

        .avatar-preview {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #2b2b3d;
            object-fit: cover;
            border: 2px dashed #7a5cff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .avatar-overlay {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #7a5cff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            border: 3px solid #1a1a2e;
        }

        .form-title { color: #fff; font-size: 24px; margin-bottom: 8px; }
        .form-subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }

        .form-group { margin-bottom: 16px; position: relative; }

        .reg-input {
            width: 100%;
            padding: 14px 16px;
            background: #2b2b3d;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .reg-input:focus { border-color: #7a5cff; }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: #7a5cff;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .footer-text { margin-top: 24px; color: #888; font-size: 14px; }
        .footer-link { color: #7a5cff; text-decoration: none; font-weight: 500; }
        
        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="reg-container">
        <h1 class="form-title">Создать аккаунт</h1>
        <p class="form-subtitle">Присоединяйтесь к сообществу Craneapp</p>

        <div class="avatar-picker" onclick="document.getElementById('file-input').click()">
            <div id="preview" class="avatar-preview">👤</div>
            <div class="avatar-overlay">+</div>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <form id="register-form">
            <div class="form-group">
                <input type="text" id="username" class="reg-input" placeholder="Ваше имя" required>
            </div>
            <div class="form-group">
                <input type="tel" id="phone" class="reg-input" placeholder="Номер телефона" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" class="reg-input" placeholder="Пароль" required>
            </div>
            <div class="form-group">
                <input type="password" id="confirm" class="reg-input" placeholder="Повторите пароль" required>
            </div>

            <button type="submit" class="btn-register">Зарегистрироваться</button>
        </form>

        <div class="footer-text">
            Уже есть аккаунт? <a href="login.html" class="footer-link">Войти</a>
        </div>
    </div>

    <script type="module">
        import { Modal } from '../../components/ui/modal.js';

        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const form = document.getElementById('register-form');

        // Превью аватара
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    preview.innerHTML = `<img src="${f.target.result}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                    preview.style.borderStyle = 'solid';
                };
                reader.readAsDataURL(file);
            }
        };

        form.onsubmit = (e) => {
            e.preventDefault();
            
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            if (pass !== confirm) {
                new Modal({
                    title: 'Ошибка',
                    content: 'Пароли не совпадают!',
                    actions: [{ text: 'Исправить', type: 'primary', onClick: (m) => m.close() }]
                }).show();
                return;
            }

            console.log("Регистрация нового пользователя...");
            // Редирект на phoneVerification.html
            window.location.href = 'phoneVerification.html';
        };
    </script>
</body>
</html>
