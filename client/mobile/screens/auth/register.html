<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CraneApp - Регистрация</title>
    <style>
        :root {
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100%;
            overflow-x: hidden;
        }
        
        body {
            background-color: #0a0a0a;
            color: #FFFFFF;
            font-family: system-ui, -apple-system, -apple-system-body, sans-serif;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--safe-area-top) 0 var(--safe-area-bottom);
            background-image: radial-gradient(circle at 50% 50%, rgba(255,0,127,0.05) 0%, transparent 50%);
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            padding: 24px 20px;
            margin: 16px;
            background: rgba(18, 18, 18, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        @media (min-width: 768px) {
            .container {
                padding: 40px;
                border-radius: 24px;
            }
        }
        
        .logo-container {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
            border-radius: 24px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(255,0,127,0.2), rgba(157,0,255,0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 16px 48px rgba(255,0,127,0.3);
            animation: logoGlow 3s ease-in-out infinite;
        }
        
        @media (min-width: 768px) {
            .logo-container {
                width: 120px;
                height: 120px;
                border-radius: 30px;
                margin-bottom: 24px;
            }
        }
        
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 16px 48px rgba(255,0,127,0.3); }
            50% { box-shadow: 0 16px 64px rgba(255,0,127,0.5), 0 0 80px rgba(157,0,255,0.3); }
        }
        
        h1 {
            text-align: center;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #FF007F, #9D00FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 26px;
            font-weight: 800;
        }
        
        @media (min-width: 768px) {
            h1 { font-size: 32px; margin-bottom: 8px; }
        }
        
        .subtitle {
            text-align: center;
            color: #B0B0B0;
            margin-bottom: 24px;
            font-size: 14px;
        }
        
        @media (min-width: 768px) {
            .subtitle { font-size: 15px; margin-bottom: 32px; }
        }
        
        .input-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 6px; color: #B0B0B0; font-size: 13px; }
        
        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #333;
            background: #1E1E1E;
            color: #FFFFFF;
            font-size: 15px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        
        input:focus { border-color: #FF007F; }
        input::placeholder { color: #666; }
        
        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #FF007F, #9D00FF);
            color: #FFFFFF;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
            -webkit-appearance: none;
            appearance: none;
        }
        
        button:active { opacity: 0.85; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666666;
            font-size: 14px;
        }
        
        .footer a { color: #FF007F; text-decoration: none; }
        .footer a:active { text-decoration: underline; }
        
        .toast-container {
            position: fixed;
            bottom: calc(20px + var(--safe-area-bottom));
            left: 12px;
            right: 12px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        
        @media (min-width: 768px) {
            .toast-container { left: auto; right: 20px; }
        }
        
        .toast {
            padding: 12px 16px;
            background: #1E1E1E;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid #FF4B4B;
            font-size: 14px;
        }
        
        .toast.success { border-left-color: #00FF88; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    
    <div class="container">
        <div class="logo-container">
            <img src="https://i.ibb.co/QjTkyWfG/85-20260306202001.png" alt="CraneApp Logo">
        </div>
        
        <h1>Регистрация</h1>
        <p class="subtitle">Создайте новый аккаунт</p>
        
        <form id="registerForm">
            <div class="input-group">
                <label for="firstName">Имя</label>
                <input type="text" id="firstName" placeholder="Ваше имя" required autocomplete="given-name" autocapitalize="words">
            </div>
            <div class="input-group">
                <label for="username">Юзернейм</label>
                <input type="text" id="username" placeholder="@username (5-32 символа)" required autocomplete="username" minlength="5" maxlength="32" pattern="[a-zA-Z0-9_]+" autocapitalize="none" autocorrect="off">
            </div>
            <div class="input-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="Минимум 6 символов" required autocomplete="new-password" minlength="6">
            </div>
            <button type="submit" id="registerBtn">Создать аккаунт</button>
        </form>
        
        <div class="footer">
            Уже есть аккаунт? <a href="./login.html">Войти</a>
        </div>
    </div>

    <script>
        // Проверка: если уже залогинен → сразу в чаты
        const existingToken = localStorage.getItem('craneapp_auth_token');
        if (existingToken) {
            window.location.href = '/client/mobile/screens/chats/chats.html';
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('registerBtn');
            
            // Валидация
            if (firstName.length < 1) {
                showToast('error', 'Введите имя', '⚠️');
                return;
            }
            
            if (username.length < 5 || username.length > 32) {
                showToast('error', 'Юзернейм: 5-32 символа', '⚠️');
                return;
            }
            
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                showToast('error', 'Только буквы, цифры и _', '⚠️');
                return;
            }
            
            if (password.length < 6) {
                showToast('error', 'Пароль минимум 6 символов', '⚠️');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Создание...';

            try {
                const res = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: username, 
                        password: password, 
                        firstName: firstName,
                        lastName: '' 
                    })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.error || 'Ошибка регистрации');
                }
                
                if (data.token) {
                    // Сохраняем токен
                    localStorage.setItem('craneapp_auth_token', data.token);
                    
                    // Сохраняем данные пользователя
                    const user = data.user;
                    localStorage.setItem('craneapp_user_data', JSON.stringify({
                        id: user.id,
                        username: user.username,
                        firstName: user.firstName,
                        lastName: user.lastName || '',
                        bio: '',
                        avatarUrl: ''
                    }));
                    
                    // Дефолтные настройки для нового пользователя
                    localStorage.setItem('craneapp_settings', JSON.stringify({
                        theme: 'dark',
                        notifications: true,
                        sounds: true,
                        language: 'ru'
                    }));
                    
                    showToast('success', 'Аккаунт создан!', '✓');
                    
                    setTimeout(function() {
                        window.location.href = '/client/mobile/screens/chats/chats.html';
                    }, 500);
                } else {
                    throw new Error('Неверный формат ответа');
                }
            } catch (err) {
                console.error('Register error:', err);
                showToast('error', err.message, '❌');
                btn.disabled = false;
                btn.textContent = 'Создать аккаунт';
            }
        });

        function showToast(type, message, icon) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.innerHTML = '<span>' + icon + '</span><span>' + message + '</span>';
            container.appendChild(toast);
            setTimeout(function() {
                toast.style.opacity = '0';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
