<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Craneapp - Подтверждение</title>
    <link rel="stylesheet" href="../../../public/styles.css">
    <style>
        body {
            background-color: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .otp-container {
            max-width: 400px;
            width: 100%;
            animation: slideUp 0.4s ease-out;
        }

        .otp-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .otp-title { font-size: 22px; margin-bottom: 10px; }
        .otp-subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
        .target-phone { color: #7a5cff; font-weight: 600; }

        /* Сетка для цифр кода */
        .otp-inputs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .otp-field {
            width: 50px;
            height: 60px;
            background: #2b2b3d;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }

        .otp-field:focus {
            border-color: #7a5cff;
            box-shadow: 0 0 10px rgba(122, 92, 255, 0.3);
            background: #34344d;
        }

        .resend-container { margin-top: 20px; font-size: 14px; }
        .resend-link { color: #7a5cff; cursor: pointer; text-decoration: none; }
        .resend-link.disabled { color: #555; cursor: default; }

        .btn-verify {
            width: 100%;
            padding: 14px;
            background: #7a5cff;
            border-radius: 12px;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="otp-container">
        <div class="otp-icon">💬</div>
        <h1 class="otp-title">Подтверждение номера</h1>
        <p class="otp-subtitle">Мы отправили код на <br><span class="target-phone" id="display-phone">+7 999 *** 12 34</span></p>

        <form id="otp-form">
            <div class="otp-inputs">
                <input type="number" class="otp-field" maxlength="1" pattern="\d*" inputmode="numeric">
                <input type="number" class="otp-field" maxlength="1" pattern="\d*" inputmode="numeric">
                <input type="number" class="otp-field" maxlength="1" pattern="\d*" inputmode="numeric">
                <input type="number" class="otp-field" maxlength="1" pattern="\d*" inputmode="numeric">
            </div>
            
            <button type="submit" class="btn-verify">Подтвердить</button>
        </form>

        <div class="resend-container">
            Не получили код? <br>
            <span id="timer" class="resend-link disabled">Отправить повторно через 59с</span>
        </div>
    </div>

    <script type="module">
        const inputs = document.querySelectorAll('.otp-field');
        const form = document.getElementById('otp-form');

        // Автофокус и переход между полями
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }
                if (e.target.value !== "" && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === "Backspace" && e.target.value === "" && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Таймер повторной отправки
        let timeLeft = 59;
        const timerEl = document.getElementById('timer');
        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerEl.textContent = "Отправить повторно";
                timerEl.classList.remove('disabled');
            } else {
                timerEl.textContent = `Отправить повторно через ${timeLeft}с`;
                timeLeft--;
            }
        }, 1000);

        form.onsubmit = (e) => {
            e.preventDefault();
            const code = Array.from(inputs).map(i => i.value).join('');
            if (code.length === 4) {
                console.log("Верификация кода:", code);
                // Переход на main screen или завершение регистрации
            }
        };
    </script>
</body>
</html>
