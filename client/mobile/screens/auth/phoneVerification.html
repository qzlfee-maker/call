<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CraneApp - Подтверждение</title>
    <style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-container {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            border-radius: 16px;
            overflow: hidden;
            background: #121212;
            box-shadow: 0 4px 16px rgba(255, 0, 127, 0.2);
        }
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            font-size: 14px;
            color: #B0B0B0;
            margin-bottom: 32px;
            text-align: center;
        }
        .code-inputs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
        }
        .code-input {
            width: 44px;
            height: 54px;
            border-radius: 10px;
            border: 1px solid #333333;
            background: #1E1E1E;
            color: #FFFFFF;
            font-size: 22px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .code-input:focus {
            border-color: #FF007F;
        }
        .resend {
            color: #FF007F;
            cursor: pointer;
            font-size: 14px;
            margin-top: 16px;
        }
        .verify-btn {
            width: 100%;
            height: 48px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #FF007F 0%, #9D00FF 100%);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .verify-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo-container">
            <img src="https://i.ibb.co/QjTkyWfG/85-20260306202001.png" alt="CraneApp Logo">
        </div>
        <h1 class="title">Подтверждение</h1>
        <p class="subtitle">Введите код из SMS</p>
        
        <div class="code-inputs" id="codeInputs">
            <input type="tel" class="code-input" maxlength="1" />
            <input type="tel" class="code-input" maxlength="1" />
            <input type="tel" class="code-input" maxlength="1" />
            <input type="tel" class="code-input" maxlength="1" />
            <input type="tel" class="code-input" maxlength="1" />
            <input type="tel" class="code-input" maxlength="1" />
        </div>

        <button id="verifyBtn" class="verify-btn">Подтвердить</button>
        <div class="resend" id="resendBtn">Отправить код повторно</div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.code-input');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                checkComplete();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function checkComplete() {
            let code = '';
            inputs.forEach(input => code += input.value);
            return code.length === 6;
        }

        verifyBtn.addEventListener('click', async () => {
            let code = '';
            inputs.forEach(input => code += input.value);
            
            if (code.length !== 6) {
                alert('Введите 6-значный код');
                return;
            }

            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Проверка...';

            try {
                await new Promise(resolve => setTimeout(resolve, 1000));
                window.location.href = '../chats/chats.html';
            } catch (err) {
                alert('Неверный код');
                verifyBtn.disabled = false;
                verifyBtn.textContent = 'Подтвердить';
            }
        });

        resendBtn.addEventListener('click', async () => {
            resendBtn.textContent = 'Отправка...';
            await new Promise(resolve => setTimeout(resolve, 1000));
            resendBtn.textContent = 'Код отправлен';
            setTimeout(() => resendBtn.textContent = 'Отправить код повторно', 3000);
        });
    </script>
</body>
</html>
