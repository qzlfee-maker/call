<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craneapp - Создать канал</title>
    <link rel="stylesheet" href="../../../public/styles.css">
    <style>
        body {
            background-color: #0f0f1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            color: #fff;
        }

        /* Основной контейнер с прокруткой */
        .channel-setup-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 80px 20px 90px; /* Отступы под хедер и FAB */
            -webkit-overflow-scrolling: touch;
        }

        /* Блок с аватаром и названием */
        .channel-header-block {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .channel-avatar-picker {
            position: relative;
            width: 70px;
            height: 70px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .channel-avatar-preview {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #2b2b3d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 1px dashed #7a5cff;
            object-fit: cover;
        }

        .channel-avatar-overlay {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #7a5cff;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            border: 2px solid #0f0f1a;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .crane-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 16px;
            padding: 8px 0;
            outline: none;
            transition: border-color 0.3s;
        }

        .crane-input:focus { border-color: #7a5cff; }
        
        textarea.crane-input {
            resize: none;
            height: 60px;
            line-height: 1.4;
        }

        /* Секция настроек канала */
        .settings-section {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 16px;
            margin-top: 24px;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-info { display: flex; flex-direction: column; gap: 4px; }
        .settings-title { font-size: 16px; font-weight: 500; }
        .settings-desc { font-size: 12px; color: #888; line-height: 1.3; max-width: 80%; }

        /* Кастомный Toggle (Переключатель) */
        .crane-toggle {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .crane-toggle input { opacity: 0; width: 0; height: 0; }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2b2b3d;
            transition: .3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        .crane-toggle input:checked + .toggle-slider { background-color: #7a5cff; }
        .crane-toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

        /* Плавающая кнопка (FAB) */
        .fab-done {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: #7a5cff;
            box-shadow: 0 4px 15px rgba(122, 92, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            border: none;
            cursor: pointer;
            z-index: 100;
            transform: scale(0);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .fab-done.visible { transform: scale(1); }

        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="header-mount"></div>

    <main class="channel-setup-scroll">
        
        <div class="channel-header-block">
            <div class="channel-avatar-picker" onclick="document.getElementById('file-input').click()">
                <div id="preview" class="channel-avatar-preview">📢</div>
                <div class="channel-avatar-overlay">+</div>
                <input type="file" id="file-input" accept="image/*">
            </div>
            
            <div class="input-group">
                <input type="text" id="channel-name" class="crane-input" placeholder="Название канала" maxlength="50">
            </div>
        </div>

        <div class="input-group">
            <textarea id="channel-desc" class="crane-input" placeholder="Описание (необязательно)" maxlength="255"></textarea>
        </div>

        <div class="settings-section">
            <div class="settings-row">
                <div class="settings-info">
                    <span class="settings-title">Публичный канал</span>
                    <span class="settings-desc">Любой пользователь сможет найти канал через поиск и подписаться на него.</span>
                </div>
                <label class="crane-toggle">
                    <input type="checkbox" id="is-public" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

    </main>

    <button class="fab-done" id="btn-create">➔</button>

    <script type="module">
        import { Header } from '../../components/navigation/header.js';

        // 1. Инициализация Хедера
        const header = new Header({
            title: 'Новый канал',
            showBack: true,
            onBack: () => window.history.back()
        });
        document.getElementById('header-mount').appendChild(header.render());

        // 2. Превью аватара
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    preview.innerHTML = `<img src="${f.target.result}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                    preview.style.borderStyle = 'solid';
                };
                reader.readAsDataURL(file);
            }
        };

        // 3. Логика валидации и кнопки создания
        const channelNameInput = document.getElementById('channel-name');
        const channelDescInput = document.getElementById('channel-desc');
        const isPublicToggle = document.getElementById('is-public');
        const fabDone = document.getElementById('btn-create');

        channelNameInput.addEventListener('input', () => {
            if (channelNameInput.value.trim().length > 0) {
                fabDone.classList.add('visible');
            } else {
                fabDone.classList.remove('visible');
            }
        });

        // 4. Отправка данных
        fabDone.onclick = () => {
            const channelData = {
                name: channelNameInput.value.trim(),
                description: channelDescInput.value.trim(),
                isPublic: isPublicToggle.checked,
                type: 'channel'
            };
            
            console.log('Создание канала:', channelData);
            // Здесь будет вызов API: await chatApi.createChannel(channelData)
            
            // После успешного создания перекидываем в окно чата
            window.location.href = 'chat.html?id=new_channel';
        };
    </script>
</body>
</html>
