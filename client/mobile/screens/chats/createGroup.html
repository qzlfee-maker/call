<!DOCTYPE html>
<html lang="ru">
<!-- ТЕМА И НАСТРОЙКИ -->
<script src="../scripts/theme.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая группа - CraneApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0a; color: #FFFFFF;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh; display: flex; justify-content: center;
        }
        .app-wrapper { width: 100%; display: flex; flex-direction: column; }
        @media (min-width: 768px) {
            .app-wrapper { max-width: 560px; border-left: 1px solid #1E1E1E; border-right: 1px solid #1E1E1E; background: #000000; }
        }
        .header { padding: 16px; background: #121212; border-bottom: 1px solid #1E1E1E; display: flex; align-items: center; justify-content: space-between; }
        .cancel-btn, .next-btn { background: none; border: none; color: #FF007F; font-size: 16px; cursor: pointer; font-weight: 600; }
        .next-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .content { flex: 1; padding: 16px; overflow-y: auto; }
        .avatar-upload { width: 100px; height: 100px; border-radius: 50px; background: #1E1E1E; margin: 24px auto; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; border: 2px dashed #333; }
        .input-group { margin-bottom: 24px; }
        .input-label { display: block; font-size: 14px; color: #B0B0B0; margin-bottom: 8px; }
        .input-field { width: 100%; height: 48px; border-radius: 12px; border: 1px solid #333; background: #1E1E1E; color: #FFFFFF; padding: 0 16px; font-size: 16px; outline: none; }
        .input-field:focus { border-color: #FF007F; }
        .contact-list { margin-top: 24px; }
        .contact-item { display: flex; align-items: center; padding: 12px; border-radius: 12px; cursor: pointer; transition: background 0.2s; margin-bottom: 8px; }
        .contact-item:hover { background: #1E1E1E; }
        .contact-item.selected { background: rgba(255, 0, 127, 0.2); border: 1px solid #FF007F; }
        .contact-avatar { width: 40px; height: 40px; border-radius: 20px; background: linear-gradient(135deg, #FF007F, #9D00FF); display: flex; align-items: center; justify-content: center; font-size: 16px; margin-right: 12px; }
        .contact-name { flex: 1; font-size: 15px; }
        .checkmark { color: #FF007F; font-size: 20px; display: none; }
        .contact-item.selected .checkmark { display: block; }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div class="header">
            <button class="cancel-btn" onclick="history.back()">Отмена</button>
            <span style="font-weight: 600;">Новая группа</span>
            <button class="next-btn" id="nextBtn" disabled onclick="createGroup()">Далее</button>
        </div>

        <div class="content">
            <div class="avatar-upload" onclick="document.getElementById('avatarInput').click()">
                📷
                <input type="file" id="avatarInput" accept="image/*" style="display: none;" onchange="previewAvatar(event)">
            </div>

            <div class="input-group">
                <label class="input-label">Название группы</label>
                <input type="text" class="input-field" id="groupName" placeholder="Введите название" maxlength="50">
            </div>

            <div class="input-group">
                <label class="input-label">Описание (необязательно)</label>
                <input type="text" class="input-field" id="groupDesc" placeholder="О группе" maxlength="255">
            </div>

            <div style="font-size: 14px; color: #B0B0B0; margin-bottom: 12px;">Выберите участников:</div>
            
            <div class="contact-list" id="contactList">
                <!-- Контакты будут здесь -->
            </div>
        </div>
    </div>

    <script>
        const contacts = [
            { id: '1', name: 'IRIS AI', av: '🤖' },
            { id: '2', name: 'Поддержка', av: '🎧' },
            { id: '3', name: 'Новости', av: '📢' },
            { id: '4', name: 'Дизайн Чат', av: '🎨' },
            { id: '5', name: 'Работа', av: '💼' }
        ];

        let selected = [];

        function renderContacts() {
            const container = document.getElementById('contactList');
            container.innerHTML = '';
            contacts.forEach(c => {
                const item = document.createElement('div');
                item.className = 'contact-item' + (selected.includes(c.id) ? ' selected' : '');
                item.onclick = () => toggleContact(c.id);
                item.innerHTML = `
                    <div class="contact-avatar">${c.av}</div>
                    <div class="contact-name">${c.name}</div>
                    <div class="checkmark">✓</div>
                `;
                container.appendChild(item);
            });
            document.getElementById('nextBtn').disabled = selected.length === 0;
        }

        function toggleContact(id) {
            if (selected.includes(id)) {
                selected = selected.filter(i => i !== id);
            } else {
                selected.push(id);
            }
            renderContacts();
        }

        function previewAvatar(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.querySelector('.avatar-upload').innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;border-radius:50px;object-fit:cover;">`;
                };
                reader.readAsDataURL(file);
            }
        }

        function createGroup() {
            const name = document.getElementById('groupName').value.trim();
            if (!name) { alert('Введите название группы'); return; }
            alert(`Группа "${name}" создана с ${selected.length} участниками!`);
            window.location.href = './chats.html';
        }

        renderContacts();
    </script>
</body>
</html>
