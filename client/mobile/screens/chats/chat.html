<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craneapp - Приватный чат</title>
    <link rel="stylesheet" href="../../../public/styles.css">
    <style>
        :root {
            --chat-bg: #0f0f1a;
            --footer-bg: #1a1a2e;
        }

        body {
            background-color: var(--chat-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        /* Основной контейнер сообщений */
        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 70px 12px 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
            /* Оптимизация скролла для мобильных */
            -webkit-overflow-scrolling: touch;
            background-image: radial-gradient(circle at 50% 50%, rgba(122, 92, 255, 0.05) 0%, transparent 100%);
        }

        /* Индикатор того, что собеседник печатает */
        #typing-indicator {
            padding: 4px 16px;
            font-size: 12px;
            color: #7a5cff;
            height: 20px;
            transition: opacity 0.3s;
            opacity: 0;
        }

        #typing-indicator.active {
            opacity: 1;
        }

        /* Футер фиксируется снизу и адаптируется под клавиатуру */
        .chat-footer-container {
            background: var(--footer-bg);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }

        /* Стили для системных уведомлений (дата, шифрование) */
        .system-badge {
            align-self: center;
            background: rgba(43, 43, 61, 0.6);
            color: #888;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 12px;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Плавное появление новых сообщений */
        .msg-animate {
            animation: msgIn 0.2s ease-out;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="header-mount"></div>

    <main id="chat-flow">
        <div class="system-badge">🛡️ Сквозное шифрование включено</div>
        <div class="system-badge">Сегодня</div>
        
        <div id="messages-list"></div>
    </main>

    <div class="chat-footer-container">
        <div id="typing-indicator">Александр печатает...</div>
        <div id="input-mount"></div>
    </div>

    <script type="module">
        import { Header } from '../../components/navigation/header.js';
        import { MessageInput } from '../../components/chat/messageInput.js';
        import { MessageBubble } from '../../components/chat/messageBubble.js';
        import { socketClient } from '../../services/socket/socketClient.js';

        // 1. Инициализация заголовка чата
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('id') || 'new';

        const header = new Header({
            title: 'Александр',
            subtitle: 'в сети',
            avatarUrl: 'https://i.pravatar.cc/150?u=alex',
            showBack: true,
            onBack: () => window.location.href = 'chats.html',
            actions: [
                { icon: '📞', onClick: () => console.log('Call...') },
                { icon: '🔍', onClick: () => console.log('Search in chat...') }
            ]
        });
        document.getElementById('header-mount').appendChild(header.render());

        // 2. Инициализация ввода
        const messageInput = new MessageInput({
            onSendMessage: (text) => {
                sendMessage(text);
            },
            onTyping: () => {
                // Эмит события через сокет
                socketClient.emit('typing', { chatId });
            }
        });
        document.getElementById('input-mount').appendChild(messageInput.render());

        // 3. Логика отправки и отображения
        const messagesList = document.getElementById('messages-list');
        const chatFlow = document.getElementById('chat-flow');

        function sendMessage(text) {
            if(!text.trim()) return;

            const msg = new MessageBubble({
                id: Date.now().toString(),
                text: text,
                timestamp: new Date().toISOString(),
                isOwn: true,
                status: 'sending' // 'sent', 'delivered', 'read'
            });

            const el = msg.render();
            el.classList.add('msg-animate');
            messagesList.appendChild(el);
            
            // Авто-скролл вниз
            chatFlow.scrollTop = chatFlow.scrollHeight;

            // Имитация API запроса
            setTimeout(() => {
                msg.updateStatus('sent');
            }, 1000);
        }

        // Прием входящих сообщений (демо)
        window.addEventListener('load', () => {
            setTimeout(() => {
                const incoming = new MessageBubble({
                    id: 'rcv_1',
                    text: 'Привет! Это чистый код для Railway 🚀',
                    timestamp: new Date().toISOString(),
                    isOwn: false
                });
                messagesList.appendChild(incoming.render());
            }, 2000);
        });

    </script>
</body>
</html>
