<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск - CraneApp</title>
    
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #121212;
            --bg-tertiary: #1E1E1E;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --border-color: #1E1E1E;
            --accent-color: #FF007F;
            --accent-gradient: linear-gradient(135deg, #FF007F, #9D00FF);
            --success-color: #00FF88;
            --error-color: #FF4B4B;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            font-family: system-ui; 
            min-height: 100vh;
        }
        .header { 
            padding: 16px; 
            background: var(--bg-secondary); 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            align-items: center; 
            gap: 16px; 
        }
        .back { 
            background: none; 
            border: none; 
            color: var(--text-primary); 
            font-size: 24px; 
            cursor: pointer; 
        }
        .search-hint {
            padding: 12px 16px;
            background: rgba(255, 0, 127, 0.1);
            border-left: 3px solid var(--accent-color);
            margin: 16px;
            border-radius: 8px;
            font-size: 13px;
        }
        .search-container { padding: 0 16px 16px; }
        .search-input {
            width: 100%;
            height: 48px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            padding: 0 16px;
            font-size: 16px;
            outline: none;
        }
        .search-input:focus { border-color: var(--accent-color); }
        
        .search-status {
            padding: 8px 16px;
            font-size: 13px;
            display: none;
        }
        .search-status.visible { display: block; }
        .search-status.searching { color: var(--accent-color); }
        .search-status.found { color: var(--success-color); }
        .search-status.not-found { color: var(--error-color); }
        
        .results { padding: 0 16px 16px; }
        .result-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            cursor: pointer;
        }
        .result-item:hover { 
            background: var(--bg-tertiary);
            border-color: var(--accent-color);
        }
        .result-avatar {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
        }
        .result-info { flex: 1; }
        .result-name { font-weight: 600; margin-bottom: 4px; }
        .result-username { color: var(--text-secondary); font-size: 14px; }
        .action-btn {
            padding: 8px 16px;
            border-radius: 12px;
            border: none;
            background: var(--accent-gradient);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .action-btn:disabled { opacity: 0.5; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back" onclick="history.back()">←</button>
        <h2>Поиск пользователей</h2>
    </div>
    
    <div class="search-hint">
        💡 Введите юзернейм (минимум 2 символа)
    </div>
    
    <div class="search-container">
        <input type="text" class="search-input" placeholder="@username" id="searchInput" autocomplete="off">
    </div>
    
    <div class="search-status" id="searchStatus"></div>
    
    <div class="results" id="results">
        <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div>Введите юзернейм для поиска</div>
        </div>
    </div>

    <script>
        console.log('✅ Скрипт поиска загружен!');

        // ✅ ИСПРАВЛЕНИЕ 1: Правильный ключ токена
        const token = localStorage.getItem('craneapp_auth_token');
        console.log('🔑 Токен:', token ? '✅ Найден' : '❌ Не найден');
        
        if (!token) {
            alert('Требуется вход в аккаунт');
            window.location.href = '../auth/login.html';
        }

        let searchTimeout = null;

        document.getElementById('searchInput').addEventListener('input', (e) => {
            let query = e.target.value.trim().replace('@', '');
            clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                document.getElementById('searchStatus').classList.remove('visible');
                document.getElementById('results').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div>Введите юзернейм для поиска</div>
                    </div>
                `;
                return;
            }
            
            searchTimeout = setTimeout(() => searchUsers(query), 300);
        });

        async function searchUsers(query) {
            console.log('🔍 Поиск:', query);
            
            const statusEl = document.getElementById('searchStatus');
            statusEl.className = 'search-status visible searching';
            statusEl.innerHTML = 'Поиск...';
            
            try {
                // ✅ ИСПРАВЛЕНИЕ 2: Параметр q вместо query
                const res = await fetch(`/api/v1/users/search?q=${encodeURIComponent(query)}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                console.log('📊 Статус:', res.status);
                
                const data = await res.json();
                console.log('📦 Ответ:', data);
                
                // ✅ ИСПРАВЛЕНИЕ 3: Проверка без data.success
                if (data.users && data.users.length > 0) {
                    statusEl.className = 'search-status visible found';
                    statusEl.innerHTML = '✅ Найдено: ' + data.users.length;
                    renderResults(data.users);
                } else {
                    statusEl.className = 'search-status visible not-found';
                    statusEl.innerHTML = '❌ Ничего не найдено';
                    document.getElementById('results').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">😕</div>
                            <div>Ничего не найдено</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('❌ Ошибка:', error);
                statusEl.className = 'search-status visible not-found';
                statusEl.innerHTML = '❌ Ошибка: ' + error.message;
            }
        }

        function renderResults(users) {
            console.log('📝 Рендер:', users.length, 'пользователей');
            
            const container = document.getElementById('results');
            container.innerHTML = users.map(user => {
                console.log('  - ' + user.username);
                return `
                    <div class="result-item" onclick="startChat('${user.id}', '${user.username}')">
                        <div class="result-avatar">${(user.firstName || user.username)[0].toUpperCase()}</div>
                        <div class="result-info">
                            <div class="result-name">${user.firstName || user.lastName || 'Пользователь'}</div>
                            <div class="result-username">@${user.username}</div>
                        </div>
                        <button class="action-btn">Написать</button>
                    </div>
                `;
            }).join('');
        }

        async function startChat(userId, username) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '...';
            
            try {
                // ✅ ИСПРАВЛЕНИЕ 4: Правильная структура тела запроса
                const res = await fetch('/api/v1/chats/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ 
                        type: 'private', 
                        participants: [userId] 
                    })
                });
                
                const data = await res.json();
                console.log('Создание чата:', data);
                
                if (data.chatId) {
                    btn.className = 'action-btn success';
                    btn.textContent = '✓';
                    alert('Чат создан!');
                    setTimeout(() => {
                        window.location.href = '../chats/chats.html';
                    }, 1000);
                } else {
                    throw new Error(data.error || 'Не удалось создать чат');
                }
            } catch (error) {
                console.error('Ошибка создания чата:', error);
                alert('Ошибка: ' + error.message);
                btn.disabled = false;
                btn.textContent = 'Написать';
            }
        }
    </script>
</body>
</html>
