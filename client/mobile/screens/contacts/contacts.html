<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты - CraneApp</title>
    
    <script src="../../scripts/theme.js"></script>
    
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #121212;
            --bg-tertiary: #1E1E1E;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --border-color: #1E1E1E;
            --accent-color: #FF007F;
            --accent-gradient: linear-gradient(135deg, #FF007F, #9D00FF);
        }
        [data-theme="light"] {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F5F5;
            --bg-tertiary: #EEEEEE;
            --text-primary: #000000;
            --text-secondary: #666666;
            --border-color: #DDDDDD;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            font-family: system-ui; 
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .header { 
            padding: 16px; 
            background: var(--bg-secondary); 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
        }
        .header-title { font-size: 20px; font-weight: 700; }
        .header-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-btn:hover { background: rgba(255,255,255,0.1); }
        
        .search-banner {
            padding: 16px;
            background: linear-gradient(135deg, rgba(255,0,127,0.1), rgba(157,0,255,0.1));
            margin: 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }
        .search-banner:hover { background: linear-gradient(135deg, rgba(255,0,127,0.15), rgba(157,0,255,0.15)); }
        .search-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .search-text { flex: 1; }
        .search-title { font-weight: 600; margin-bottom: 2px; }
        .search-subtitle { font-size: 13px; color: var(--text-secondary); }
        
        .contacts-list { padding: 0 16px; }
        .contact-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .contact-avatar {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
        }
        .contact-name { font-weight: 600; }
        .contact-status { font-size: 13px; color: var(--text-secondary); }
        
        .tab-bar {
            height: 60px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }
        @media (min-width: 768px) { .tab-bar { display: none; } }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: var(--text-muted);
        }
        .tab-item.active { color: var(--accent-color); }
        .tab-icon { font-size: 24px; }
        .tab-label { font-size: 11px; }
    </style>
</head>
<body>
    <div class="header">
        <span class="header-title">Контакты</span>
        <button class="header-btn" onclick="location.href='./search.html'">🔍</button>
    </div>
    
    <!-- Баннер поиска -->
    <div class="search-banner" onclick="location.href='./search.html'">
        <div class="search-icon">🔍</div>
        <div class="search-text">
            <div class="search-title">Найти пользователя</div>
            <div class="search-subtitle">Поиск по юзернейму</div>
        </div>
        <div style="color:var(--text-muted);">›</div>
    </div>
    
    <!-- Список контактов -->
    <div class="contacts-list">
        <div class="contact-item">
            <div class="contact-avatar">👤</div>
            <div>
                <div class="contact-name">IRIS AI</div>
                <div class="contact-status">бот</div>
            </div>
        </div>
    </div>
    
    <div class="tab-bar" id="tabBar"></div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '../auth/login.html';

        const tabBar = document.getElementById('tabBar');
        const tabs = [
            { icon: '👥', label: 'Контакты', page: './contacts.html', active: true },
            { icon: '📞', label: 'Звонки', page: '../calls/calls.html' },
            { icon: '💬', label: 'Чаты', page: '../chats/chats.html' },
            { icon: '⚙', label: 'Настройки', page: '../settings/settings.html' }
        ];
        tabs.forEach(t => {
            const div = document.createElement('div');
            div.className = 'tab-item' + (t.active ? ' active' : '');
            div.innerHTML = `<span class="tab-icon">${t.icon}</span><span class="tab-label">${t.label}</span>`;
            div.onclick = () => { if (!t.active) window.location.href = t.page; };
            tabBar.appendChild(div);
        });
    </script>
</body>
</html>
