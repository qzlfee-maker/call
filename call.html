<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TelegramCall – Активный звонок</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        .call-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }
        .call-header {
            background: linear-gradient(180deg, rgba(26,26,46,0.95) 0%, rgba(26,26,46,0.8) 100%);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(46,166,255,0.3);
            flex-shrink: 0;
            z-index: 100;
        }
        .call-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .call-name {
            font-weight: 600;
            font-size: 18px;
            letter-spacing: -0.3px;
        }
        .call-status {
            font-size: 12px;
            color: #8b949e;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        .status-indicator.connecting { background: #f59e0b; animation: pulse 1s infinite; }
        .status-indicator.reconnecting { background: #ef4444; animation: pulse 0.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .call-timer {
            font-size: 20px;
            font-weight: 600;
            font-family: 'SF Mono', Monaco, monospace;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 20px;
        }
        .video-container {
            flex: 1;
            position: relative;
            background: #000;
            display: grid;
            gap: 4px;
            padding: 4px;
        }
        .video-container.grid-1 { grid-template-columns: 1fr; }
        .video-container.grid-2 { grid-template-columns: 1fr 1fr; }
        .video-container.grid-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .video-container.grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        
        .video-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a2e;
        }
        .remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .local-video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 180px;
            height: 120px;
            object-fit: cover;
            border-radius: 16px;
            border: 3px solid #2ea6ff;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .local-video:hover { transform: scale(1.05); }
        .local-video.minimized {
            width: 120px;
            height: 80px;
        }
        
        .video-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .video-off-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            opacity: 0.5;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: linear-gradient(0deg, rgba(26,26,46,0.95) 0%, rgba(26,26,46,0.8) 100%);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            flex-wrap: wrap;
            z-index: 100;
        }
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            background: #2ea6ff;
            color: white;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(46,166,255,0.3);
        }
        .control-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(46,166,255,0.4); }
        .control-btn:active { transform: scale(0.92); }
        .control-btn.end-call { 
            background: #dc2626; 
            box-shadow: 0 4px 15px rgba(220,38,38,0.3);
        }
        .control-btn.end-call:hover { box-shadow: 0 6px 20px rgba(220,38,38,0.4); }
        .control-btn.inactive { 
            background: #4a4a6a; 
            opacity: 0.6;
            box-shadow: none;
        }
        .control-btn.inactive:hover { transform: none; }
        
        .extra-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(26,26,46,0.6);
            border-top: 1px solid rgba(46,166,255,0.2);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .extra-btn {
            background: rgba(42,42,58,0.8);
            border: 1px solid rgba(46,166,255,0.2);
            padding: 10px 20px;
            border-radius: 24px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .extra-btn:hover { background: rgba(46,166,255,0.2); border-color: #2ea6ff; }
        .extra-btn.active { background: #2ea6ff; border-color: #2ea6ff; }
        .extra-btn.recording { 
            background: #dc2626; 
            border-color: #dc2626;
            animation: recording-pulse 1.5s infinite;
        }
        @keyframes recording-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .chat-panel {
            position: fixed;
            bottom: 100px;
            right: 16px;
            width: 320px;
            max-height: 400px;
            background: rgba(26,26,46,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            display: none;
            flex-direction: column;
            z-index: 200;
            border: 1px solid rgba(46,166,255,0.2);
            overflow: hidden;
        }
        .chat-panel.open { display: flex; }
        .chat-header {
            padding: 16px;
            border-bottom: 1px solid rgba(46,166,255,0.2);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-close { cursor: pointer; opacity: 0.7; }
        .chat-close:hover { opacity: 1; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-size: 13px;
            max-height: 250px;
        }
        .chat-message {
            margin-bottom: 10px;
            padding: 8px 12px;
            background: rgba(46,166,255,0.1);
            border-radius: 12px;
            border-bottom-left-radius: 4px;
        }
        .chat-message.own {
            background: rgba(46,166,255,0.2);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 4px;
            text-align: right;
        }
        .chat-message-author {
            font-size: 11px;
            color: #2ea6ff;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .chat-input {
            display: flex;
            padding: 12px;
            border-top: 1px solid rgba(46,166,255,0.2);
            gap: 8px;
        }
        .chat-input input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(46,166,255,0.2);
            padding: 10px 16px;
            border-radius: 24px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .chat-input input:focus { border-color: #2ea6ff; }
        .chat-input button {
            background: #2ea6ff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
        }
        .chat-input button:hover { transform: scale(1.05); }
        .chat-input button:active { transform: scale(0.95); }
        
        .notification {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-100%);
            background: rgba(26,26,46,0.95);
            backdrop-filter: blur(20px);
            border-left: 4px solid #2ea6ff;
            border-radius: 16px;
            padding: 16px 24px;
            font-size: 14px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            max-width: 90%;
            animation: slideDown 0.3s forwards;
        }
        .notification.error { border-left-color: #dc2626; }
        .notification.success { border-left-color: #22c55e; }
        @keyframes slideDown {
            to { transform: translateX(-50%) translateY(0); }
        }
        
        .network-stats {
            position: fixed;
            top: 80px;
            left: 16px;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-family: monospace;
            color: #8b949e;
            z-index: 50;
            display: none;
        }
        .network-stats.show { display: block; }
        .stat-row { display: flex; gap: 12px; }
        .stat-value { color: #2ea6ff; }
        
        .waiting-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26,26,46,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            z-index: 300;
            display: none;
            border: 1px solid rgba(46,166,255,0.3);
        }
        .waiting-panel.show { display: block; }
        .waiting-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .waiting-list { max-height: 200px; overflow-y: auto; }
        .waiting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .waiting-actions { display: flex; gap: 8px; }
        .waiting-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }
        .waiting-btn.accept { background: #22c55e; color: white; }
        .waiting-btn.reject { background: #dc2626; color: white; }
        
        @media (max-width: 768px) {
            .local-video { width: 120px; height: 80px; bottom: 12px; right: 12px; }
            .local-video.minimized { width: 90px; height: 60px; }
            .control-btn { width: 52px; height: 52px; font-size: 20px; }
            .extra-btn { padding: 8px 14px; font-size: 13px; }
            .chat-panel { width: calc(100% - 32px); right: 16px; bottom: 90px; }
            .video-container.grid-2,
            .video-container.grid-3,
            .video-container.grid-4 { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .local-video { width: 100px; height: 66px; }
            .control-btn { width: 48px; height: 48px; font-size: 18px; }
            .controls { gap: 12px; padding: 16px; }
        }
        
        .hidden { display: none !important; }
        .debug-info {
            position: fixed;
            bottom: 4px;
            left: 4px;
            font-size: 9px;
            color: #666;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 1000;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="call-container">
    <div class="call-header">
        <div class="call-info">
            <div class="call-name" id="callName">Соединение...</div>
            <div class="call-status" id="callStatus">
                <span class="status-indicator connecting" id="statusIndicator"></span>
                <span id="statusText">Устанавливается</span>
            </div>
        </div>
        <div class="call-timer" id="callTimer">00:00</div>
    </div>
    
    <div class="network-stats" id="networkStats">
        <div class="stat-row">
            <span>↓ <span class="stat-value" id="downlinkSpeed">-</span> Mbps</span>
            <span>RTT: <span class="stat-value" id="rttValue">-</span> ms</span>
        </div>
    </div>
    
    <div class="video-container" id="videoContainer">
        <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
        <video id="localVideo" class="local-video" autoplay playsinline muted></video>
    </div>
    
    <div class="controls" id="mainControls">
        <button class="control-btn" id="toggleMuteBtn" title="Микрофон">🎤</button>
        <button class="control-btn" id="toggleVideoBtn" title="Камера">📹</button>
        <button class="control-btn" id="switchCameraBtn" title="Переключить камеру">🔄</button>
        <button class="control-btn" id="toggleStatsBtn" title="Статистика">📊</button>
        <button class="control-btn end-call" id="endCallBtn" title="Завершить">📞</button>
    </div>
    
    <div class="extra-controls" id="extraControls">
        <button class="extra-btn" id="screenShareBtn">🖥️ Демо экрана</button>
        <button class="extra-btn" id="raiseHandBtn">✋ Поднять руку</button>
        <button class="extra-btn" id="recordBtn">🔴 Запись</button>
        <button class="extra-btn" id="chatBtn">💬 Чат</button>
    </div>
</div>

<div id="chatPanel" class="chat-panel">
    <div class="chat-header">
        <span>Чат звонка</span>
        <span class="chat-close" onclick="toggleChat()">✕</span>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Сообщение..." maxlength="500">
        <button id="sendChatBtn">➤</button>
    </div>
</div>

<div id="waitingPanel" class="waiting-panel">
    <div class="waiting-title">Зал ожидания</div>
    <div class="waiting-list" id="waitingList"></div>
</div>

<div id="debugInfo" class="debug-info"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ========== Глобальные переменные ==========
    let socket = null;
    let currentUser = null;
    let callData = null;
    let peerConnection = null;
    let localStream = null;
    let screenShareStream = null;
    let isScreenSharing = false;
    let callTimerInterval = null;
    let callStartTime = 0;
    let groupPeerConnections = new Map();
    let isInGroup = false;
    let groupId = null;
    let isHost = false;
    let waitingParticipants = [];
    let reconnectAttempts = 0;
    let maxReconnectAttempts = 5;
    let reconnectTimeout = null;
    let statsInterval = null;
    let isReconnecting = false;
    let videoElements = new Map(); // userId -> video element
    let audioContext = null;
    let audioAnalyser = null;

    // DOM элементы
    const callNameEl = document.getElementById('callName');
    const callStatusEl = document.getElementById('statusText');
    const statusIndicator = document.getElementById('statusIndicator');
    const callTimerEl = document.getElementById('callTimer');
    const remoteVideo = document.getElementById('remoteVideo');
    const localVideo = document.getElementById('localVideo');
    const videoContainer = document.getElementById('videoContainer');
    const toggleMuteBtn = document.getElementById('toggleMuteBtn');
    const toggleVideoBtn = document.getElementById('toggleVideoBtn');
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    const endCallBtn = document.getElementById('endCallBtn');
    const screenShareBtn = document.getElementById('screenShareBtn');
    const raiseHandBtn = document.getElementById('raiseHandBtn');
    const recordBtn = document.getElementById('recordBtn');
    const chatBtn = document.getElementById('chatBtn');
    const chatPanel = document.getElementById('chatPanel');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendChatBtn = document.getElementById('sendChatBtn');
    const debugInfo = document.getElementById('debugInfo');
    const networkStats = document.getElementById('networkStats');
    const waitingPanel = document.getElementById('waitingPanel');

    // Конфигурация ICE серверов с резервными STUN/TURN
    const ICE_SERVERS = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' }
        ],
        iceCandidatePoolSize: 10,
        iceTransportPolicy: 'all'
    };

    // Оптимальные constraints для видео
    const VIDEO_CONSTRAINTS = {
        video: {
            width: { ideal: 1280, max: 1920 },
            height: { ideal: 720, max: 1080 },
            frameRate: { ideal: 30, max: 60 },
            facingMode: 'user'
        },
        audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
            sampleRate: 48000,
            channelCount: 2
        }
    };

    function debugLog(msg) {
        console.log(`[Call] ${msg}`);
        debugInfo.textContent = msg;
        setTimeout(() => { if (debugInfo.textContent === msg) debugInfo.textContent = ''; }, 5000);
    }

    function showNotification(msg, type = 'info') {
        const n = document.createElement('div');
        n.className = `notification ${type}`;
        n.textContent = msg;
        document.body.appendChild(n);
        setTimeout(() => {
            n.style.animation = 'slideDown 0.3s reverse forwards';
            setTimeout(() => n.remove(), 300);
        }, 3000);
    }

    function updateStatus(status, text) {
        statusIndicator.className = `status-indicator ${status}`;
        callStatusEl.textContent = text;
    }

    // ========== Загрузка данных звонка ==========
    function loadCallData() {
        const data = localStorage.getItem('callData');
        if (!data) {
            showNotification('Ошибка: нет данных о звонке', 'error');
            setTimeout(() => window.close(), 2000);
            return;
        }
