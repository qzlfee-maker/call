<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>CraneCall — Видеозвонок</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c14; --surface:#0f1624; --surface2:#162035;
  --border:rgba(62,130,255,0.2); --border-b:rgba(62,130,255,0.5);
  --accent:#3e82ff; --accent2:#00c4ff; --danger:#ff4757;
  --success:#2ed573; --warn:#ffa502; --text:#e8eaf6; --muted:#5a6a8a;
}
*{margin:0;padding:0;box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Manrope',system-ui,sans-serif;background:#000;color:var(--text);}
.call-wrap{display:flex;flex-direction:column;height:100vh;position:relative;}

/* top bar */
.topbar{
  position:absolute;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:linear-gradient(to bottom,rgba(8,12,20,0.85) 0%,transparent 100%);
}
.call-avatar{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;
}
.call-meta h2{font-size:16px;font-weight:700;line-height:1.2;}
.call-meta p{font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px;}
.call-timer{
  font-family:'JetBrains Mono',monospace;
  font-size:14px;font-weight:600;background:rgba(0,0,0,0.4);
  border-radius:8px;padding:4px 10px;letter-spacing:0.5px;
}
.quality-indicator{display:flex;align-items:flex-end;gap:2px;height:16px;margin-right:10px;}
.qual-bar{width:3px;border-radius:2px;background:var(--success);transition:height 0.3s;}

/* video area */
.video-area{flex:1;position:relative;background:#000;overflow:hidden;}
.remote-video{width:100%;height:100%;object-fit:cover;display:block;}
.no-video-placeholder{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--surface);
}
.no-video-avatar{
  width:100px;height:100px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:44px;font-weight:700;margin-bottom:16px;
  animation:pulse 2s ease infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 8px rgba(62,130,255,0.12),0 0 0 16px rgba(62,130,255,0.06);}
  50%{box-shadow:0 0 0 12px rgba(62,130,255,0.18),0 0 0 24px rgba(62,130,255,0.08);}
}
.no-video-name{font-size:18px;font-weight:700;}
.no-video-sub{font-size:13px;color:var(--muted);margin-top:4px;}

/* local pip */
.local-pip{
  position:absolute;bottom:88px;right:16px;
  width:120px;height:80px;border-radius:14px;overflow:hidden;
  border:2px solid rgba(62,130,255,0.6);cursor:grab;z-index:10;
  box-shadow:0 4px 16px rgba(0,0,0,0.5);transition:width 0.2s,height 0.2s;
}
.local-pip.expanded{width:180px;height:120px;}
.local-pip video{width:100%;height:100%;object-fit:cover;display:block;}
.pip-toggle{
  position:absolute;top:4px;right:4px;z-index:11;
  width:18px;height:18px;border-radius:4px;background:rgba(0,0,0,0.6);
  border:none;color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}

/* group grid */
.group-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:4px;height:100%;}
.participant-tile{position:relative;background:var(--surface2);overflow:hidden;min-height:120px;}
.participant-tile video{width:100%;height:100%;object-fit:cover;}
.participant-label{
  position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.6);
  border-radius:6px;padding:3px 8px;font-size:12px;font-weight:600;
}
/* bottom controls */
.controls-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:20;
  padding:12px 12px max(12px,env(safe-area-inset-bottom));
  background:linear-gradient(to top,rgba(8,12,20,0.96) 60%,transparent 100%);
  display:flex;flex-direction:column;gap:10px;
}
.controls-main{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
.controls-secondary{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;}
.ctl-btn{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  background:none;border:none;cursor:pointer;min-width:62px;padding:4px;
  transition:transform 0.1s;
}
.ctl-btn:active{transform:scale(0.92);}
.ctl-icon{
  width:54px;height:54px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.2s,box-shadow 0.2s;
}
.ctl-icon svg{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;}
.ctl-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.7);white-space:nowrap;}
.ctl-btn.normal .ctl-icon{background:rgba(255,255,255,0.12);color:#fff;}
.ctl-btn.normal:hover .ctl-icon{background:rgba(255,255,255,0.2);}
.ctl-btn.active .ctl-icon{background:rgba(62,130,255,0.25);color:var(--accent2);}
.ctl-btn.off .ctl-icon{background:rgba(255,71,87,0.2);color:var(--danger);}
.ctl-btn.off .ctl-label{color:var(--danger);}
.ctl-btn.end-call .ctl-icon{background:var(--danger);color:#fff;box-shadow:0 4px 16px rgba(255,71,87,0.4);}
.ctl-btn.end-call:hover .ctl-icon{background:#e0283a;}
.sec-btn{
  display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.08);
  border:none;border-radius:20px;padding:7px 14px;color:rgba(255,255,255,0.8);
  font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:background 0.2s;
}
.sec-btn:hover{background:rgba(255,255,255,0.14);}
.sec-btn.active{background:rgba(62,130,255,0.25);color:var(--accent2);}
/* side panels */
.side-panel{
  position:absolute;right:0;top:0;bottom:0;z-index:30;
  width:min(320px,85vw);background:var(--surface);
  border-left:1px solid var(--border);display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform 0.3s cubic-bezier(.4,0,.2,1);
}
.side-panel.open{transform:translateX(0);box-shadow:-8px 0 24px rgba(0,0,0,0.4);}
.panel-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.close-panel-btn{
  width:30px;height:30px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.08);color:var(--muted);cursor:pointer;
}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.chat-msg{max-width:85%;}
.chat-msg.mine{align-self:flex-end;}
.chat-bubble{
  padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.45;
  background:var(--surface2);
}
.chat-msg.mine .chat-bubble{background:rgba(62,130,255,0.25);border-bottom-right-radius:4px;}
.chat-msg.theirs .chat-bubble{border-bottom-left-radius:4px;}
.chat-author{font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600;}
.chat-time{font-size:10px;color:var(--muted);margin-top:3px;text-align:right;}
.chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);flex-shrink:0;}
.chat-text-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:10px 16px;color:var(--text);font-size:14px;outline:none;
}
.chat-text-input:focus{border-color:var(--accent);}
.chat-send-btn{
  width:38px;height:38px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.participants-list{flex:1;overflow-y:auto;padding:8px 0;}
.participant-item{display:flex;align-items:center;gap:12px;padding:10px 20px;}
.p-avatar{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;
}
.waiting-section{padding:12px 16px;border-top:1px solid var(--border);}
.waiting-item{display:flex;align-items:center;gap:10px;padding:8px 0;}
.waiting-actions{display:flex;gap:6px;margin-left:auto;}
.w-btn{padding:5px 12px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;}
.w-btn.admit{background:rgba(46,213,115,0.2);color:var(--success);}
.w-btn.reject{background:rgba(255,71,87,0.15);color:var(--danger);}
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:rgba(22,32,53,0.95);border:1px solid var(--border-b);
  border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;
  z-index:100;white-space:nowrap;backdrop-filter:blur(8px);
  animation:toastIn 0.3s ease;
}
.toast.error{border-color:rgba(255,71,87,0.5);color:var(--danger);}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.debug-bar{position:fixed;bottom:2px;left:4px;z-index:200;font-size:10px;color:rgba(255,255,255,0.3);font-family:monospace;pointer-events:none;}
.hidden{display:none !important;}
</style>
</head>
<body>

<div class="call-wrap">
  <div class="topbar">
    <div class="topbar-left">
      <div class="call-avatar" id="remoteAvatar">?</div>
      <div class="call-meta">
        <h2 id="callName">Соединение...</h2>
        <p id="callStatus">Устанавливается</p>
      </div>
    </div>
    <div class="topbar-right">
      <div class="quality-indicator" id="qualityIndicator">
        <div class="qual-bar" style="height:5px;"></div>
        <div class="qual-bar" style="height:9px;"></div>
        <div class="qual-bar" style="height:13px;"></div>
      </div>
      <div class="call-timer" id="callTimer">00:00</div>
    </div>
  </div>

  <div class="video-area" id="videoArea">
    <div id="personalView" style="height:100%;position:relative;">
      <video id="remoteVideo" class="remote-video" autoplay playsinline style="position:absolute;inset:0;"></video>
      <div class="no-video-placeholder" id="noVideoPlaceholder">
        <div class="no-video-avatar" id="remoteAvatarBig">?</div>
        <div class="no-video-name" id="remoteNameBig">—</div>
        <div class="no-video-sub" id="remoteSubBig">Соединение...</div>
      </div>
    </div>
    <div id="groupView" class="group-grid hidden"></div>
    <div class="local-pip" id="localPip">
      <video id="localVideo" autoplay playsinline muted></video>
      <button class="pip-toggle" onclick="togglePipSize()">⤢</button>
    </div>
  </div>

  <div class="controls-bar">
    <div class="controls-main">
      <button class="ctl-btn normal" id="muteBtn" onclick="toggleMute()">
        <div class="ctl-icon"><svg id="muteIcon" viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg></div>
        <span class="ctl-label">Микрофон</span>
      </button>
      <button class="ctl-btn normal" id="videoBtn" onclick="toggleVideo()">
        <div class="ctl-icon"><svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></div>
        <span class="ctl-label">Камера</span>
      </button>
      <button class="ctl-btn normal" id="switchBtn" onclick="switchCamera()">
        <div class="ctl-icon"><svg viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 013.51 15"/></svg></div>
        <span class="ctl-label">Камера ↔</span>
      </button>
      <button class="ctl-btn end-call" onclick="endCall()">
        <div class="ctl-icon"><svg viewBox="0 0 24 24" stroke-width="2.5"><path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.42 19.42 0 01-3.33-2.67m-2.67-3.34a19.79 19.79 0 01-3.07-8.63A2 2 0 014.11 2h3a2 2 0 011.72 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L7.91 9.91M23 1L1 23"/></svg></div>
        <span class="ctl-label">Завершить</span>
      </button>
    </div>
    <div class="controls-secondary">
      <button class="sec-btn" id="screenBtn" onclick="toggleScreenShare()"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><span>Экран</span></button>
      <button class="sec-btn" id="chatBtn" onclick="togglePanel('chat')"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span>Чат</span><span id="chatBadge" class="hidden" style="background:var(--danger);border-radius:50%;width:8px;height:8px;display:inline-block;"></span></button>
      <button class="sec-btn" id="participantsBtn" onclick="togglePanel('participants')"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg><span>Участники</span></button>
      <button class="sec-btn" id="handBtn" onclick="raiseHand()"><svg viewBox="0 0 24 24" stroke-linecap="round"><path d="M18 11V6a2 2 0 00-4 0v3M14 9V3a2 2 0 00-4 0v6M10 9.5V3a2 2 0 00-4 0v9"/><path d="M6 12v-2a2 2 0 00-2 0v6c0 3.31 2.69 6 6 6h2a6 6 0 006-6v-5a2 2 0 00-4 0"/></svg><span>Рука</span></button>
      <button class="sec-btn" id="recordBtn" onclick="toggleRecord()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="var(--danger)"/></svg><span>Запись</span></button>
    </div>
  </div>
</div>

<div class="side-panel" id="chatPanel">
  <div class="panel-header"><h3>💬 Чат</h3><button class="close-panel-btn" onclick="closePanel('chat')">✕</button></div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-row"><input type="text" class="chat-text-input" id="chatTextInput" placeholder="Сообщение..." onkeydown="if(event.key==='Enter')sendChat()"><button class="chat-send-btn" onclick="sendChat()"><svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg></button></div>
</div>

<div class="side-panel" id="participantsPanel">
  <div class="panel-header"><h3>👥 Участники</h3><button class="close-panel-btn" onclick="closePanel('participants')">✕</button></div>
  <div class="participants-list" id="participantsList"></div>
  <div class="waiting-section hidden" id="waitingSection"><h4>Зал ожидания</h4><div id="waitingList"></div></div>
</div>

<div class="debug-bar" id="debugBar"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  GLOBALS & INIT
// ═══════════════════════════════════════════════════════════════
let socket, currentUser, callData;
let peerConnection = null;
let localStream = null, screenStream = null;
let isScreenSharing = false, muted = false, videoOff = false, usingFront = true, isRecording = false, mediaRecorder = null, recordedChunks = [];
let callTimerInterval = null, callStartTime = 0, qualityInterval = null;
let groupPeers = new Map(), isInGroup = false, groupId = null, isHost = false, participants = [];

const remoteVideo = document.getElementById('remoteVideo');
const localVideo = document.getElementById('localVideo');
const noVideoPlaceholder = document.getElementById('noVideoPlaceholder');
const groupView = document.getElementById('groupView');
const personalView = document.getElementById('personalView');

function dbg(msg) { console.log('[call]', msg); const bar = document.getElementById('debugBar'); if(bar) bar.textContent = msg; }

function showToast(msg, type='') { const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3500); }
function escHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function setCallMeta(name,status){
  document.getElementById('callName').textContent=name;
  document.getElementById('callStatus').textContent=status;
  document.getElementById('remoteAvatar').textContent=name[0]?.toUpperCase()||'?';
  document.getElementById('remoteAvatarBig').textContent=name[0]?.toUpperCase()||'?';
  document.getElementById('remoteNameBig').textContent=name;
  document.getElementById('remoteSubBig').textContent=status;
  document.title=`Звонок — ${name}`;
}
function hideGroupControls(){ ['chatBtn','participantsBtn','handBtn'].forEach(id=>document.getElementById(id).style.display='none'); }

// ═══════════════════════════════════════════════════════════════
//  LOAD CALL DATA & SOCKET
// ═══════════════════════════════════════════════════════════════
function init(){
  const raw = localStorage.getItem('callData');
  if(!raw){ showToast('Нет данных звонка — откройте из основного окна','error'); return; }
  callData = JSON.parse(raw);
  localStorage.removeItem('callData');
  currentUser = { userId: callData.myUserId, username: callData.myUsername };
  if(callData.type === 'personal'){
    hideGroupControls();
    setCallMeta(callData.targetName, 'Соединение...');
  } else {
    isInGroup = true; groupId = callData.groupId; isHost = callData.isHost || false;
    setCallMeta(callData.groupName, 'Подключение...');
    personalView.classList.add('hidden'); groupView.classList.remove('hidden');
    document.getElementById('localPip').style.bottom = '100px';
  }
  socket = io({ transports:['websocket','polling'] });
  socket.on('connect', () => { dbg('Socket connected'); socket.emit('register', { username: currentUser.username, userId: currentUser.userId }); setupSocketListeners(); });
}

// ═══════════════════════════════════════════════════════════════
//  SOCKET HANDLERS
// ═══════════════════════════════════════════════════════════════
function setupSocketListeners(){
  if(callData.type === 'personal'){
    if(callData.isIncoming) { socket.emit('accept-call', { fromId: callData.targetId }); startPersonalCall(true); }
    else startPersonalCall(false);
    socket.on('offer', async d=>await handleOffer(d));
    socket.on('answer', async d=>await handleAnswer(d));
    socket.on('ice-candidate', async d=>{ if(peerConnection && d.candidate) try{await peerConnection.addIceCandidate(new RTCIceCandidate(d.candidate));}catch(e){} });
    socket.on('call-rejected', ()=>{ showToast('Звонок отклонён','error'); setTimeout(()=>window.close(),2000); });
    socket.on('call-ended', ()=>{ showToast('Звонок завершён'); setTimeout(()=>window.close(),2000); });
  } else {
    // GROUP
    if(isHost) joinGroupCall();
    else { socket.emit('join-group-request', { groupId }); setCallMeta(callData.groupName,'Ожидание допуска...'); }
    socket.on('admitted-to-group', async ({ groupId:gid, hostId, participants:p, chat })=>{
      isHost = hostId === currentUser.userId;
      participants = p;
      renderParticipants();
      if(chat) chat.forEach(m=>appendChatMsg(m, m.userId===currentUser.userId));
      if(!localStream) await joinGroupCall();
      for(const part of participants) if(part.userId !== currentUser.userId) await createGroupOffer(part.userId);
    });
    socket.on('waiting-for-admission', ()=>{ setCallMeta(callData.groupName,'Ждём разрешения...'); });
    socket.on('rejected-from-group', ()=>{ showToast('Вас не пустили в конференцию','error'); setTimeout(()=>window.close(),2000); });
    socket.on('waiting-list-update', ({ waiting })=>{ if(isHost) renderWaitingList(waiting); });
    socket.on('group-participants-update', ({ participants:p })=>{ participants=p; renderParticipants(); });
    socket.on('host-changed', ({ newHostId })=>{ if(newHostId===currentUser.userId){ isHost=true; showToast('Вы теперь хост'); renderParticipants(); } });
    socket.on('group-offer', async d=>await handleGroupOffer(d));
    socket.on('group-answer', async d=>await handleGroupAnswer(d));
    socket.on('group-ice', async d=>await handleGroupIce(d));
    socket.on('group-chat-message', msg=>{ appendChatMsg(msg, msg.userId===currentUser.userId); if(!document.getElementById('chatPanel').classList.contains('open')) document.getElementById('chatBadge').classList.remove('hidden'); });
    socket.on('hand-raised', ({ username })=>showToast(`✋ ${username} поднял(а) руку`));
    socket.on('call-ended', ()=>{ showToast('Конференция завершена'); setTimeout(()=>window.close(),2500); });
  }
}

// ═══════════════════════════════════════════════════════════════
//  MEDIA & PEER CONNECTION
// ═══════════════════════════════════════════════════════════════
async function getLocalStream(videoEnabled=true){
  const constraints = { audio: { echoCancellation:true, noiseSuppression:true, autoGainControl:true }, video: videoEnabled ? { width:{ideal:1280}, height:{ideal:720}, frameRate:{ideal:30} } : false };
  try { return await navigator.mediaDevices.getUserMedia(constraints); } catch(e){ return await navigator.mediaDevices.getUserMedia({ audio:true, video:videoEnabled }); }
}
function buildPeerConnection(){
  const iceServers = callData.iceServers || [{ urls:'stun:stun.l.google.com:19302' },{ urls:'stun:stun1.l.google.com:19302' }];
  return new RTCPeerConnection({ iceServers, iceTransportPolicy:'all', bundlePolicy:'max-bundle', rtcpMuxPolicy:'require' });
}
function applyBandwidth(pc){
  pc.getSenders().forEach(sender=>{
    if(sender.track?.kind==='video'){
      const params=sender.getParameters(); if(!params.encodings||!params.encodings.length) params.encodings=[{}];
      params.encodings[0].maxBitrate=1500000; sender.setParameters(params).catch(()=>{});
    } else if(sender.track?.kind==='audio'){
      const params=sender.getParameters(); if(!params.encodings||!params.encodings.length) params.encodings=[{}];
      params.encodings[0].maxBitrate=64000; sender.setParameters(params).catch(()=>{});
    }
  });
}

// ─── PERSONAL ──────────────────────────────────────────────
async function startPersonalCall(isAnswering){
  try{
    localStream = await getLocalStream(callData.callType==='video');
    localVideo.srcObject = localStream;
    peerConnection = buildPeerConnection();
    localStream.getTracks().forEach(t=>peerConnection.addTrack(t,localStream));
    peerConnection.onicecandidate = e=>{ if(e.candidate) socket.emit('ice-candidate', { targetId:callData.targetId, candidate:e.candidate }); };
    peerConnection.onconnectionstatechange = ()=>{
      if(peerConnection.connectionState==='connected'){ setCallMeta(callData.targetName,'В процессе'); startTimer(); startQualityMonitor(peerConnection); applyBandwidth(peerConnection); }
    };
    peerConnection.ontrack = e=>{ if(e.streams[0]){ remoteVideo.srcObject=e.streams[0]; noVideoPlaceholder.style.display='none'; } };
    if(!isAnswering){
      const offer = await peerConnection.createOffer({ offerToReceiveAudio:true, offerToReceiveVideo:callData.callType==='video' });
      await peerConnection.setLocalDescription(offer);
      socket.emit('offer', { targetId:callData.targetId, offer });
    }
  } catch(err){ showToast('Не удалось открыть камеру/микрофон','error'); setTimeout(()=>window.close(),2500); }
}
async function handleOffer({ from, offer }){
  if(!peerConnection){
    peerConnection = buildPeerConnection();
    if(localStream) localStream.getTracks().forEach(t=>peerConnection.addTrack(t,localStream));
    peerConnection.onicecandidate = e=>{ if(e.candidate) socket.emit('ice-candidate', { targetId:from, candidate:e.candidate }); };
    peerConnection.ontrack = e=>{ if(e.streams[0]){ remoteVideo.srcObject=e.streams[0]; noVideoPlaceholder.style.display='none'; } };
  }
  await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  socket.emit('answer', { targetId:from, answer });
  startTimer();
}
async function handleAnswer({ answer }){ if(peerConnection) await peerConnection.setRemoteDescription(new RTCSessionDescription(answer)); }

// ─── GROUP ─────────────────────────────────────────────────
async function joinGroupCall(){
  try{
    localStream = await getLocalStream(true);
    localVideo.srcObject = localStream;
    setCallMeta(callData.groupName,'В конференции');
    startTimer();
  } catch(err){ showToast('Ошибка доступа к медиа','error'); setTimeout(()=>window.close(),2500); }
}
async function createGroupOffer(targetId){
  const pc = buildGroupPeer(targetId);
  localStream?.getTracks().forEach(t=>pc.addTrack(t,localStream));
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit('group-offer', { groupId, targetId, offer });
}
function buildGroupPeer(userId){
  if(groupPeers.has(userId)) groupPeers.get(userId).close();
  const pc = buildPeerConnection();
  groupPeers.set(userId, pc);
  pc.onicecandidate = e=>{ if(e.candidate) socket.emit('group-ice', { groupId, targetId:userId, candidate:e.candidate }); };
  pc.ontrack = e=>{ if(e.streams[0]) renderGroupTile(userId, e.streams[0]); };
  pc.onconnectionstatechange = ()=>{ if(pc.connectionState==='connected') applyBandwidth(pc); };
  return pc;
}
async function handleGroupOffer({ from, offer }){
  const pc = buildGroupPeer(from);
  if(localStream) localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  await pc.setRemoteDescription(new RTCSessionDescription(offer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('group-answer', { groupId, targetId:from, answer });
}
async function handleGroupAnswer({ from, answer }){ const pc=groupPeers.get(from); if(pc) await pc.setRemoteDescription(new RTCSessionDescription(answer)); }
async function handleGroupIce({ from, candidate }){ const pc=groupPeers.get(from); if(pc && candidate) try{ await pc.addIceCandidate(new RTCIceCandidate(candidate)); }catch(e){} }
function renderGroupTile(userId, stream){
  let tile = document.getElementById(`tile_${userId}`);
  if(!tile){
    tile = document.createElement('div'); tile.className='participant-tile'; tile.id=`tile_${userId}`;
    const vid=document.createElement('video'); vid.autoplay=true; vid.playsInline=true; vid.style.cssText='width:100%;height:100%;object-fit:cover;';
    const label=document.createElement('div'); label.className='participant-label'; label.textContent=userId;
    tile.appendChild(vid); tile.appendChild(label);
    groupView.appendChild(tile);
  }
  tile.querySelector('video').srcObject = stream;
}
function renderParticipants(){
  const listDiv = document.getElementById('participantsList');
  listDiv.innerHTML = participants.map(p=>`<div class="participant-item"><div class="p-avatar">${p.username[0].toUpperCase()}</div><div class="p-name">${escHtml(p.username)}</div>${p.userId===currentUser.userId?'<span class="p-tag">Вы</span>':''}${isHost && p.userId!==currentUser.userId?'<span class="p-tag" style="color:var(--accent2)">Хост</span>':''}</div>`).join('');
  if(isHost) document.getElementById('waitingSection').classList.remove('hidden');
}
function renderWaitingList(waiting){
  const sec=document.getElementById('waitingSection'), list=document.getElementById('waitingList');
  if(!waiting.length){ list.innerHTML=''; sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');
  list.innerHTML = waiting.map(w=>`<div class="waiting-item"><div class="p-avatar" style="width:32px;height:32px;font-size:14px;">${w.username[0].toUpperCase()}</div><span style="flex:1;font-size:13px;">${escHtml(w.username)}</span><div class="waiting-actions"><button class="w-btn admit" onclick="admitUser('${w.userId}')">Впустить</button><button class="w-btn reject" onclick="rejectUser('${w.userId}')">Отказать</button></div></div>`).join('');
}
function admitUser(userId){ socket.emit('admit-participant', { groupId, userId }); }
function rejectUser(userId){ socket.emit('reject-participant', { groupId, userId }); }

// ═══════════════════════════════════════════════════════════════
//  CONTROLS (UI)
// ═══════════════════════════════════════════════════════════════
function toggleMute(){
  muted=!muted; if(localStream) localStream.getAudioTracks().forEach(t=>t.enabled=!muted);
  const btn=document.getElementById('muteBtn'); btn.className=`ctl-btn ${muted?'off':'normal'}`;
  document.getElementById('muteLabel').textContent=muted?'Вкл. мик.':'Микрофон';
  const icon=document.getElementById('muteIcon'); icon.innerHTML=muted?`<line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 005.12 2.12M15 9.34V4a3 3 0 00-5.94-.6"/><path d="M17 16.95A7 7 0 015 12v-2M19 10v2a7 7 0 01-.11 1.23M12 19v4M8 23h8"/>`:`<path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>`;
}
function toggleVideo(){
  videoOff=!videoOff; if(localStream) localStream.getVideoTracks().forEach(t=>t.enabled=!videoOff);
  const btn=document.getElementById('videoBtn'); btn.className=`ctl-btn ${videoOff?'off':'normal'}`;
  document.getElementById('videoLabel').textContent=videoOff?'Вкл. камеру':'Камера';
}
async function switchCamera(){
  if(!localStream) return; usingFront=!usingFront;
  const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: usingFront?'user':'environment' }, audio:false });
  const newTrack = newStream.getVideoTracks()[0], oldTrack = localStream.getVideoTracks()[0];
  if(oldTrack){ localStream.removeTrack(oldTrack); oldTrack.stop(); }
  localStream.addTrack(newTrack); localVideo.srcObject=localStream;
  const pcs = callData.type==='personal' ? (peerConnection?[peerConnection]:[]) : [...groupPeers.values()];
  for(const pc of pcs){ const sender=pc.getSenders().find(s=>s.track?.kind==='video'); if(sender) sender.replaceTrack(newTrack); }
}
async function toggleScreenShare(){
  if(isScreenSharing){ stopScreenShare(); return; }
  try{
    screenStream = await navigator.mediaDevices.getDisplayMedia({ video:{cursor:'always'}, audio:false });
    const track = screenStream.getVideoTracks()[0];
    const pcs = callData.type==='personal' ? (peerConnection?[peerConnection]:[]) : [...groupPeers.values()];
    for(const pc of pcs){ const sender=pc.getSenders().find(s=>s.track?.kind==='video'); if(sender) sender.replaceTrack(track); }
    isScreenSharing=true; document.getElementById('screenBtn').classList.add('active');
    document.getElementById('screenBtn').querySelector('span').innerText='Стоп';
    track.onended=stopScreenShare;
    if(isInGroup) socket.emit('screen-share-started', { groupId });
  } catch(e){ showToast('Демонстрация отменена'); }
}
function stopScreenShare(){
  if(screenStream){ screenStream.getTracks().forEach(t=>t.stop()); screenStream=null; }
  isScreenSharing=false; document.getElementById('screenBtn').classList.remove('active');
  document.getElementById('screenBtn').querySelector('span').innerText='Экран';
  if(localStream && localStream.getVideoTracks()[0]){
    const camTrack=localStream.getVideoTracks()[0];
    const pcs = callData.type==='personal' ? (peerConnection?[peerConnection]:[]) : [...groupPeers.values()];
    for(const pc of pcs){ const sender=pc.getSenders().find(s=>s.track?.kind==='video'); if(sender) sender.replaceTrack(camTrack); }
  }
  if(isInGroup) socket.emit('screen-share-stopped', { groupId });
}
function raiseHand(){ if(isInGroup){ socket.emit('raise-hand',{ groupId }); showToast('✋ Вы подняли руку'); } }
function toggleRecord(){
  if(isRecording){ if(mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop(); isRecording=false; document.getElementById('recordBtn').classList.remove('active'); document.getElementById('recordBtn').querySelector('span').innerText='Запись'; return; }
  if(!localStream){ showToast('Нет медиа для записи','error'); return; }
  try{
    recordedChunks=[];
    const combined = new MediaStream([...localStream.getTracks()]);
    mediaRecorder = new MediaRecorder(combined, { mimeType:'video/webm;codecs=vp8' });
    mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = ()=>{ const blob=new Blob(recordedChunks,{type:'video/webm'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`call_${Date.now()}.webm`; a.click(); showToast('Запись сохранена','success'); };
    mediaRecorder.start(1000);
    isRecording=true; document.getElementById('recordBtn').classList.add('active'); document.getElementById('recordBtn').querySelector('span').innerText='Стоп';
    showToast('Запись началась','success');
  } catch(e){ showToast('Запись недоступна','error'); }
}
function endCall(){
  stopTimer(); if(qualityInterval) clearInterval(qualityInterval);
  if(localStream) localStream.getTracks().forEach(t=>t.stop());
  if(screenStream) screenStream.getTracks().forEach(t=>t.stop());
  if(callData.type==='personal'){ if(peerConnection) peerConnection.close(); socket.emit('end-call',{ targetId:callData.targetId }); }
  else { if(isHost) socket.emit('end-group-call',{ groupId }); else socket.emit('leave-group',{ groupId }); groupPeers.forEach(pc=>pc.close()); }
  window.close(); setTimeout(()=>{ document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;font-size:18px;">Звонок завершён. Можно закрыть вкладку.</div>'; },300);
}
function togglePipSize(){ document.getElementById('localPip').classList.toggle('expanded'); }
(function(){ const pip=document.getElementById('localPip'); let dragging=false,ox,oy; pip.addEventListener('mousedown',e=>{ dragging=true; ox=e.clientX-pip.offsetLeft; oy=e.clientY-pip.offsetTop; pip.style.transition='none'; }); document.addEventListener('mousemove',e=>{ if(!dragging) return; let x=Math.min(Math.max(e.clientX-ox,0),window.innerWidth-pip.offsetWidth), y=Math.min(Math.max(e.clientY-oy,0),window.innerHeight-pip.offsetHeight); pip.style.right='auto'; pip.style.bottom='auto'; pip.style.left=x+'px'; pip.style.top=y+'px'; }); document.addEventListener('mouseup',()=>{ dragging=false; pip.style.transition=''; }); })();

// ═══════════════════════════════════════════════════════════════
//  PANELS & CHAT
// ═══════════════════════════════════════════════════════════════
function togglePanel(name){
  const map={chat:'chatPanel', participants:'participantsPanel'};
  const panel=document.getElementById(map[name]); if(!panel) return;
  const isOpen=panel.classList.contains('open');
  document.querySelectorAll('.side-panel').forEach(p=>p.classList.remove('open'));
  if(!isOpen) panel.classList.add('open');
  if(name==='chat') document.getElementById('chatBadge').classList.add('hidden');
}
function closePanel(name){ document.getElementById(name==='chat'?'chatPanel':'participantsPanel')?.classList.remove('open'); }
function sendChat(){
  const input=document.getElementById('chatTextInput'); const msg=input.value.trim();
  if(!msg || !isInGroup) return;
  socket.emit('group-chat-message',{ groupId, message:msg });
  input.value='';
}
function appendChatMsg({ userId, username, message, time }, isMine){
  const wrap=document.getElementById('chatMessages'); const div=document.createElement('div');
  div.className=`chat-msg ${isMine?'mine':'theirs'}`;
  const t=time?new Date(time).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}):'';
  div.innerHTML=`${!isMine?`<div class="chat-author">${escHtml(username)}</div>`:''}<div class="chat-bubble">${escHtml(message)}</div><div class="chat-time">${t}</div>`;
  wrap.appendChild(div); wrap.scrollTop=wrap.scrollHeight;
}

// ═══════════════════════════════════════════════════════════════
//  TIMER & QUALITY
// ═══════════════════════════════════════════════════════════════
function startTimer(){ if(callTimerInterval) return; callStartTime=Date.now(); callTimerInterval=setInterval(()=>{ const s=Math.floor((Date.now()-callStartTime)/1000); document.getElementById('callTimer').innerText=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; },1000); }
function stopTimer(){ clearInterval(callTimerInterval); callTimerInterval=null; }
function startQualityMonitor(pc){
  if(qualityInterval) clearInterval(qualityInterval);
  qualityInterval=setInterval(async()=>{
    if(!pc) return;
    try{
      const stats=await pc.getStats(); let rtt=0, lost=0, total=1;
      stats.forEach(r=>{ if(r.type==='remote-inbound-rtp' && r.roundTripTime) rtt=r.roundTripTime*1000; if(r.type==='inbound-rtp' && r.kind==='video'){ lost=r.packetsLost||0; total=(r.packetsReceived||1)+lost; } });
      const loss=lost/total; const bars=document.querySelectorAll('.qual-bar');
      let quality='good'; if(rtt>200 || loss>0.05) quality='poor'; else if(rtt>100 || loss>0.02) quality='ok';
      const heights=quality==='good'?[5,9,13]:quality==='ok'?[5,9,5]:[5,3,3]; const colors=quality==='good'?'#2ed573':quality==='ok'?'#ffa502':'#ff4757';
      bars.forEach((b,i)=>{ b.style.height=heights[i]+'px'; b.style.background=colors; });
    } catch(e){}
  },3000);
}

// ═══════════════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS & INIT
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key==='m'||e.key==='M') toggleMute();
  if(e.key==='v'||e.key==='V') toggleVideo();
  if(e.key==='End') endCall();
});

init();
</script>
