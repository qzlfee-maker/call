<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>CraneCall — iOS видеозвонки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000000;
      font-family: 'Manrope', system-ui, sans-serif;
      color: #ffffff;
      height: 100vh;
      overflow: hidden;
    }

    /* Auth screen (iOS style) */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 40%, #1c1c2e, #000000);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(2px);
    }
    .auth-card {
      background: rgba(28, 28, 46, 0.95);
      border: 1px solid rgba(62, 130, 255, 0.3);
      border-radius: 44px;
      padding: 36px 24px;
      width: min(360px, 88%);
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
    }
    .auth-logo {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #3e82ff, #00c4ff);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin: 0 auto 20px;
      box-shadow: 0 10px 20px rgba(62,130,255,0.3);
    }
    .auth-card h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #00c4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    .auth-sub {
      color: #8b9dc3;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .auth-input {
      width: 100%;
      padding: 14px 16px;
      background: #1c2a3a;
      border: 1px solid #2a3a55;
      border-radius: 14px;
      color: white;
      font-size: 15px;
      margin-bottom: 12px;
      outline: none;
      transition: border 0.2s;
    }
    .auth-input:focus {
      border-color: #3e82ff;
    }
    .auth-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3e82ff, #00c4ff);
      border: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 16px;
      color: white;
      cursor: pointer;
      margin-top: 16px;
      transition: transform 0.1s;
    }
    .auth-btn:active { transform: scale(0.97); }
    .test-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(62,130,255,0.15);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #00c4ff;
      cursor: pointer;
      margin-top: 12px;
    }

    /* Main app (iOS style) */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #000000;
    }
    .header {
      height: 60px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      border-bottom: 0.5px solid rgba(62,130,255,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 18px;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3e82ff, #00c4ff);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .user-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .username {
      font-size: 14px;
      font-weight: 500;
      color: #8b9dc3;
    }
    .avatar-header {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #3e82ff, #00c4ff);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    /* Bottom navigation (iOS tab bar) */
    .bottom-nav {
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      border-top: 0.5px solid rgba(62,130,255,0.3);
      display: flex;
      padding: 8px 0 12px;
      flex-shrink: 0;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: #8b9dc3;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s;
    }
    .nav-item.active {
      color: #00c4ff;
    }
    .nav-icon {
      font-size: 22px;
    }

    /* Content area */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
    }
    .section {
      display: none;
    }
    .section.active {
      display: block;
    }

    /* Cards (iOS style) */
    .card {
      background: #1c1c2e;
      border-radius: 20px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: transform 0.1s;
    }
    .card:active { transform: scale(0.98); }
    .card-avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3e82ff, #00c4ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      position: relative;
    }
    .status-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #2ed573;
      border: 2px solid #1c1c2e;
    }
    .card-info {
      flex: 1;
    }
    .card-name {
      font-weight: 700;
      font-size: 17px;
    }
    .card-status {
      font-size: 13px;
      color: #8b9dc3;
      margin-top: 4px;
    }
    .call-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(62,130,255,0.2);
      border: none;
      color: #3e82ff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .call-btn:active { background: rgba(62,130,255,0.4); }

    .create-group-btn {
      background: rgba(62,130,255,0.1);
      border: 1px dashed rgba(62,130,255,0.4);
      border-radius: 20px;
      padding: 16px;
      text-align: center;
      color: #00c4ff;
      font-weight: 600;
      margin-bottom: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .create-group-btn:active { background: rgba(62,130,255,0.2); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal {
      background: #1c1c2e;
      border-radius: 32px;
      padding: 28px;
      width: min(320px, 85%);
    }
    .modal h3 {
      font-size: 20px;
      margin-bottom: 16px;
    }
    .modal input {
      width: 100%;
      padding: 14px;
      background: #0f0f1a;
      border: 1px solid #2a3a55;
      border-radius: 16px;
      color: white;
      font-size: 16px;
      margin-bottom: 20px;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
    }
    .modal-btn {
      flex: 1;
      padding: 14px;
      border-radius: 16px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }
    .primary-btn {
      background: linear-gradient(135deg, #3e82ff, #00c4ff);
      color: white;
    }
    .secondary-btn {
      background: #2a3a55;
      color: #8b9dc3;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      z-index: 200;
      white-space: nowrap;
      animation: fadeIn 0.2s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<!-- Auth -->
<div id="authOverlay" class="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">📞</div>
    <h1>CraneCall</h1>
    <div class="auth-sub">Видеозвонки в стиле iOS</div>
    <input type="text" id="regUsername" class="auth-input" placeholder="Ваше имя">
    <input type="text" id="regUserId" class="auth-input" placeholder="Ваш ID">
    <button class="auth-btn" id="registerBtn">Войти</button>
    <div class="test-badge" onclick="quickLogin('Тест1','test1')">⚡ Быстрый тест: Test1</div>
    <div class="test-badge" onclick="quickLogin('Тест2','test2')">⚡ Быстрый тест: Test2</div>
  </div>
</div>

<!-- Main App -->
<div id="app" class="app hidden">
  <div class="header">
    <div class="logo"><div class="logo-icon">📞</div><span>CraneCall</span></div>
    <div class="user-area">
      <span class="username" id="headerUsername"></span>
      <div class="avatar-header" id="headerAvatar"></div>
    </div>
  </div>

  <div class="content" id="content">
    <!-- Контакты -->
    <div id="contactsSection" class="section active">
      <div id="contactsList"></div>
      <div id="emptyContacts" style="text-align: center; padding: 40px; color: #8b9dc3;">Нет пользователей онлайн</div>
    </div>
    <!-- Группы -->
    <div id="groupsSection" class="section">
      <div class="create-group-btn" onclick="openGroupModal()">➕ Создать групповой звонок</div>
      <div id="groupsList"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-item active" data-tab="contacts">
      <div class="nav-icon">👥</div>
      <span>Контакты</span>
    </button>
    <button class="nav-item" data-tab="groups">
      <div class="nav-icon">🎙️</div>
      <span>Группы</span>
    </button>
  </div>
</div>

<!-- Modal create group -->
<div id="groupModal" class="modal-overlay hidden">
  <div class="modal">
    <h3>🎙️ Новый групповой звонок</h3>
    <input type="text" id="groupNameInput" placeholder="Название группы">
    <div class="modal-actions">
      <button class="modal-btn secondary-btn" onclick="closeGroupModal()">Отмена</button>
      <button class="modal-btn primary-btn" onclick="createGroup()">Создать</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ========== ГЛОБАЛЬНЫЕ ==========
  let socket = null;
  let currentUser = null;
  let iceServers = [{ urls: 'stun:stun.l.google.com:19302' }];

  // DOM
  const authOverlay = document.getElementById('authOverlay');
  const app = document.getElementById('app');
  const registerBtn = document.getElementById('registerBtn');
  const contactsList = document.getElementById('contactsList');
  const groupsList = document.getElementById('groupsList');
  const emptyContacts = document.getElementById('emptyContacts');
  const headerUsername = document.getElementById('headerUsername');
  const headerAvatar = document.getElementById('headerAvatar');
  const navItems = document.querySelectorAll('.nav-item');
  const sections = {
    contacts: document.getElementById('contactsSection'),
    groups: document.getElementById('groupsSection')
  };

  // ========== ПОМОЩНИКИ ==========
  function showToast(msg, isError = false) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.background = isError ? 'rgba(255,71,87,0.9)' : 'rgba(0,0,0,0.85)';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  function quickLogin(name, id) {
    document.getElementById('regUsername').value = name;
    document.getElementById('regUserId').value = id;
    registerBtn.click();
  }

  // Переключение вкладок
  navItems.forEach(item => {
    item.addEventListener('click', () => {
      const tab = item.dataset.tab;
      navItems.forEach(nav => nav.classList.remove('active'));
      item.classList.add('active');
      Object.values(sections).forEach(sec => sec.classList.remove('active'));
      sections[tab].classList.add('active');
      if (tab === 'groups') loadGroups();
    });
  });

  // ========== РЕГИСТРАЦИЯ ==========
  registerBtn.addEventListener('click', async () => {
    const username = document.getElementById('regUsername').value.trim();
    const userId = document.getElementById('regUserId').value.trim().toLowerCase();
    if (!username || !userId) { showToast('Заполните все поля', true); return; }
    currentUser = { username, userId };
    const res = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,userId}) });
    if (!res.ok) { showToast('Ошибка регистрации', true); return; }
    // получить ICE конфигурацию
    try {
      const iceRes = await fetch('/api/ice-config');
      const iceData = await iceRes.json();
      iceServers = iceData.iceServers;
    } catch(e) {}
    socket = io({ transports: ['websocket', 'polling'] });
    socket.on('connect', () => {
      socket.emit('register', { username, userId });
    });
    setupSocketListeners();
    authOverlay.classList.add('hidden');
    app.classList.remove('hidden');
    headerUsername.textContent = username;
    headerAvatar.textContent = username[0].toUpperCase();
    showToast(`Добро пожаловать, ${username}`);
  });

  // ========== СОКЕТЫ ==========
  function setupSocketListeners() {
    socket.on('user-list', (users) => {
      const others = users.filter(u => u.userId !== currentUser.userId);
      if (others.length === 0) {
        emptyContacts.style.display = 'block';
        contactsList.innerHTML = '';
      } else {
        emptyContacts.style.display = 'none';
        contactsList.innerHTML = others.map(u => `
          <div class="card">
            <div class="card-avatar">${u.username[0].toUpperCase()}<span class="status-dot"></span></div>
            <div class="card-info">
              <div class="card-name">${escapeHtml(u.username)}</div>
              <div class="card-status">${u.status === 'busy' ? '🔴 В звонке' : '🟢 Онлайн'}</div>
            </div>
            <button class="call-btn" onclick="startCall('${u.userId}','${escapeHtml(u.username)}')">📹</button>
          </div>
        `).join('');
      }
    });

    socket.on('group-list', (grps) => {
      if (!grps.length) {
        groupsList.innerHTML = '<div style="text-align:center;padding:40px;color:#8b9dc3;">Нет активных групп</div>';
        return;
      }
      groupsList.innerHTML = grps.map(g => `
        <div class="card" onclick="joinGroup('${g.groupId}','${escapeHtml(g.name)}')">
          <div class="card-avatar" style="border-radius: 18px;">👥</div>
          <div class="card-info">
            <div class="card-name">${escapeHtml(g.name)}</div>
            <div class="card-status">${g.participants} участников</div>
          </div>
          <button class="call-btn" style="background:rgba(46,213,115,0.2);color:#2ed573;">🔊</button>
        </div>
      `).join('');
    });

    socket.on('incoming-call', (data) => {
      if (Notification.permission === 'granted') {
        new Notification(`Входящий звонок от ${data.fromName}`, { body: data.callType === 'video' ? 'Видеозвонок' : 'Аудиозвонок' });
      }
      localStorage.setItem('callData', JSON.stringify({
        type: 'personal',
        myUserId: currentUser.userId,
        myUsername: currentUser.username,
        targetId: data.from,
        targetName: data.fromName,
        callType: data.callType || 'video',
        isIncoming: true,
        iceServers
      }));
      window.open('/call', '_blank');
    });
  }

  // ========== ЗВОНКИ ==========
  window.startCall = (targetId, targetName) => {
    localStorage.setItem('callData', JSON.stringify({
      type: 'personal',
      myUserId: currentUser.userId,
      myUsername: currentUser.username,
      targetId,
      targetName,
      callType: 'video',
      isIncoming: false,
      iceServers
    }));
    socket.emit('call-user', { targetId, callType: 'video' });
    window.open('/call', '_blank');
  };

  // ========== ГРУППЫ ==========
  function openGroupModal() {
    document.getElementById('groupModal').classList.remove('hidden');
  }
  function closeGroupModal() {
    document.getElementById('groupModal').classList.add('hidden');
  }
  function createGroup() {
    const groupName = document.getElementById('groupNameInput').value.trim();
    if (!groupName) { showToast('Введите название группы', true); return; }
    const groupId = `grp_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
    socket.emit('create-group', { groupName, groupId });
    localStorage.setItem('callData', JSON.stringify({
      type: 'group',
      myUserId: currentUser.userId,
      myUsername: currentUser.username,
      groupId,
      groupName,
      isHost: true,
      iceServers
    }));
    closeGroupModal();
    window.open('/call', '_blank');
  }
  window.joinGroup = (groupId, groupName) => {
    localStorage.setItem('callData', JSON.stringify({
      type: 'group',
      myUserId: currentUser.userId,
      myUsername: currentUser.username,
      groupId,
      groupName,
      isHost: false,
      iceServers
    }));
    socket.emit('join-group-request', { groupId });
    window.open('/call', '_blank');
  };
  function loadGroups() {
    socket.emit('get-groups');
  }

  // Запрос уведомлений
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // Восстановление пользователя
  const saved = localStorage.getItem('craheapp_user');
  if (saved) {
    try {
      const u = JSON.parse(saved);
      document.getElementById('regUsername').value = u.name;
      document.getElementById('regUserId').value = u.id;
    } catch(e) {}
  }
</script>
</body>
</html>
